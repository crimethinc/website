        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: L-aħħar att ta’ kriminalita’
        right_text_html: |-
          Kull ordni hija mibnija fuq l-aħħar att kriminali li sar kontra l-ordni li kien hemm qabel – l-att kriminali li ddissolviha. Warajaha, hekk kif in-nies jibdew jidrawha, l-ordni l-ġdida issir leġittima. Per eżempju, l-aħħar att kriminali li fuqha ġiet iffundata l-iStati Uniti, kienet ir-ribelljoni kontra l-awtorita’ tar-re ta’ l-Ingilterra. L-att kriminali li fuqha se tiġi ffundata s-soċjeta’ l-ġdida, jekk jirnexxielna ngħixuha, se tarmi l-baħar l-liġijiet, n-normi u l-istituzzjonijiet

          tal-llum.

          Kull sistema hija mdawwra bl-iħirsa ta’ dak kollu li l-istess sistema ma tistax tinkorpora u tikkontrolla. Kull ordni fiha ż-żerriegħa tad-distruzzjoni tagħha stess. Xejn ma hu għal dejjem; din tgħodd ukoll għall-imperi u ċ-ċiviliżżazjonijiet. Imma x’jista’ jissupera lil dan l-imperu? Nistgħu nimmaġinaw ordni li ma hijiex premessa fuq id-diviżjoni ta’ ħajja f’dak li hu leġittimu u illeġittimu, dak li hu legali u dak li hu illegali, dawk li jmexxu u dawk li huma mmexxija? X’jista’ jkun l-aħħar att ta’ kriminalita’?
