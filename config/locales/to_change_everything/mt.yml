        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: |-
          L-Anarkija hija dak li jiġri kull meta l-ordni ma tiġix imposta bil-forza. Hija l-liberta’: il-proċess li kontinwament nerġgħu nivvintaw lilna nfusna u r-relazzjonijiet tagħna. Kull proċess jew fenomenu li jsir b’mod ħieles – foresta, ċirku ta’ ħbieb, il-ġisem fiżiku tiegħek stess – huwa armonija anarkika li tippersisti f’bidla kontinwa. Minn naħa l-oħra, kull kontroll li ġej minn fuq, jista’ jinżamm biss b’infurzar: id-dixxiplina ġo klassi ta’ l-iskola, ir-razzett modern industrijaliżżat mimli pestiċidi li jiddefendu raddi sterili twal ħxejjex ġenetifikament modifikati, l-eġemonija fraġli tas-superpotenti. L-Anarkiżmu hija l-idea li kulħadd huwa intitolat għad-determinazzjoni kompluta ta’ ħajtu. L-ebda liġi, gvern jew proċess ma hu iżjed importanti mill-bżonnijiet u x-xewqat ta’ l-umani infushom. In-nies għandhom ikunu liberi li jiffurmaw ir-relazzjonijiet għas-sodisfazzjon reċiproku tagħhom, u li jiddefendu lilhom infushom bil-mod li jħossu li hu l-aħjar għalihom. L-anarkiżmu ma huwiex dogma jew mod/i ta’ kif għandhom isiru l-affarijiet. Ma huwiex sistema li suppost għandha taħdem jekk tiġi applikata b’mod tajjeb, bħad-demokrazija. Lanqas ma hu xi għan jew skop li għandu jiġi realizzat f’xi punt fil-futur, bħall-komuniżmu. Huwa mod ta kif wieħed jista’ jaġixxi u jirrelata li jista’ jiġi attwat fil-prattika issa stess. Bħala referenza għal sistema ta’ valuri jew kors ta’ azzjoni, nistgħu nibdew billi nistaqsu: Kif qed jiġi mqassam il-poter?. L-Anarkisti jopponu kull forma ta’ ġerarkija – kull munita li

          tikkonċentra l-poter fl-idejn tal-ftit, kull mekkaniżmu li jpoġġina l-bogħod mill-potenzjal ta’ dak li nistgħu inkunu. Kontra kull forma ta’ sistema magħluqa, aħna nimirħu f’dak li ma nafux quddiemna, il-kaos ta’ ġo fina li bis-saħħa tiegħu nistgħu nkunu liberi.
        second_html: |-
          Dal-proġett qed jiġi miġjub lilek minn CrimethInc., li huwa network internazzjonali ta’ nies li jaspiraw li jkunu rivoluzzjonarji. Tista’ ssib iżed xogħol minn tagħna fuq crimethinc.com – kotba, films, podcasts, u xandiriet ta’ rewwixti mid-dinja kollha. Produċejna dil-kitba bil-koperazzjoni ta’ ħbieb mill-ħames kontinenti; mijiet ta voluntiera offrew il-flus biex ikopru l-ispejjeż tal-printing, sabiex tkun tista’ żżom dil-kitba f’idejk. Il-verżjoni diġitali tista’ tinstab tradotta f’aktar minn tużżana lingwi fuq tochangeeverything.com, flimkien ma’ għażla wiesa

          ta’ media u riżorsi.

          Peress li dawn l-ideat huma tant ordinarji, jistgħu jintużaw biss minn nies li huma straordinajri. Fortunatament, int wieħed minnhom. Jekk qed taqra dan kollu, ifisser li int ir-reżistenza.
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: ''
        right_text_html: |-
          Meta naraw dak kollu li l-mekkaniżmi u l-istituzzjonijiet tad-dominazzjoni għandhom komuni, nibdew naraw b’mod iżjed ċar kif il-ġliediet individwali tagħna huma wkoll parti minn xi ħaġa li hija ikbar minna, xi ħaġa li tista’ tgħaqqadna. Meta niġu flimkien fuq il-bażi ta’ din ilkonnessjoni, kollox jibda’ jinbidel: mhux il-ġliediet tagħna biss, imma anki s-sens ta’ poter personali li kull wieħed minna għandu, il-kapaċita’ li nieħdu gost ngħixu, is-sens li ħajjitna għandha verament sens. Kull ma għandna bżonn biex nibdew insibu lil xulxin huwa li nibdew naħsbu u naġixxu skont loġika differenti.

          Biex tbiddel kollox, ibda’ minn kullimkien.
