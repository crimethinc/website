      intro:
        left_text_html: |-
          Li kieku kellek tbiddel xi ħaġa f’ħajtek u fid-dinja, tkun xi tkun, x’kont tbiddel? Tmur vaganza twila, għal bqija ta’ ħajtek? Twaqqaf il-bidla fil-klima? Issaqsi għal banek etiċi u politikanti tajbin? Li hu żgur hu li, xejn ma jista’ jkun inqas realistiku milli tħalli kollox kif inhu, u fl-istess ħin tistenna riżultati differenti.

          Il-ġlidiet finanzjarji u emozzjonali ta’ kull wieħed u waħda minnha, huma mera taddiżastri li naraw fuq livell globali. Nistgħu inqattgħu ħajjitna kollha nippruvaw nitfu dawn il-fjammi waħda waħda – imma filverita’ kollha ġejjin mill-istess sors. L-ebda soluzzjoni frammentata ma hi se sservi. Irridu nerġgħu naħsbu kollox skont loġika totalment differenti.
        right_text_html: Biex tbiddel kollox, ibda minn kullimkien.
      self:
        left_text_html: ibda’ middeterminazzjoni tiegħek innifsek
        right_text_html: |-
          Il-ħares tal-liberta’ għadu jdur mad-dinja msejsa fuq l-immaġni tiegħu. Ġejna mwiegħda determinazzjoni kompluta tagħna nfusa: l-istituzzjonijiet kollha tas-soċjeta’ tagħna huma mistennija li jipprovduhielna. Li kieku kellek determinazzjoni kompluta fuq ħajtek, x’kont tkun qed tagħmel bħal issa? Aħseb fil-potenzjal vast ta’ ħajtek: ir-relazzjonijiet li jista’ jkollok, l-affarijiet li tista’ tesperjenza, il-modi kollha li bihom tista’ tagħti sens lil ħajtek. Meta twilidt, bħal donnu li ma kienx hemm limitu għal dak li stajt issir jew dak li stajt tagħmel. Kont tirrapreżenta l-possibilita’ pura. Normalment, ma niqfux nimmaġinaw dawn l-affarijiet kollha. Ikun biss fil-mumenti l-aktar sbieħ tal-ħajja, bħal meta nibdew inħobbu lil xi ħadd, jew nilħqu xi għan li nkunu ridna nilħqu, jew inżuru xi pajjiż imbiegħed, li jirnexxielna naqbdu dawk il-mumenti tant sbieħ, ta’ kif ħajjitna jistgħu ikunu. X’jillimita dak li jista’ jgħinek tilħaq il-potenzjal tiegħek? X’saħħa għandek fuq l-ambjent ta’ madwarek jew fuq kif tqatta’ ħinek? Il-burokraziji li trid tħabbat wiċċek magħhom ta kuljum, sakemm timxi mal-istruzzjonijiet li jtuk, l-ekonomija li ttik issaħħa skont kemm jirnexxielek tiġġenera profitt, dawk li jmexxu u jikkontrollaw, il-pulizija li jinsistu li l-aqwa u l-aħjar mod ta’ “kif tkun dak kollu li tista’ tkun” hu li tobdi l-awtorita’ tagħhom – dawn qed jgħinuk biex tgħix il-massimu ta’ ħajtek, bit-termini

          tiegħek?

          Is-sigriet huwa li aħna ġa għandna d-determinazzjoni kompluta tagħna nfusna: U dan, mhux għax din ġiet mogħtija lilna, imma sempliċiment għax lanqas l-iktar dittatura totalitarja ma tista’ toħodilna. Pero’, eventwalment se nindunaw li x’ħin nibdew naġixxu għalina nfusna, se nsibu rwieħna f’kunflitt mal-istess istituzzjonijiet li suppost qed jiggarantulna l-liberta’.
