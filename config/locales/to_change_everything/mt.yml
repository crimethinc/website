      profit:
        left_text_html: Il-problema hija il-profitt
        right_text_html: |-
          Il-flus huma xi ħaġa astratta: donnhom kapaċi jirrapreżentaw kollox. Huma xi ħaġa universali: nies li m’għandhom xejn komuni bejniethom, kollha jaċċettaw il-flus bħala fatt tal-ħajja. Il-flus huma impersonali: għall-kontra tal-privileġġi li kienu jintirtu b’mod ereditarju, il-flus jistgħu jiġu trasferiti minn persuna għall-oħra fi ftit sekondi. Il-flus huma xi ħaġa fluida: iktar ma hu faċli għall-flus li jiġru minn saff għall-ieħor fil-ġerarkija, iktar il-ġerarkija se tistabiliżża ruħha. Huma ħafna dawk li jirribellaw kontra dittatur, imbgħad jispiċċaw jaċċettaw l-awtorita’ tas-suq immexxija

          mill-flus.

          Meta l-valur ta’ kollox huwa konċentrat fi strument wieħed, anki l-aktar mumenti ta’ ħajjitna li ma nistgħux nikkwantifikaw, jitilfu is-sens tagħhom. Kull ħaġa li ma tistax tiġi kwantifikata b’mod finanzjarju, se titlef il-preġju. Il-ħajja issir ġlieda waħda għall-gwadann finanzjarju: kull wieħed u waħda minna kontra kullħadd, jew tbiegħ jew tisfa’ mibjugħ. Li tagħmel profitt: ifisser li takkwista iżjed kontroll fuq ir-riżorsi tas-soċjeta, għad-dannu ta’ l-oħrajn kollha. Ma nistgħux nagħmlu profitt kollha f’daqqa; b’mod proporzjonali, jekk xi ħadd se jagħmel profitt, ħaddieħor se jkun qed jitlef. Meta’ l-investituri jagħmlu profitt minn fuq dahar ix-xogħol tal-ħaddiema, dak ifisser illi aktar ma l-ħaddiema se jaħdmu, iktar ser tikber id-differenza finanzjarja ta’ bejniethom. Sistema li hija mmexxija mill-profitt, tipproduċi l-faqar bl-istess rata li tikkonċentra l-ġid. Huwa vera li mis-sistemi l-oħra kollha, f’dis-sistema, il-pressjoni biex nikkompetu kapaċi tiġġenera iżjed innovazzjonijiet ġodda, iżda flimkien ma’ dawn, jiġu prodotti wkoll aktar disparitajiet: fejn qabel ir-rikkieba taż-żwiemel kienu jsaltnu fuq dawk li jimxu, illum, l-ajruplani tal-gwerra jtiru fuq n-nies li m’għandhomx saqaf fuq rashom. U għax illum kulħadd qed ifittex li jagħmel il-profitt, minflok li jakkwista l-affarijiet sempliċiment għax għandu bżonnhom, ir-riżultat ta’ dan il-xogħol kollu jista’ jkun diżastruż. Il-bidla fil-klima hija sempliċiment l-aħħar waħda minn serje ta’ katastrofi li anki l-aktar kapitalisti b’saħħithom għadhom ma sabux tarf tagħha. Il-kapitaliżmu ma jippremjax lill-kummerċjanti talli jsolvu l-kriżijiet, imma talli jirnexxielhom jagħmlu l-profitt minn fuqhom.

          would begin from human needs; instead of taking
