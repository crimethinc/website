        left_text_html: Il-problema hija l-mexxejja
        right_text_html: Grupp li għandu bżonn il-mexxejja huwa grupp li jsofri minn
          diżordni soċjali fejn il-maġġoranza tal-parteċipanti ifallu milli jieħdu
          inizzjattiva jew li jaħsbu b’mod kritiku fuq l-azzjonijiet tagħhom. Sakemm
          nibqgħu inħarsu lejn il-poter li kull wieħed u waħda minn għandu bħala l-propjeta’
          ta’ individwi speċifiċi, u mhux bħala relazzjoni bejnietna, dejjem se nibqgħu
