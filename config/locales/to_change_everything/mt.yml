        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: ibda’ billi tirrikonċilja l-individwu mal-ħaġa sħiħa
        right_text_html: |-
          “Id-drittijiet tiegħek jieqfu fejn jibdew id-drittijiet tal-oħrajn”. Skont din il-loġika, iktar ma hemm nies, inqas ser ikollok liberta’. Imma l-liberta’ mhijiex sempliċiment bużżieqa żgħira bid-drittijiet personali tiegħek, magħluqin fid-dinja tiegħek, għalik waħdek. Hija ħafna iktar ikkumplikata minn hekk. Meta tidħak jew tittewweb, faċilment tista’ tħajjar lil ħaddieħor jidħak u jittewweb bħalek. Bħal meta tkun entużjast jew iddisprat. Aħna magħmulin mill-kanzunetti li jeħlu f’rasna, mill-burdati li jqabbduna sħabna stess. Meta nsuq karozza, din tkun qed tniġġes l-atmosfera li minnha nieħdu l-arja għan-nifs; meta nuża l-mediċina u l-farmaċewtika, dawn eventwalment jispiċċaw fl-ilma li jixrob kulħadd. Is-sistema li kulħadd jaċċetta li jgħix taħtha hija l-istess sistema li int stess ikollok tgħix taħtha – iżda meta nies oħra jisfidaw lil din l-istess sistema, int ikollok ċans li terġa tinnegozja ir-realta’ tiegħek. Il-liberta’ tiegħek tibda’ fejn tibda’ il-liberta’ tiegħi, u tispiċċa fejn tispiċċa tiegħi. Aħna m’aħniex individwi diskreti li neżistu għalina waħidna. Ġisimna magħmul minn eluf ta’ speċi differenti li qed jgħixu f’simbjożi: m’aħniex fortizza magħluqa, imma proċess ikkumplikat fejn in-nutrienti u l-mikrobi il-ħin kollu deħlin u ħerġin minn ġo fina. Ngħixu f’simbjożi ma’ eluf ta’ speċi oħra, bis-siġar jassorbu n-nifs li aħna stess narmu minn ġo fina. Ma naġixxux ġo vacuum, immexxija mir-raġuni; il-mewġ tal-kosmos għaddej

          minn ġo fina.

          L-lingwa tgħina nikkomunikaw sempliċiment għax hija ħaġa li kulħadd juża. L-istess nistgħu ngħidu għall-ideat u x-xewqat tagħna: nistgħu nikkomunikawhom għax huma affarijiet akbar minna. Kull wieħed u waħda minna huwa magħmul minn kaos ta’ forzi li jmorru kontra xulxin, li kollha jestendu lil hinn minna nfusna għall-ħin u l-ispazju. Meta nagħżlu liema minn dawn

          sejrin nikkultivaw, inkunu qed niddeterminaw x’se nsibu f’kull min niltaqgħu miegħu jew magħha. Il-liberta’ mhijiex xi propjeta’ jew xi ħaġa li tista’ tippossedi; hija relazzjoni. Mhijiex kwistjoni li tkun protett mid-dinja ta’ barra, imma li nsibu mod li bih nimmassimiżżaw il-possibilitajiet. Dan ma jfissirx li għandna nfittxu konsensus fuq kull ħaġa akkost ta’ kollox; kemm il-kunflitt, kif ukoll il-konsensus jistgħu jimmobiliżżawna kif ukoll jiddiżentissiżawna. Imma minflok li naqsmu d-dinja f’ħafna biċċiet żgħar, ejja nieħdu milli nistgħu mill-interkonnessjonijiet tagħna.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: ibda’ millliberazzjoni tax-xewqat tieghek
        right_text_html: Fis-soċjeta’ li ngħixu fiha, lanqas il-passjonijiet tagħna
          ma huma verament tagħna; huma passjonijiet ikkultivati mir-rikamar u forom
          oħra ta’ propoganda, immirati biex iħalluna niġru wara l-karrota tas-suq,
          bħal ħmir. Bis-saħħa ta’ l-indottrinazzjoni, in-nies isibu ruħhom kuntenti
          bihom infushom talli jagħmlu affarijiet li inevitabilment ser iżommuhom
          miserabbli fuq il-medda ta’ ħajjithom. Aħna maqbudin fit-tbatija tagħna
          stess, u l-ferħ li nħossu f’ħajjitna huwa sempliċiment l-qoxra fuq kollox.
          Biex inkunu verament liberi, għandna bżonn kontroll fuq il-proċessi li li
          jipproduċu ix-xewqat u l-aspirazzjonijiet tagħna. Il-liberazzjoni ma tfissirx
          biss li nissodisfaw ix-xewqat li għandna llum, imma li nwessgħu is-sens
          ta’ x’hinu possibli sabiex dawn l-istess xewqat ikunu jistgħu jinbildu mar-realtajiet
          li dawn stess jġiegħluna nikkreaw. Il-liberazzjoni tfisser li nagħtu daharna
          lil gost pervers li nieħdu meta ninfurzaw, niddominaw u nipposedu. Ifisser
          li nsibu l-pjaċir fl-affarijiet li jeħilsuna mill-makkinarju ta’ l-ubbidjenza
          u l-kompetizzjoni. Jekk xi darba qatt irnexxielek tinħeles minn vizzju ikraħ,
          bħat-tipjip, proabilment għandek idea xi tfisser li tittrasforma u tbiddel
          ix-xewqat tiegħek.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: ibda’ mirrivolta
        right_text_html: |-
          Il-bigoti tipikament iweħħlu fi gruppi soċjali speċifiċi għal problemi sistematiċi – Il-Lhud għall-kapitaliżmu sfrenat, l-immigranti illegali li jieħdulna xogħolna – bl-istess mod li in-nies iweħħlu f’politikanti individwali tal-korruzjoni fil-politika. Imma l-problema huma is-sistemi fihom infushom. Ma tagħmilx differenza min ikollu l-poter, għax fil-verita’ kollha jipproduċu l-istess żbilanċ fil-poter. Il-problema ma hijiex illi dawn is-sistemi mhux qed jaħdmu sew, imma li appuntu li qiegħdin hemm u

          qed jiffunzjonaw.

          L-għeddewa tagħna ma humiex nies umani, imma l-istituzzjonijiet u r-rutini li jifriduna minna nfusna u minn xulxin. Hemm iżjed kunflitti ġo fina nfusna milli kunflitti bejnietna. L-istess ħsarat u djufija li nsibu fiċ-ċiviliżżazzjoni insibuhom fil-ħbiberiji tagħna u f’qalbna u ruħna; dan ma huwiex kunflitt bejn in-nies imma kunflitt bejn tipi differenti ta’ relazzjonijiet, ta’ modi ta’ għixien. Meta ma naċċettawx ir-rwoli tagħna fl-orndni li tirrenja bħal issa, inkunu qed nistiednu nies oħra biex jagħżlu naħa

          huma wkoll.

          L-aħjar ħaġa li nistgħu nagħmlu hu li narmu l-kunċett kollu tad-dominazzjoni l-baħar – mhux li nimmaniġjaw id-dettalji tad-dominazzjoni b’mod iktar ‘fair’, mhux li nbiddlu n-naħa tagħna fuq il-grawnd tal-logħoba, u min kien jiddomina jieħu l-pożizzjoni ta’ min hu sfruttat u viċi-versa, mhux li nistabilizzaw is-sistema billi nirriformawha. L-għan tal-protesta ma huwiex illi nitolbu mexxejja iktar leġittimi, imma li nuru li nistgħu naġixxu fuq is-saħħa tagħna stess, li ninkoraġġixxu nies oħra jagħmlu l-istess u li niskoraġġixxu lill-awtoritajiet milli jinterferu. Din ma hijiex kwistjoni ta’ gwerra- il-kunflitt binarju bejn żewġ għedewwa militariżżati – imma ta’ diżubbidjenza kontaġġuża. Ma huwiex biżżejjed li nedukaw u niddiskutu, u nistennew lill19

          imħuh u l-qlub tan-nies l-oħra jinbidlu. Sakemm l-ideat ma jiġux espressi f’azzjoni billi nikkonfrontaw lin-nies b’għażliet konkreti, il-konversazzjoni se tibqa’ astratta. Ħafna nies iħossuhom aljenati b’ħafna diskorsi teoretiċi, imma meta jkun qed jiġri xi ħaġa, meta jkunu jistgħu jaraw differenzi li jagħmlu sens bejn żewġ naħat opposti, dawn se jagħżlu naħa. Ma għandniex bżonn unanimata, u lanqas li nifhmu lid-dinja b’mod kompreħensiv, u lanqas mappa li turina d-destinazzjoni eżatta – imma sempliċiment il-kuraġġ li nagħmlu l-ewwel pass fi triq differenti.
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: Il-problema hija il-kontroll
        right_text_html: 'X’hinuma is-sinjali li juruk li qiegħed f’relazzjoni abbużiva?
          Dak/dik li qed t/jabbuża t/jista’ t/jipprova t/jikkontrolla l-imġieba tiegħek
          jew t/jiddettalek ħsibijietek; ma t/jħallilekx aċċess għar-riżorsi; t/juża
          t-theddid jew il-vjolenza fil-konfront tiegħek; jew iżommok f’sitwazzjoni
          ta’ dipendenza, taħt sorveljanza kontinwa. Dan kollu jiddeskrivi tajjeb
          l-imġieba ta’ nies individwi li jabbużaw individwi oħra, imma l-istess jista’
          jingħad għall-pulizija, il-qrati, il-ħabs, ic-CCTV cameras, u l-maġġoranza
          ta’ l-istituzzjonijiet li jiggvernaw lis-soċjeta’ tagħna. Bażikament kollha
          kemm huma huma bbażati fuq l-idea li il-bnedmin għandhom bżonn ikunu amministrati,
          immeniġġjati, taħt kontroll. Iktar ma’ jkun hemm żbilanċi imposti fuqna,
          iktar hemm bżonn ta’ kontrolli biex dawn jiġu priservati. Dan il-kontroll
          jista’ jiġi eżerċizzat fuq livell individwali bħall-reklużjoni solitarja
          fil-ħabsijiet, jew inkella fuq livell ieħor fejn il-kontroll huwa mibni
          fl-infrastruttura infisha tas-soċjeta: il-mod li bihom jinħadmu il-”credit
          ratings” u l-”premiums” tal-insurance, il-modi ta’ kif l— istatistika tiġi
          miġbura sabiex jiġu ippjanati spazji urbani, l-modi ta’ kif jiġu ddisinjati
          “dating sites” u websites tas-social media. Meta l-possibilitajiet infiniti
          tal-ħajja jiġu rreduċiti għall-ammont ta’ għażliet b’simboli ta “ones u
          zeros” , ma jkunx hemm iżjed kunflitt bejn is-sistema li ngħixu fiha u l-ħajja
          li nistgħu nimmaġinaw – u dan mhux għax inkunu akkwistajna l-liberta’ kompluta,
          imma appuntu għax inkunu pperfezzjonajna l-oppost. L-liberta’ ma tfissirx
          illi ngħażlu bejn ammont ta’ għażliet differenti, imma li nifformulaw il-mistoqsijiet
          aħna stess.'
