      answering:
        left_text_html: ibda’ billi tirrispondi lejk innifsek
        right_text_html: Il-kbarat, l-politikanti, il-bosses, u dawk li jiġbru t-taxxi
          jgħoxew jitkellmu fuq ir-responsabilita’ personali. Imma jekk verament nieħdu
          r-responsabilita’ kompluta ta’ l-azzjonijiet tagħna, taħseb li, biex nibdew,
          se nkunu qed nagħtu kas ta’ l-istruzzjonijiet li jtuna? Matul l-istorja,
          saret iżjed ħsara b’riżultat tal-ubbidjenza milli mill-azzjonijiet ħżiena.
          L-bombi kollha tal-militar fuq livell globali huma l-manifestazzjoni fiżika
          tal-volonta’ tagħna li niddiferixxu lil ħaddieħor. Jekk trid tkun żgur li
          qatt ma tikkontribwixxi għall-gwerer, ġenoċidju jew oppressjoni, l-ewwel
          pass hu li tieqaf tobdi l-ordnijiet. L-istess ħaġa nistgħu ngħidu għall-valuri
          morali tiegħek ukoll. Għexieren ta’ kmandanti u kmandijiet jitolbu s-sottomissjoni
          kompluta tiegħek. U anki jekk verament trid li titfa’ r-responsabilita’
          għad-deċiżjonijiet li tagħmel f’ħajtek fuq xi alla jew dogma, kif se tagħżel
          liema wieħed ser ikun? Trid jew ma tridx, huwa inti dak li jagħżel bejn
          wieħed jew l-ieħor. Normalment, ħafna minn nies sempliċiment jagħmlu l-għażla
          tagħhom skont dak li hu l-iktar familjari jew konvenjenti għalihom. Irridu
          jew ma rridux, aħna responsabbli tat-twemmin u d-deċiżjonijiet tagħna. Jekk
          nirrispondu lejna nfusna minflok lejn il-kbarat jew xi kmandamenti, jista’
          jkun li xorta se niġu f’kunflitt ma’ xulxin, imma ta l-anqas, inkunu qed
          nagħmlu hekk fuq it-termini tagħna nfusna, u mhux nagħmlu ħsara lil xulxin
          għall-gwadann tal-aġenda ta’ ħaddieħor.
