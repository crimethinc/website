      government:
        left_text_html: Il-problema hija il-gvernijiet
        right_text_html: |-
          Il-gvernijiet iwiegħduna d-drittijiet, imma jistgħu joħdulna biss il-liberta’. L-kunċett tad-drittijiet jimplika li jkun hemm poter ċentrali li jista’ jikkonferixxihom u jipproteġihom. Pero’, kull ħaġa li l-istat għandu l-poter li jiggarantixxi, għandu wkoll il-poter li joħodha lura; meta’ ngħatu l-poter lill-gvern biex isolvi probema, nkunu qed niftħu l-biebien biex jikkrea aktar problemi. U l-poter li l-gvernijiet għandhom, ma waqax mis-sema’ – dak huwa l-poter tagħna, li fil-verita’ nistgħu nużawh b’modi ħafna aktar effiċjenti mingħajr il-mekkaniżmi oppressivi tar-rappreżentazzjoni. L-aktar demokrazija liberali tħaddan l-istess prinċipji li tħaddan l-aktar awtokrazija tiranna: iċ-ċentraliżżazjoni tal-poter u l-leġittimita’ fi struttura li l-iskop tagħha huwa li timmonopoliżża l-użu tal-forza. Ma tagħmilx differenza jekk il-burokraiċi li jmexxuha, jirrispondux lir-re, jew lill-president jew lill-elettorat. L-liġijiet, il-burokraziji u l-pulizija huma eqdem mid-demikrazija nfisha; huma jiffunzjonaw bl-istess mod kemm taħt demokrazija kif ukoll taħt dittatura. L-unika differenza hija illi, peress li aħna nistgħu nivvutaw għal min se jamministrahom, aħna mistennija li nikkunsidrawhom bħala tagħna – anka meta

          dawn jintużaw kontrina stess.

          Id-dittaturi huma fihom infishom instabbli: tista’ toqtol, titfa’ l-ħabs jew taħsel l-imħuħ ta’ generazzjonijiet sħaħ, imma ulied l-oppressati dejjem se jivvintaw ġlidiet ġodda sabiex jerġgħu jirbħu l-liberta’. Imma jekk twiegħed lil kull raġel iċ-ċans illi jimponi ir-rieda tal-maġġoranza fuq il-bqija tan-nies, tista’ ġġibhom kollha flimkien wara sistema li tisfurzahom jitqatlu kontra xulxin. Iktar ma n-nies jaħsbu li għandhom influenza fuq l-istituzzjonijiet tal-istat, iktar dawn l-istess istituzzjonijiet ser jintużaw biex joppressaw lil dawn l-istess nies. Forsi huwa propju għalekk

          li l-ħakma tad-demokrazija fuq livell globali, u l-popolarita’ tagħha, tikkoinċidi mal-inugwaljanzi fid-distribuzzjoni tar-riżorsi u l-poter; l-ebda sistema’ ta’ gvern qatt ma stabiliżżat sitwazzjoni

          daqstant prekarja.

          Meta l-poter ikun ċentraliżżat, in-nies ikollhom jieħdu dominju fuq ħaddieħor sabiex ikunu jistgħu jinfluenzaw id-destin tagħhom. Kull ġlieda għall-awtonomija ser tiġi mdawwra f’kunflitt għall-akkwist tal-poter; kull ma trid huwa li tħares lejn il-gwerer ċivili f’pajjiżi li ħadu l-indipendenza wara li kienu koloniżżati, bejn popli u tribujiet li qabel kienu jgħixu flimkien fil-paċi. Dawk li għandhom il-poter, jistgħu iżommuh biss billi kontinwament jagħmlu gwerra fuq il-popolazzjonijiet tagħhom stess, kif ukoll

          fuq popli barranin.

          Kull fejn hemm il-ġerarkiji, dawk li huma fuq nett dejjem se jkollom id-dritta sabiex jiċċentraliżżaw il-poter. L-uniku mod kif nistgħu nitfgħu il-pressjoni fuq l-awtoritajiet mingħajr ma niġu mdaħħla fil-logħba tagħhom huwa li niżviluppaw networks oriżżontali li jaħdmu b’mod awtonomu. Ma hemmx triq li twassal għall-liberta’ imma t-triq hija l-liberta’ nnifisha. Minflok munita waħda ta’ leġittimita’, għandna bżonn spazju għall-ħafna narrattivi. Minflok l-infruzar li jiġi awtomatikament kull fejn għandek gvern, għandna bżonn strutturi li bihom nieħdu deċiżjonijiet li jiffavorixxu l-awtonomija u prattiċi tad-difiża kontra kull min irid jikkmandana u jisfurzana.
