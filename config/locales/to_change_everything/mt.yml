      property:
        left_text_html: Il-problema hija il-propjeta’
        right_text_html: |-
          Il-bażi tal-kapitaliżmu huma d-drittijiet għall-propjeta’ – kostruzzjoni soċjali oħra li writtna mir-rejiet u l-aristokratiċi. Illum il-ġurnata il-propjeta’ tbiddel aktar idejn, imma l-kunċett jibqa’ l-istess: l-idea ta’ pussess ta’ xi ħaġa, tilleġittima l-użu tal-vjolenza’ sabiex tinforza żbilanċi artifiċjali fl-aċċess għall-art

          u r-riżorsi.

          Xi nies jaħsbu li l-propjeta’ tista’ teżisti mingħajr l-istat. Imma d-drittijiet għall-propjeta’ isir bla sens u użu mingħajr awtorita’ ċentraliżżata li timponihom – u apparti minn hekk, sakemm teżisti awtorita’ ċentraliżżata, fil-verita’ xejn ma hu tiegħek. Il-flus li tagħmel huma awtoriżżati mill-istat, u huma suġġett għall-inflazzjoni u t-taxxi. Id-dar li toqgħod fiha ma hijiex tiegħek imma tal-bank li silfek il-flus sabiex tixtriha. Mela x’verament hemm bżonn sabiex nipproteġu dak li huma importanti għalina? Il-gvernijiet jeżistu biss bil-virtu’ ta’ dak li jieħdu minn għandna; dejjem ser jieħdu aktar milli jagħtu. Is-swieq se jippremjawna biss meta’ se nqarqu bi sħabna stess, u se jippremjaw lil sħabna meta dawn iqarrqu bina. L-unika assigurazzjoni vera, allura, tinsab biss fil-konnesjonijiet li għandna ma’ xulxin: jekk irridu nkunu żguri mis-sigurta’ tagħna, għandna bżonn networks ta’ għajnuna reċiproka li kapaċi jiddefendu lilhom infushom. Mingħajr flus u drittijiet għall-propjeta’, ir-relazzjonijiet tagħna lejn affarijiet materjali jkunu determinati mir-relazzjonijiet tagħna ma’ xulxin. Illum il-ġurnata, kollox jaħdem l-oppost: Ir-relazzjonijiet ta’ bejnietna huma determinati mir-relazzjonijiet

          tagħna lejn l-affarijiet.

          Li ngħixu mingħajr propejta’ ma jfissirx illi nitilfu dak kollu li għandna; ifisser illi l-ebda awtorita’ jew l-ebda korporazzjoni ma jkollha d-dritt li toħodlok l-affarijiet li tiddependi fuqhom.

          Minflok nirrispondu lejn l-awtorita’ u l-burokrazija, nibdew billi nirrispondu lejn il-bżonnijiet umani; minflok li nieħdu vantaġġ minn xulxin, nibdew infittxu li nieħdu vantaġġ mill-interdipendenza ta’ bejnietna. Il-biża’ ta’ l-akbar brigant hija soċjeta li taħdem mingħajr il-kunċett ta’ propjeta’ – għax mingħajra se jieħu biss ir-rispett li jistħoqqlu. Mingħajr il-flus, in-nies ikunu jistgħu jiġu ivvalutati għall-dak li jikkontribwixxu lill-ħajja ta’ l-oħrajn, mhux għall-dak li huma kapaċi jagħmlu u jakkwistaw billi jixtru s-saħħa ta’ ħaddieħor. Mingħajr il-profitt, kull sforz ikun il-premju tiegħu innifsu, u għalekk ma jkunx hemm inċentiv għal attivita’ distruttiva. L-affarijiet li verament jiswew fil-ħajja- il-passjoni, il-ħbiberiji, il-ġenerożita- huma aċċessibli b’mod abbundanti. Hemm bżonn leġjuni ta’ pulizija u surveyors tal-propjeta’ sabiex jimponu fuqna l-iskarsita’ li ssakkarna għall-dejjem f’dit-tellieqa li ngħixu fiha bħal issa.
