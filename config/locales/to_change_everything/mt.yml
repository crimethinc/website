          din l-istess mistoqsija meta waqslu fl-hekk imsejħa d-Dinja l-Ġdida; kull
          meta dik il-mistoqsija ġiet risposta, frankatielhom mijiet ta’ snin milli
          jippruvaw joppressaw popolazzjonijiet sħaħ. Sakemm jeżisti mexxej, dejjem
          jeżisti ukoll iċ-ċans illi jkun mibdul jew meħud ostaġġ. Dejjem aħjar li
          kieku kulħadd għandu l-aġenda tiegħu u s-sens personali li jista’ jbiddel
