      borders:
        left_text_html: il-problema hija l-fruntieri
        right_text_html: |-
          Li kieku kellha tiġi armata minn barra u tinvadi lil Malta, taqta’ s-siġar kollha u teqred l-ambjent naturali, u tisforza lit-tfal tagħna biex joffru ħajjithom għaliha, min ma kienx se jara x’jagħmel biex jiġġildilha? Imma meta l-gvern lokali (ikun hemm min ikun hemm) jagħmel l-istess ħaġa, ara lill-apoloġisti jħallsu t-taxxi, jaqdu dmirhom, jiddefendu l-azzjonijiet tiegħu.. Il-fruntieri ma jipproteġuniex, imma jifirduna – jikkreaw kunflitti bla bżonn ma’ dawk esklużi u joskuraw differenzi reali bejn dawk inklużi. Anki l-iktar gvernijiet demokratiċi huma bbażati fuq din id-diviżjoni bejn il-parteċipanti u dawk “ta’ barra”, il-leġittimi u l-illeġittimi. Anki f’Ateni l-antika, il-famuża belt li fiha twieldet id-demokrazija, fil-verita’ ftit kienu dawk l-irġiel li kienu inklużi fil-proċessi tal-politika; il-missirijiet tad-demokrazija moderna kellhom l-iskjavi. Iċ-ċittadinanza xorta timponi fruntieri fuq dawk inklużi u dawk esklużi bħall-eluf ta’ immigranti llegali li jaslu f’Malta, li tisirqilhom id-dritt fuq ħajjithom

          b’mod reali ħafna.

          L-idea liberali tisħaq li għandna nespandu l-konfini ta’ l-inklużjoni sakemm id-dinja kollha tiġi integrata fi proġett demokratiku kbir. Imma l-inugwaljanza qiegħda propju imnaqqxa fl-istruttura nfisha. F’kull livell li jeżisti f’din is-soċjeta’, eluf ta fruntieri żgħar jifirduna f’dawk li għandhom is-saħħa u dawk li m’għandhomx; checkpoints tas-sigurta’, credit ratings, passwords tad-databases u tax brackets. Għandna bżonn modi u forom ġodda ta’ kif inħossuna parti mill-komunita’ li ma humiex ibażżati fuq esklużjoni u ma jiċċentraliżżawx il-poter u l-leġittimita f’idejn grupp żgħir ta’ nies.
