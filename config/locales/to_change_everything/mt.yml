        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: |-
          Il-problema hi

          r-rappreżentazzjoni
        right_text_html: |-
          Jista’ biss ikollok il-poter jekk tużah; tista’ titgħallem x’hinuma l-interessi tiegħek billi taġixxi fuqhom. Meta kull sforz li jista’ jintuża biex ibiddel l-affarijiet fid-dinja ikollu jgħaddi mill-kanali ta’ rappreżentanti jew tal-protokol tal-istituzzjonijiet, niġu aljenati minn xulxin u mill-potenzjal li kull waħda u wieħed minna għandu. Kull aspett tal-poter li għandna fuq ħajjitna u fuq id-dinja bħala individwi ma jibqax jingħaraf, u kważi isir xi ħaga ostili lejna. Il-politikanti li dejjem jiddiżappuntawna juruna biss kemm ċedejna poter minn fuq ħajjitna; l-abbużi u r-razziżmu li jsir mill-pulizija huma sempliċiment il-konsegwenza kerha tax-xewqa tagħna li nevitaw li nieħdu responsabbilita tal- komunitajiet tagħna. Fl-era diġitali, fejn kulħadd irid prattikament iservi tas-segretarja/u tiegħu/għha innifsu/innifisha biex jimmeniġja id-dehra publika tiegħu/għha, ir-reputazzjoni tagħna saret purament xi ħaġa esterna. Li kieku ma konniex daqstant iżolati minn xulxin, nikkompetu ma’ xulxin biex inbiegħhu lilna nfusna fuq is-swieq soċjali u professjonali, kieku konna ninvestu daqstant ħin u enerġija f’dawn il-profili? – għoġġiela tad-deheb magħmulin

          fix-xbieha tagħna nfusna?

          Fil-verita’ ħadd ma jista’ jiġi ridiċut għall-xejn. Ħadd u xejn ma jista’ jirrapreżentana. Għandna bżonn aktar preżenza, l-immedjat, u l-kuntatt dirett ma’ xulxin, kontroll dirett fuq ħajjitna – xi ħaġa li l-ebda rappreżentant jew rappreżentazzjoni ma tista’

          ttina.
