      hierarchy:
        left_text_html: il-problea hija il-ġerarkija
        right_text_html: 'Hemm ħafna mekkaniżmi li jintużaw sabiex tiġi imposta l-inugwaljanza.
          Ftit minnhom jiddependu minn sistemi ċentralizzati bħas-sistema tal-qorti.
          Oħrajn jiffunzjonaw b’modi iktar informali bħall-”gender roles”. Ftit minn
          dawn il-mekkaniżmi kważi ġew kompletament mormija l-baħar. Illum, ftit hawn
          min għadu jemmen fid-dritt divin tar-rejiet per eżempju, allavolja għall-mijiet
          ta’ snin, ftit kienu jimmaġinaw soċjeta’ li tista’ taħdem b’mod ieħor. Mekkaniżmi
          oħra huma tant ingranati f’ħajjitna li lanqas biss nistgħu nimmaġinaw kif
          tista’ tkun ħajjitna mingħajrom. Min jista’ jimmaġina dinja mingħajr id-dritt
          tal-propjeta’, per eżempju? Madanakollu, dawn huma kollha kuntratti soċjali
          u xejn iżjed. Huma reali, imma mhux inevitabbli. L-eżistenza tas-sidien
          tal-propjeta’ u s-CEOs tal-kumpaniji ma hijiex naturali jew neċessarja jew
          ta’ benefiċċju iktar mill-eżistenza tal-imperaturi. Dawn il-mekkaniżmi żviluppaw
          flimkien, u jirrinfurzaw lil xulxin. L-istorja tar-razziżmu per eżempju
          ma tistax tifridha mill-istorja tal-kapitaliżmu: L-ebda minnhom ma setgħet
          tkun possibli mingħajr il-koloniżżazjoni u l-iskjavitu’. Biex inpoġġuga
          mod ieħor: sakemm jeżistu il-pulizija, lil min taħseb li dawn se jagħtu
          fastidju? Sakemm jeżistu l-ħabsijiet, min taħseb li se jimlihom? Sakemm
          jeżisti il-faqar, min taħseb li ser ikun fqir? Huwa naive li temmen li nistgħu
          nilħqu l-ugwaljanza f’soċjeta’ li hija bbażata fuq il-ġerarkija. Tista’
          ddawwar il-karti kemm trid, imma l-mazz se jibqa’ l-istess...'
