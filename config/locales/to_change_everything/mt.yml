      power:
        left_text_html: ibda’ billi tfittex il-poter, mhux l-awtorita’
        right_text_html: |-
          Il-ħaddiema li jaħdmu għandhom il-poter; dawk ta’ fuqhom u li jgħidulhom x’għandhom jagħmlu għandhom l-awtorita’. Dawk li jikru l-propjeta’ fejn jgħixu u jżommu l-bini f’kundizzjoni tajba għandhom il-poter; is-sidien tal-propjeta’ għandhom l-awtorita’. Xmara għandha l-poter; il-permess li bih jista’ jinbena ‘river dam’ jagħti l-awtorita’. Fil-verita`, ma hemm xejn oppressiv fil-poter. Ħafna tipi ta’ poter jistgħu jservu għall-proċess tal-liberta’ u l-ħelsien: il-poter li tieħu ħsieb lil dawk li tħobb, li tiddefendi lilek innifsek u li tirrisolvi argumenti li jistgħu jinqalgħu, il-poter li teżerċita l-prattika ta’ l-’acupuncture’ fuq xi ħadd, li ssuq dagħjsa jew li taqbeż fuq trapeze. Ukoll, hemm ħafna modi ta’ kif wieħed jiżviluppa l-kapaċitajiet li jżidu l-liberta’ ta’ ħaddieħor. Kull persuna li taġixxi b’mod li bih tilħaq il-potenzjal tagħha, tkun qed toffri rigal

          lil ħaddieħor.

          Minn naħa l-oħra, l-awtorita’ imposta fuq persuni oħra, tixorbilhom il-poter tagħhom. U kull ħaga li int tieħu mingħand persuni oħra bissaħħa ta’ l-awtorita’, ħaddieħor se joħodha lilek. L-awtorita’ dejjem tiġi

          minn fuq:

          Is-suldat jobdi lil ġeneral, li jobdi lill-president, li jġib l-awtorita’ tiegħu

          mill-kostituzzjoni—

          Il-qassis jirrispondi għall-arċisqof, l-arċisqof lill-papa, il-papa lill-iskrittura, li ġġib l-awtorita’ tagħha minn Alla— L-impjegat jirrispondi lejn min iħaddmu, min iħaddem jirrispondi lil klienti tiegħu, li jġibu l-awtorita’ mis-simbolu tal-flus: l-ewro— L-uffiċjal tal-pulizija jmexxi ‘warrant’ iffirmata mill-maġistrat, li jġib l-awtorita’

          mill-liġi—

          Il-propjeta’, il-flus – fil-quċċata ta’ dawn il-piramidi, lanqas biss insibu nies qarrieqa, sempliċiment kostruzzjonijiet soċjali: iħirsa li jillupjaw

          lill-umanita’.

          F’din is-soċjeta’, il-poter u l-awtorita’ tant huma meqjusin bħala ħaġa waħda, li bilkemm nistgħu niddistingwuhom: Nistgħu biss nakkwistaw il-poter billi nħallsu bl-ubbidjenza. Madanakollu, il-poter ma jiswa’ xejn

          bla liberta’.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: Ibda’ b’relazzjonijiet mibnija fuq il-fiduċja
        right_text_html: Għall-kuntrarju ta’ l-awtorita’, il-fiduċja titfa’ l-poter
          f’idejn dawk li jikkonferixxuha u mhux dawk li jirċievuha. Persuna li akkwistat
          il-fiduċja ta’ ħaddieħor ma għandiex bżonn l-awtorita’. Jekk xi ħadd ma
          ħaqqux il-fiduċja ta’ l-oħrajn, żgur li ma għandiex tingħatalu l-awtorita’!
          Madanakollu, hemm xi ħadd li ma nafdawhx iktar mill-politikanti jew mill-kbarat?
          Mingħajr żbilanċi ta’ poter imposta minn fuq, in-nies għandhom inċetiva
          biex isolvu l-kunflitti ta bejniethom skont is-sodisfazzjon reċiproku tagħhom-li
          jirbħu l-fiduċja ta’ xulxin. Il-ġerarkiji, minn naħa l-oħra, ineħħu dan
          l-inċentiv, u jħallu lil min għandu l-awtorita’ biex jgħaffeġ fuq kulħadd.
          Fl-aqwa tagħha, il-ħbiberija hija għaqda bejn individwi ugwali li jissapportjaw
          u jisfidaw lil xulxin, filwaqt li jirrispettaw l-awtonomija ta’ xulxin.
          Dan huwa kejl tajjeb ta’ kif għandna nevalwaw ir-relazzjonijiet tagħna kollha.
          Mingħajr il-limitazzjonijiet li huma imposta fuqna llum il-ġurnata- bħaċ-ċitaddinanza,
          l-illegalita’, il-propjeta’ u d-dejn, nistgħu nerġgħu nibdew nibnu r-relazzjonijiet
          tagħna ibbażati fuq l-assoċjazzjoni ħielsa u l-għajnuna reċiproka.
