      intro:
        left_text_html: Ако можеше да промениш нещо, какво би било то? Би ли отишъл
          на дълга ваканция до края на живота си? Би ли направил така, че горивата,
          които използваме, да не предизвикват промени в климата? Би ли поискал повече
          етичност от банки и политици? Със сигурност, ако оставиш всичко по старому,
          не е реално да очакваш различни резултати. Нашите лични финансови и емоционални
          борби са отражение на глобалните сътресения и катастрофи. Бихме могли да
          прекараме остатъка от дните си, опитвайки се да потушим тези пожари един
          по един, но всички те произлизат от общ източник. Нито едно решение „на
          парче“ няма да помогне, нужно е да преосмислим всичко през призмата на една
          различна логика.
        right_text_html: За да промениш едно нещо, започни да променяш всичко.
      self:
        left_text_html: започни със самоопределение
        right_text_html: |-
          Фантомът на свободата все още витае в нашия свят, уж изграден около тази идея. Беше ни обещана пълна свобода на избор: всички институции в нашето общество на хартия би трябвало да ни я осигуряват. Ако имаше пълна свобода да избираш, какво би правил в този момент? Помисли за огромния потенциал в живота си: взаимоотношенията, които би могъл да имаш,

          изживяванията, които би могъл да изпиташ, всички неща, с които би могъл да направиш живота си смислен и значим. Когато се роди, изглеждаше сякаш няма граници за това какъв можеш да станеш. Ти представляваше чиста възможност. Обикновено не се замисляме за нищо от това. Единствено в най-красивите моменти, когато се влюбваме или постигаме голям напредък, или пък посещаваме някоя далечна земя, успяваме да зърнем всички шеметни реалности, които бихме могли да изживеем. Какво ти пречи да реализираш пълния си потенциал? До каква степен влияеш на средата около теб или на начина, по който прекарваш времето си? Бюрокрацията, която те оценява и класифицира спрямо това колко добре следваш инструкции; икономиката, в която получаваш шансове спрямо това каква печалба генерираш; главнокомандващите, които твърдят, че единственият начин „да бъдеш възможно най-доброто”, е да се подчиниш на тяхната власт — доколко тези неща ти позволяват да вземеш най-доброто от живота по твой си начин? Истината е, че всички ние имаме пълна свобода на избора: не защото тя ни е дадена, а защото дори и най-тоталитарната диктатура не може да ни я отнеме! И въпреки това, в същия момент, в който започнем да мислим и действаме за себе си, ние влизаме в сблъсък със същите тези институции, които уж трябва да ни

          осигурят свободата.
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: започни да отговаряш пред себе си
        right_text_html: |-
          Мениджъри и данъчни обожават да говорят за личната отговорност. Но ако поемем пълна отговорност за всички наши действия, бихме ли

          следвали техните наредби? През човешката история повече вреди са били нанесени от подчинение, отколкото от злонамереност. Арсеналът на световните армии е физическото проявление на нашата готовност да отстъпим пред волята на други хора. Ако искаш да си сигурен, че никога няма да допринесеш за война, геноцид или потисничество, първата стъпка е да спреш да изпълняваш заповеди. Това се отнася също и за ценностите ни. Безброй управници и книги за управлението изискват твоето безропотно подчинение. Но дори да желаеш да отстъпиш отговорността за решенията си на някакъв бог или на някаква догма, как решаваш кой да е той или каква да е тя? Независимо дали ти харесва, или не, ти си този, който трябва да избере. Обикновено хората просто правят този избор според това кое е най-познатото или удобното. Ние сме неминуемо отговорни за своите вярвания и решения. Когато отговаряме пред себе си, а не пред началници или заповеди, пак е възможно да стигнем до конфликт помежду си, но тогава поне ще е заради нашите собствени убеждения, без ненужно да допринасяме за трагедии, от които печелят други.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: започни да търсиш сила, не власт
        right_text_html: |-
          Работниците, които се трудят, притежават сила; шефовете, които им казват какво да правят, имат власт. Наемателите, които поддържат дадена сграда, имат сила; хазяинът, чието име е на нотариалния акт, има власт. Една река има сила; разрешителното за строеж на язовир дава власт тази сила да се използва. Силата сама по себе си не е потисническа. Много видове сила могат да бъдат освобождаващи: силата да се грижиш за тези, които обичаш, да се защитаваш и да разрешаваш конфликти,

          да извършваш акупунктура, да управляваш лодка или хвърчило. Съществуват начини да развиеш своите умения, като в същото време увеличаваш личната свобода и на другите. Всеки човек, който работи за това да постигне пълния си потенциал, прави подарък на

          всички останали. Властта над останалите, от друга страна, узурпира и отнема тяхната сила. А това, което вземеш от другите, други ще вземат и от теб. Властта винаги идва отгоре: войникът се подчинява на генерал, който отговаря пред президента, който черпи властта си от Конституцията.

          Свещеникът се подчинява на епископ, епископът – на патриарх, а патриархът – на свято писание, което

          черпи властта си от Бог.

          Служителят отговаря пред шефа, който служи на клиента, чиято власт произтича от парите. Полицаят извършва обиск, разрешението за който е дадено от прокурора, чиято власт произтича от

          закона.

          Да си мъж; да си бял; да имаш собственост — на върха на всички тези пирамиди даже не откриваме тирани, а просто социални идеи: духове, хипнотизиращи човечеството. В сегашното общество силата и властта са толкова свързани, че трудно можем да ги различим: единственият начин да добием сила, е като разменим за нея нашето подчинение. И въпреки това, без свобода силата не струва нищо.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: започни с взаимоотношения, основани на доверие
        right_text_html: |-
          За разлика от властта, доверието концентрира силата в ръцете на тези, които го предлагат, а не на тези, които го получават. Човек, който е спечелил доверие, не се нуждае от власт. Ако някой не заслужава доверие, той със сигурност не бива да получава власт. Има ли хора, на които да вярваме по-малко от политиците и директорите на корпорации?

          Ако го няма неравновесието на силите, наложено отгоре, хората ще имат стимул да разрешават конфликтите така, че всички да са доволни, като по този начин печелят взаимно доверието си. Йерархията унищожава този стимул, позволявайки на тези, които държат властта, да потушават конфликтите. В най-добрия случай, приятелството е връзка между равнопоставени, които се подкрепят и предизвикват един друг, като в същото време уважават независимостта на другия. Това е един доста добър критерий, по който да измерваме всички наши взаимоотношения. Без принудителните ограничения, които са ни наложени днес — гражданство и нелегалност, собственост и дългове, корпоративни и военни вертикални вериги на командване, бихме могли да изградим наново нашите отношения на основата на свободно сдружаване и взаимопомощ.
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: започни със съгласуване на отделната личност с цялото
        right_text_html: |-
          „Правата ти свършват там, където започват правата на някого другиго“. Според тази логика колкото повече хора има, толкова по-малко

          свобода има всеки. Но свободата не е малък балон от лични права. Не можем толкова лесно да се разграничим от другите. Прозяването и смехът са заразни; ентусиазмът и отчаянието — също. Аз съм съставен от клишетата, които излизат от устата ми, песните, които не излизат от главата ми, настроенията, които прихващам от събеседниците си. Когато карам автомобил, той замърсява въздуха, който дишаш; когато използваш фармацевтични продукти, те се разграждат във водата, която пият всички. Системата, която всички останали приемат, е тази, в която си принуден да живееш — но когато някои хора я поставят под съмнение, ти също получаваш шанс да преосмислиш реалността си. Твоята свобода започва там, където започва моята, и свършва там, където свършва и моята. Ние не сме несвързани същества. Телата ни са изградени от хиляди различни организми, живеещи в симбиоза; не са затворени крепости, а по-скоро сбор от непрекъснати процеси, през които неспирно преминават хранителни вещества и микроби. Живеем в симбиоза с хиляди други животински видове; горите вдишват това, което ние издишваме. Глутница кръвожадни вълци или

          група крякащи жаби е също толкова индивидуална, толкова единна, колкото и всяка една от съставните й части. Ние, хората, не действаме във вакуум, самозадвижени от разума си; приливите и отливите на Вселената неминуемо ни влияят. Езикът ни служи за общуване единствено защото е общ за всички ни. Същото важи и за идеи и желания: можем да ги споделяме, защото са по-големи от нас. Всеки един от нас е съставен от вътрешен хаос от сблъсък на противоположни сили, всяка от които се разпростира отвъд нас през времето и пространството. Когато избираме кои от тях да култивираме, ние определяме какво ще поощрим и във всеки

          друг, когото срещнем.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: започни с освобождаването на желанията си
        right_text_html: В нашето общество дори нещата, които ни влекат, не са избрани
          от нас. Те са култивирани от рекламни агенции и други форми на пропаганда,
          за да ни държат като бягащи хамстери на колелото на пазара. Благодарение
          на индоктринирането, хората са щастливи от това да правят неща, които неизбежно
          ще ги направят нещастни в дългосрочен план. Хванати сме в капана на нашето
          нещастие, а удоволствията са катинарът. За да бъдем напълно свободни, ни
          е нужен начин да управляваме процесите, които създават желанията ни. Освобождаването
          не значи просто изпълнението на желанията, които имаме днес. То е разширяването
          на усещането ни за това какво е възможно, така че желанията ни да могат
          да се променят заедно с реалностите, които те ни карат да създаваме. Това
          означава да се отвърнем от удоволствието, което ни носи командването, доминацията
          или притежанието, и да търсим удоволствия, които да ни изскубнат от машината
          за подчинение и конкуриране. Ако някога си се преборвал с пристрастеност,
          значи разбираш поне малко какво e да трансформираш желанията си.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: започни с бунт
        right_text_html: |-
          Тесногръдите хора често обвиняват определена група за проблемите на системата — евреите за капитализма, задвижван от печалбата; имигрантите за рецесията в икономиката. По същия начин, хората обвиняват отделни политици за корупцията в политиката. Но проблемът е в самата система. Без значение кой държи властта, тя винаги ще произвежда неравенство на силите и унижения за тези отдолу. Проблемът не е, че тази система е повредена, проблемът е в самото ѝ съществуване.

          Враговете ни не са човешки същества, а институциите и процедурите, които ни отчуждават едни от други и от самите нас. Съществуват повече конфликти вътре в нас, отколкото между нас. Същите пукнатини, които разцепват цивилизацията ни, разделят и приятелствата и сърцата ни. Не става въпрос за сблъсък между личности, а между различни видове взаимоотношения, различни начини на живот. Когато откажем да играем ролята си в господстващия обществен ред, отваряме още повече тези пукнатини, окуражавайки и другите да заемат позиция.

          Най-добре би било да премахнем доминацията изцяло — не да се опитваме да я направим по-честна, не да сменяме позициите на ощетяващия и ощетения, не да стабилизираме системата, като я реформираме. Смисълът на про19

          теста не е да изискваме по-легитимни правила или управници, а да покажем, че можем да действаме със собствени сили, окуражавайки другите да направят същото и обезкуражавайки властите да се намесят. Тук не става въпрос за война, за двустранен военен конфликт, а поскоро за заразно неподчинение. Не е достатъчно само да образоваме и да обсъждаме, чакайки сърцата и умовете да се променят. Докато идеите не са изразени в действия, които изправят хората пред конкретни избори, разговорите остават абстрактни. Повечето хора обикновено стоят настрана от теоретическите дискусии, но когато нещо се случва, когато залозите са високи и могат да се видят значими разлики между противниковите страни, хората ще заемат позиция. Не ни е нужно единодушие, нито задълбочено разбиране на целия свят, нито карта към точната дестинация — единствено смелостта да

          потеглим по различен път.
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: проблемът е в контрола
        right_text_html: |-
          Какви са знаците, че си попаднал в оскърбителни взаимоотношения? Насилникът може би се опитва да контролира поведението ти или да манипулира мислите ти; да ограничава или регулира достъпа ти до ресурси; да използва заплахи или насилие срещу теб; или да те държи в позиция на зависимост, под постоянно наблюдение. Това описва поведението на индивидуалните насилници, но също така се отнася и за данъчната администрация, службите за сигурност и почти всички други институции, управляващи обществото ни. На практика всички от тях са

          основани на идеята, че човешките същества трябва да бъдат управлявани чрез полицейски надзор, контрол и ред. Колкото по-големи са неравенствата, които са наложени над нас, толкова повече контрол е необходим, за да бъдат те запазени. В единия край на инерцията на властта контролът е брутално наложен на индивидуално ниво: бомбардировки с дронове, спецчасти, затваряне при строг режим, расово профилиране на заподозрените. В другия край, той е вездесъщ и невидим, внедрен в инфраструктурата на обществото: уравненията, които определят кредитния рейтинг и премиите по застраховките, начините, по които статистиките са събирани и превръщани в градоустройство, дизайнът на сайтовете за запознанства и социалните мрежи. Службите за сигурност наблюдават какво правим онлайн, но не притежават толкова контрол над реалността ни, колкото алгоритмите, определящи какво ще ни излезе, когато влезем в сайта. Когато безкрайният брой житейски възможности бива сведен до масив от опции, кодиран в нули и единици, вече няма да съществува противоречие между системата, която обитаваме, и живота, който можем да си представим — не защото сме постигнали абсолютната свобода, а защото сме усъвършенствали точно обратното. Свободата не значи избор между варианти, а възможността да се формулират въпроси.
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: проблемът е в йерархията
        right_text_html: |-
          Съществуват много различни механизми за налагане на неравенство. Едни зависят от централизиран апарат, като съдебната система, други могат да работят по-неформално, като шуробаджанащината и неравенството на половете. Някои от тези механизми вече напълно са загубили давност. Малцина все още вярват, че кралете са божии наместници, въпреки че в про24

          дължение на векове всяка друга основа за обществото е била немислима. Други са все още толкова вкоренени, че не можем да си представим живота без тях. Кой може да си представи свят без право на частна собственост? Всичко това са обществени конструкции: те са истински, но не и неизбежни. Съществуването на хазяи и директори на фирми не е по-естествено, необходимо или полезно от съществуването на императори. Всички тези механизми са се развили заедно, подпомагайки се един друг. Историята на расизма например е неразривно свързана с тази на капитализма: немислими са без колонизацията, робството и различните привилегии, които разделят работниците и все още определят кой ще пълни затворите и гетата по света. По същия начин, без помощта наструктурата на държавата и другите йерархии в обществото, както и без индивидуалното тесногръдие и фанатизъм, никога не би могло да се наложи системното превъзходство на бялата раса. Фактът, че един чернокож президент на САЩ може да проникне през тези структури, само ги стабилизира: това е изключение, което доказва правилото. Казано другояче, докато има полиция, кого мислите, че ще тормози тя? Докато има затвори, с кого мислите, че ще бъдат пълни? Докато има бедност, кой смятате, че ще бъде беден? Наивно е да вярваме, че можем да постигнем равенство в едно общество, основано на йерархия. Можеш да разбъркаш картите, но тестето

          си остава същото.
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: проблемът е в границите
        right_text_html: |-
          Ако чужда армия завземе земята, отсече дърветата, отрови реките и принуди децата да растат, полагайки клетва за вярност към нея, кой не би се вдигнал на оръжие срещу нея? Но когато местното правителство прави същото, патриотите с готовност предлагат подчинението, данъците и децата си. Границите не ни предпазват, те ни разединяват — създавайки ненужни противоречия с недопуснатите и в същото време замаскирайки истинските различия между допуснатите. Дори и най-демократичното правителство е основано на това разделение между участващи и външни, легитимни и нелегитимни. В Древна Атина, известната родина на демокрацията, само част от мъжете са били включени в политическия процес, а Бащите на Американската конституция са притежавали роби. Гражданството все още налага бариера между допуснати и недопуснати, лишавайки милиони „недокументирани” жители от контрол върху собствения им живот. Идеята на либералите е да разширяват границите на включване, докато целият свят не бъде интегриран в един огромен демократичен проект. Но неравенството е закодирано в самата система. На всяко ниво в това общество, хиляди малки граници ни разделят на властимащи и нямащи: пунктове за проверка, кредитни рейтинги, пароли за база данни, ценови класове. Нужни са ни форми на принадлежност, които не са основани на изключване, които не централизират власт и легитимност, които не водят до емпатия, ограничена в рамките

          на затворени общества.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: проблемът е в избирателната система
        right_text_html: |-
          Единственият начин да имаш сила, е като я овладееш; единственият начин да разбереш какви са интересите ти, е като действаш за тях. Когато всяко усилие да упражниш влияние над света, става чрез представители или е трансформирано в протокол на институциите, ние се отчуждаваме един от друг и се отдалечаваме от собствения си потенциал. Всеки аспект на това посредничество, което

          допускаме, ни се връща като нещо непознато и враждебно за нас. Политиците, които винаги ни разочароват, само показват колко много власт сме им дали над нашия собствен живот; полицейското насилие е тъмната последица от желанието да избягаме от личната отговорност за това, което се случва в

          кварталите ни. В ерата на технологиите, в която всеки човек трябва постоянно да играе ролята на свой собствен секретар, за да представи личния си образ по найдобрия начин, репутацията ни се е превърнала в нещо външно, като вампир, който смуче кръвта ни. Ако не бяхме толкова изолирани един от друг, конкурирайки се да продаваме себе си в толкова много професионални и социални мрежи, бихме ли инвестирали толкова време и енергия да градим тези профили, Златен телец,

          изграден върху нашия образ. Ние сме незаменими. Нито депутати, нито разни абстракции могат да представляват нашите интереси вместо нас. С принизяването на човешките същества до демография и на истинските човешки изживявания до статистика, забравяме кое е ценното и неповторимото в света. Нужни са ни присъствие, непосредственост, пряк контакт помежду ни, собствен контрол над живота ни — неща, които никой депутат или представителство не може да ни даде.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: проблемът е в лидерите
        right_text_html: Водачеството е обществено разстройство, при което мнозинството
          от участващите в дадена група не успява да вземе инициативата или да обмисля
          критично своите действия. Докато свързваме управлението с определени личности,
          или го разбираме като някакво притежание, а не като взаимоотношение между
          хората, винаги ще зависим от лидерите и ще разчитаме на тяхното снизхождение.
          Добрите лидери са също толкова опасни, колкото и очевидно корумпираните,
          с това, че техните достойни за похвала качества само утвърждават рейтинга
          им и уважението на другите към тях, да не говорим за легитимността на самото
          им водачество. Когато полицията се появи на някой протест, първият въпрос
          винаги е „Кой е лидерът на протеста?“ — не защото водачеството е крайно
          необходимо за колективното действие, а защото то представлява уязвимост.
          Конкистадорите са задавали същия въпрос, когато са пристигали в така наречения
          Нов свят; там, където са получавали отговор, това им е спестявало векове
          за покоряване на населението. Докато има лидер, той може да бъде направен
          пионка, заменен или взет като заложник. В най-добрия случай, да бъдем зависими
          от лидерите, е като ахилесова пета; в най-лошия, отново се създават същите
          властнически интереси и структури в организацията, която уж им се противопоставя.
          По-добър вариант е всеки да има своя собствена позиция и усещане за интересите
          си.
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: проблемът е в правителството
        right_text_html: |-
          Правителствата обещават права, но те могат единствено да отнемат свободи. Идеята за правата предполага централизирана сила, която да ги осигурява и предпазва. Но ако държавата е достатъчно силна да гарантира дадено нещо, тя има силата и да го отнеме. Да дадем властта на правителството да реши един проблем, единствено отваря вратата пред него да създаде още проблеми. А и правителствата не генерират силата си от нищото. Силата, която те имат, е нашата сила, която ние можем да приложим многократно по-ефективно без тяхната представителна система. И най-либералната демокрация споделя същите принципи, както и най-деспотичният режим: централизация на властта и легитимността в ръцете на една структура, предназначена да монополизира употребата на сила. Дали бюрократите, които работят в тази структура, отговарят пред крал, президент или електорат няма значение. Законите, бюрокрацията и полицията са по-стари от демокрацията — те работят по същия начин и под демокрация, и под диктатура. Единствената разлика е, че понеже можем да гласуваме кой да ги ръководи, се очаква да ги виждаме като наши — дори когато биват използвани срещу нас. Диктатурите по природа са нестабилни: можеш да избиеш, затвориш зад решетките

          и/или да промиеш мозъците на едно цяло поколение, но децата им ще преоткрият борбата за свобода отново. Но обещаеш ли на всеки човек възможността да наложи волята на мнозинството над събратята си, можеш да обединиш всички в една система, която изправя всеки срещу всеки. Колкото повече влияние хората смятат, че имат над насилническите институции на държавата, толкова по-голяма е подкрепата за тези институции. Може би това обяснява защо експанзията на демокрацията по целия свят съвпада с невероятно неравенство в разпределянето на ресурси и сила: никоя друга система на управление не би могла да стабилизира такава

          нестабилна ситуация. Когато властта е централизирана, хората трябва да добият надмощие над другите, за да окажат някакво влияние над собствените си съдби. Борбите за независимост са канализирани във формата на надпревара за политическа власт: наблюдавайте гражданските войни в постколониалните страни между хора, които преди това са съжителствали напълно мирно. Тези, които държат властта, могат да я задържат единствено като водят постоянни войни срещу собствените си народи, както и срещу чужди такива. Националната гвардия на САЩ например бе върната от Ирак, за да бъде изпратена в
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: проблемът е в печалбата
        right_text_html: |-
          Парите са съвършеният механизъм за създаване на неравенство. Те са абстрактни: изглежда, сякаш могат да представляват всичко. Те са универсални: хора, които нямат нищо общо помежду си, ги приемат като неизменна част от живота си. Те са безлични: за разлика от наследствените привилегии от миналото, те могат да се предават мигновено от един човек на друг. Те са гъвкави: колкото по-лесно е да промениш мястото си в една йерархия, толкова по-стабилна е самата йерархия. Мнозина, които биха въстанали срещу диктатор, с готовност приемат властта на пазара. Когато цялата стойност е концентрирана в едно-единствено средство за размяна, дори невъз36

          становими моменти от живота ни са изпразнени от съдържание, превръщайки се в жетони за една бездушна, въображаема машина на властта. Всичко, което не може да бъде изразено количествено в пари, остава на заден план. Животът става едно боричкане за финансова печалба: всеки срещу всеки, продавай или ще бъдеш продаден. Да печелиш: това значи да добиеш по-голям контрол върху обществените ресурси спрямо останалите. Не можем всички да печелим едновременно; за да може един човек да печели, другите пропорционално трябва да губят. Когато инвеститорите печелят от труда на служителите, това значи, че колкото повече служителите работят, толкова по-голяма става финансовата пропаст между класите. Система, задвижвана от печалбата, създава бедност със същата скорост, с която концентрира богатството. Натискът да се конкурираме, генерира технологични иновации по-бързо от която и да е минала система, но заедно с тях произвежда и постоянно нарастващи неравенства: преди конници са господствали над пешеходци, докато сега свръхзвукови бомбардировачи летят над главите на мотоциклетисти и бездомни. И защото всеки трябва да гони печалба, вместо да осъществява нещата просто заради самите тях, резултатите от целия този труд могат да са пагубни. Климатичните промени са само поредната катастрофа, която дори и най-влиятелните капиталисти не могат да спрат. Нещо повече, капитализмът не възнаграждава предприемачите за справяне с кризите, а за

          извличане на печалби от тях.
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: проблемът е в собствеността
        right_text_html: |-
          В основата на капитализма стои правото на собственост – още една обществена идея, която сме наследили от крале и аристократи. Днес, собствеността сменя притежателите си по-лесно, но концепцията е същата: идеята за владеенето легитимира употребата на насилие, за да бъдат наложени изкуствените неравенства при достъпа до земя и ресурси. Някои хора си въобразяват, че собствеността може да съществува без държавата. Но правото на собственост не значи нищо без централизирана власт, която до го налага, а докато тази централизирана власт съществува, нищо не е наистина твое. Парите, които печелиш, са печатани от държавата и са подложени на данъци и инфлация. Номерата на колата ти са управлявани от полицията.

          Домът ти не принадлежи на теб, а на банката, която ти е предложила кредита; дори и имотът да е твой, пак плащаш данък на държавата и тя има право да го национализира,

          без да те пита.

          Какво е нужно, за да защитим нещата, които са важни за нас? Правителствата съществуват единствено въз основата на взетото от нас, те винаги ще вземат повече, отколкото ще дават. Пазарите ни възнаграждават само ако отнемем нещо от съгражданите си, и обратното. Единствената истинска застраховка е в обществените връзки помежду ни: ако искаме да осигурим защитата си, нужни са ни мрежи за взаимопомощ, които да ни предпазват. Без пари или права за собственост нашите взаимоотношения с вещите биха били определени от отношенията помежду ни. А в момента е точно обратното: взаимоотношенията ни с хората се определят от тези с вещите. Премахването на собствеността не означава да загубиш вещите си; означава, че нито един полицай или срив на финансовите пазари няма да може да отнеме нещата, от които зависиш. Вместо да отговаряме пред бюрокрация, бихме започнали с човешките нужди; вместо да се възползваме един от друг, бихме оползотворявали преимуществата на нашата взаимосвързаност. Най-големият страх на един мошеник е

          общество без собственост — защото без нея той ще получава само това, което заслужава. Без пари, хората се оценяват по това с какво допринасят за живота на другите, не по това дали могат да подкупят другите да свършат нещо за тях. Без печалба, всяка постъпка трябва да бъде отплата сама по себе си, така че няма да има стимул за безсмислени или разрушителни дейности. Нещата, които имат смисъл в живота — страст, приятелство, щедрост — са налични в изобилие. Нужни са легиони от полицаи и инспектори, за да ни налагат недоимъка, който ни държи в капана на тази надпревара един срещу друг.
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: последното престъпление
        right_text_html: Всеки обществен строй е основан на престъпление спрямо предишния
          такъв – престъплението, което е сменило статуквото. След това новият строй
          започва да се приема като легитимен, тъй като хората започват да го приемат
          за даденост. Основополагащото престъпление за създаването на Съединените
          американски щати например е бунтът срещу властта на английския крал. Основополагащото
          престъпление на бъдещето общество, ако успеем да преживеем сегашното, ще
          унищожи днешните закони и институции. Категорията „престъпление“ включва
          всичко, което надхвърля ограниченията на обществото, — и най-доброто, и
          най-лошото такова. Всяка система е преследвана от всичко, което не съумява
          да включи в себе си или да контролира. Всеки обществен строй съдържа семената
          на собственото си унищожение. Нищо не е вечно; това се отнася също и за
          империи и цивилизации. Но какво може да наследи тази? Можем ли да си представим
          обществена организация, която не е основана на разделянето на живота на
          легитимен и нелигитимен, законен и незаконен, управляващи и управлявани?
          Какво може да бъде последното „престъпление”?
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: 'АНАРХИЯ е това, което се случва винаги, когато редът не се налага
          чрез принуда. Това е свобода: процесът, при който постоянно преоткриваме
          самите себе си и взаимоотношенията помежду ни. Всеки свободно възникващ
          процес или явление — гора, приятелски кръг, собственото ти тяло — е анархична
          хармония, която се запазва чрез постоянна промяна. Контролът от горе надолу,
          от друга страна, може да бъде поддържан единствено чрез ограничения и принуда:
          налагането на дисциплина в класните стаи на училищата; фермите, в които
          пестициди и хербициди защитават стерилни редове генномодифицирана царевица;
          крехката хегемония на държавата суперсила. АНАРХИЗМЪТ е идеята, че всеки
          има пълна свобода на самоопределение. Никой закон, правителство или процес
          за вземане на решенията не е по-важен от нуждите и желанията на самите човешки
          същества. Хората трябва да са свободни да градят отношенията си с цел взаимно
          удовлетворение и да защитават интересите си по начин, угоден на тях. Анархизмът
          не е догма или програма. Той не е система, която уж би сработила, при положение
          че е приложена правилно (като демокрацията), нито е цел, която да бъде изпълнена
          в някакво далечно бъдеще (като комунизма). Той е начин на поведение и отношение,
          който можем да приложим на практика веднага. Разглеждайки всяка ценностна
          система или начин на поведение, мо44'
        second_html: |-
          жем да започнем с въпроса: Как това разпределя властта? АНАРХИСТИТЕ се противопоставят на всяка форма на йерархия — всяка законност, която концентрира власт в ръцете на олигарси, всеки механизъм, който ни отдалечава от пълния ни потенциал. Против затворените системи, ние с нетърпение гледаме към непознатото, което предстои, а хаосът вътре в нас ни позволява да бъдем свободни.

          За повече информация на български посетете

          katarzis.org

          This project is brought to you by CrimethInc., an international network of aspiring revolutionaries. You can find other examples of our work at crimethinc.com—including books, films, podcasts, and firsthand reports from uprisings around the world. We produced this text in cooperation with comrades from across five continents; hundreds of volunteers donated to cover the printing costs so you could hold this in your hands. A digital version is available in over a dozen languages at tochangeeverything.com, where you may obtain more paper copies for the cost of postage alone along with a wide range of related media and resources.
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: ''
        right_text_html: |-
          Когато видим общото между всички различни институции и механизми за доминация, става очевидно, че индивидуалните ни борби са част от нещо по-голямо от нас, от нещо, което би могло да ни свърже. Когато се обединим на основата на тази връзка, всичко се променя: не само борбата ни, но и усещането ни за контрол, възможността ни да изпитваме радост, чувството, че животът ни има смисъл. Всичко, което се изисква, е да започнем да действаме, следвайки различна логика...

          тайната е да започнеш.
