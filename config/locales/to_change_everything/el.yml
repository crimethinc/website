      leaders:
        left_text_html: the problem is<br /><span class="bold">leaders</span>
        right_text_html: Αυτές καλλιεργήθηκαν μέσα μας από την διαφήμιση και άλλες
          μορφές προπαγάνδας για να μας κρατούν δεσμευμένους να τρέχουμε στα γρανάζια
          βαρετών εργασιών και ηλίθιων αναγκών ώστε να ικανοποιούμε τις επιταγές της
          αγοράς. Λόγω της πλύσης εγκεφάλου, οι άνθρωποι είναι αρκετά ικανοποιημένοι
          με τους εαυτούς τους όταν κάνουν πράγματα που σε βάθος χρόνου θα τους αποφέρουν
          δυστυχία. Είμαστε φυλακισμένοι στα βάσανα μας και οι απολαύσεις μας είναι
          το λουκέτο της φυλακής μας. Για να είμαστε πραγματικά ελεύθεροι, πρέπει
          να έχουμε άμεση επιρροή στις διαδικασίες που παράγουν τις επιθυμίες μας.
          Απελευθέρωση δεν σημαίνει απλά να ικανοποιήσουμε τις επιθυμίες που έχουμε
          σήμερα αλλά να επεκτείνουμε την αίσθηση αυτού που είναι εφικτό, έτσι ώστε
          οι επιθυμίες μας να μπορούν να μεταβληθούν μαζί με τις πραγματικότητες που
          μας οδηγούν να τις δημιουργήσουμε. Αυτό σημαίνει πως οι επιθυμίες έχουν
          την δύναμη να μας απομακρύνουν από την απόλαυση που κερδίζουμε όταν καταπιέζουμε,
          κυριαρχούμε και κατέχουμε τους άλλους, με σκοπό να αναζητήσουμε την απόλαυση
          που μας απελευθερώνει από τους μηχανισμούς της υποταγής και της ανταγωνιστικότητας.
          Εάν κατάφερες ποτέ να υπερνικήσεις κάποια μορφή εθισμού, τότε σίγουρα έχεις
          μια πρώτη γεύση του τί σημαίνει να μεταμορφώνεις τις επιθυμίες σου.
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: 'Όταν όλη η αξία συγκεντρώνεται σε ένα μόνο μέσο, ακόμα και
          οι πιο αξιόλογες στιγμές της ζωής μας χάνουν την σημασία τους και το νόημα
          τους καθώς μετατρέπονται σε υπολογιστικές μονάδες μιας αφηρημένης μέτρησης
          ικανοτήτων. Κάθε τι που δεν μπορεί να χωρέσει σε οικονομικές ποσοτικοποιήσεις
          τοποθετείται στην ζώνη των αδιάφορων και αποτυχημένων πραγμάτων. Η ζωή μετατρέπεται
          σε ένα αγωνιώδες σκαρφάλωμα προς την οικονομική αποκατάσταση:  ο καθένας
          εναντίον όλων, όλοι και όλα πωλούνται και αγοράζονται. «Να έχεις κέρδος»,
          «Να βγεις κερδισμένος»: αυτό σημαίνει να αποκτάς μεγαλύτερο έλεγχο επάνω
          στα εφόδια μιας κοινωνίας που είναι απαραίτητα και για όλους τους άλλους.
          Δεν μπορούμε όλοι μας να αποκτήσουμε κέρδος την ίδια στιγμή. Μιλώντας αναλογικά,
          για να αποκτήσει ένα άτομο κέρδος όλοι οι άλλοι πρέπει να χάσουν επιρροή
          και πρόσβαση. Όταν οι επενδυτές βγαίνουν κερδισμένοι από την εργασία των
          εργατών τους, αυτό σημαίνει ότι όσο περισσότερο δουλεύουν οι εργάτες τόσο
          μεγαλύτερο γίνεται το χάσμα της ανισότητας ανάμεσα σε αυτούς και τα αφεντικά
          τους. Ένα σύστημα που βασίζεται στο κέρδος παράγει φτώχεια για κάποιους
          την ίδια στιγμή που συγκεντρώνει πλούτο στα χέρια κάποιων άλλων. Η πίεση
          της ανταγωνιστικής οικονομίας παράγει καινοτομίες γρηγορότερα από ποτέ αλλά
          μαζί με αυτές παράγονται διαρκώς'
        right_text_html: "Ξεκίνα με \nΕΞΕΓΕΡΣΗ"
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: |-
          Το πρόβλημα είναι
          Η ΙΔΙΟΚΤΗΣΙΑ
        right_text_html: |-
          Οι φανατικοί και οι μισαλλόδοξοι, αρχετυπικά κατηγορούν μια συγκεκριμένη ομάδα για κάθε συστημικό πρόβλημα – φταίνε οι Εβραίοι για την κερδοσκοπία του καπιταλισμού, οι μετανάστες για την οικονομική ύφεση- με τον ίδιο τρόπο που οι άνθρωποι συνήθως κατηγορούν συγκεκριμένους πολιτικούς για την διαφθορά της πολιτικής. Όμως το πρόβλημα είναι στην πραγματικότητα το ίδιο το σύστημα. Δεν έχει σημασία ποιος κρατάει τα ηνία, το σύστημα θα συνεχίσει να παράγει τις ίδιες μεγάλες ανισότητες, όλες αυτές τις άπειρες μικρές και μεγάλες ταπεινώσεις και τις καταστροφές ατόμων και ολόκληρων κοινωνικών ομάδων. Το θέμα δεν είναι ότι το σύστημα έχει κάποιο πρόβλημα που μπορεί να διορθωθεί, το πρόβλημα βασικά είναι πως το σύστημα συνεχίζει να δουλεύει ακατάπαυστα με την πλήρη τελειότητα της λειτουργίας μιας μηχανής.

          Για αυτό τον λόγο, οι εχθροί μας δεν είναι ανθρώπινα όντα αλλά οι συγκεκριμένοι θεσμοί και οι κοινωνικές συνήθειες που μας αποξενώνουν από τους συνανθρώπους μας και από τους ίδιους μας τους εαυτούς. Υπάρχουν περισσότερες συγκρούσεις μέσα μας παρά ανάμεσα μας. Τα ίδια ελαττώματα που χαρακτηρίζουν τον πολιτισμό μας, διαπερνούν και τις φιλίες και τις καρδιές μας. Αυτή δεν είναι μια μάχη ανάμεσα σε ανθρώπους αλλά ανάμεσα σε διαφορετικούς τρόπους ανθρώπινης συσχέτισης, μια μάχη ανάμεσα σε διαφορετικούς τρόπους ζωής. Όταν αρνούμαστε τους ρόλους μας στα πλαίσια της κυρίαρχης τάξης πραγμάτων αναδεικνύουμε αυτά τα ελαττώματα και καλούμε τους υπόλοιπους να πάρουν θέση σε σχέση με αυτά. Το καλύτερο που έχουμε να κάνουμε είναι να απαλλαγούμε για πάντα από την κυριαρχία - όχι να προσπαθούμε μια ζωή να διαχειριστούμε με «δίκαιο» τρόπο τις άπειρες καταστροφικές λεπτομέρειες που προκύπτουν, όχι να αλλάζουμε συνεχώς θέσεις και ποσοστά ανάμεσα σε πόσους επιβάλλονται και πόσους υποφέρουν κάθε φορά. Να σταματήσουμε να ισχυροποιούμε το σύστημα ελπίζοντας σε μεταρρυθμίσεις του. Το ζήτημα των διαδηλώσεων δεν είναι να ζητήσουμε ποιο δίκαιους και καταξιωμένους κυβερνήτες, πιο

          αποδεκτούς νόμους και κανόνες αλλά να δηλώσουμε ότι μπορούμε και θέλουμε να πάρουμε την ζωή μας στα χέρια μας, να δράσουμε με τις δικές μας δυνάμεις, να ενθαρρύνουμε και τους υπόλοιπους να κάνουν τα ίδιο και να αποτρέψουμε τις αρχές από το να παρέμβουν και να αναμειχτούν. Αυτό δεν είναι ένα ζήτημα πολέμου- μια αβυσσαλέα σύγκρουση ανάμεσα σε στρατιωτικοποιημένους εχθρούς- αλλά μάλλον ζήτημα μαζικής μεταδοτικής ανυπακοής.Δεν είναι αρκετό όμως απλά να μορφώνουμε ο ένας τον άλλον, να συζητάμε και να περιμένουμε πότε θα αλλάξουν οι καρδιές και τα μυαλά των ανθρώπων γύρω μας. Εάν οι ιδέες δεν εκφραστούν μέσα από την πράξη, εάν δεν έρθουμε αντιμέτωποι με όσους μας επιβάλλουν συμπαγείς επιλογές και κυριαρχικά συμφέροντα, τότε αυτή η συζήτηση θα μείνει απλά στα πεδία των αφηρημένων φιλοσοφικών ιδεών.Οι περισσότεροι τείνουν να μένουν σε απόσταση και αδιάφοροι από θεωρητικές συζητήσεις. Όταν όμως κάτι πραγματικά συμβαίνει, όταν τα διακυβεύματα είναι υψηλά και οι άνθρωποι μπορούν να δουν ευδιάκριτα νοήματα και αντικρουόμενες πλευρές με διαφορές που έχουν σημασία, τότε επιλέγουν να πάρουν θέση.Δεν χρειαζόμαστε ομοφωνία, ούτε μια πλήρη κατανόηση ολόκληρου του κόσμου, ούτε ένα οδικό χάρτη για συγκεκριμένους προορισμούς. Το μόνο που χρειαζόμαστε είναι το θάρρος να ανοιχτούμε προς ένα καινούργιο μονοπάτι.
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: 'Το θεμέλιο του καπιταλισμού είναι οι τίτλοι ιδιοκτησίας-
          άλλη μια κοινωνική κατασκευή που κληρονομήσαμε από τους βασιλιάδες και τους
          αριστοκράτες. Η ιδιοκτησία γλιστρά από χέρι σε χέρι πιο γρήγορα παρά ποτέ
          στην εποχή μας, και όμως το νοητικό κατασκεύασμα παραμένει το ίδιο:'
        right_text_html: |-
          Το πρόβλημα είναι
          Ο ΕΛΕΓΧΟΣ
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: 'Το θεμελιακό έγκλημα της δημιουργίας των Η.Π.Α. ήταν η εξέγερση
          ενάντια στην εξουσία του βασιλιά της Αγγλίας. Το θεμελιακό έγκλημα της μελλοντικής
          κοινωνίας (εάν καταφέρει η ανθρωπότητα να επιβιώσει από αυτήν την κοινωνία
          στην οποία ζούμε τώρα) θα είναι η εξαφάνιση των νόμων και των θεσμών της
          εποχής μας.Η κατηγορία του εγκλήματος συγκρατεί όλα όσα υπερβαίνουν τα όρια
          αυτής της κοινωνίας – συμπεριλαμβανομένων των καλύτερων και το χειρότερων
          από αυτά. Κάθε σύστημα κινδυνεύει από όλα αυτά που δεν μπορεί να ενσωματώσει
          και όλα όσα δεν μπορεί να θέσει υπό τον έλεγχο του. Κάθε υπάρχουσα τάξη
          πραγμάτων συμπεριλαμβάνει τους σπόρους της ίδιας της καταστροφής της.Τίποτα
          δεν διαρκεί για πάντα και αυτό ισχύει και για τις αυτοκρατορίες και τους
          πολιτισμούς. Τι όμως θα μπορούσε να αντικαταστήσει την υπάρχουσα κυρίαρχη
          τάξη; Θα μπορούσαμε να φανταστούμε μια τάξη πραγμάτων που να μην προτάσσει
          τον διαχωρισμό της ζωής σε νόμιμη και λαθραία, σε νομιμότητα και εγκληματικότητα,
          σε κυρίαρχους και υποτελείς; Τι θα μπορούσε να αποτελέσει το ΤΕΛΕΥΤΑΙΟ έγκλημα;Εάν
          κοιτάξουμε προσεχτικά και μελετήσουμε αυτό που οι μηχανισμοί και οι θεσμοί
          της κυριαρχίας έχουν κοινό μεταξύ τους, γίνεται ξεκάθαρο μετά, ότι  και
          όλοι οι ξεχωριστοί αγώνες επίσης, είναι μέρη από κάτι μεγαλύτερο, κάτι που
          θα μπορούσε να μας ενώνει. Όταν πλησιάζουμε ο ένας τον άλλον στην βάση αυτής
          της σύνδεσης, τα πάντα αλλάζουν: όχι μόνο οι αγώνες και οι προσπάθειες μας
          αλλά και ο τρόπος που αντιλαμβανόμαστε την δράση μας, η ικανότητα μας να
          αισθανθούμε χαρά και να είμαστε ευτυχισμένοι, η αντίληψη ότι η ζωή μας έχει
          νόημα τελικά. Το μόνο που χρειάζεται για να αρχίσουμε να συναντάμε ο ένας
          τον άλλον είναι να δράσουμε σύμφωνα με μια διαφορετική λογική, να δώσουμε
          ένα άλλο νόημα στις σχέσεις, τις πράξεις και τις επιλογές μας.'
        right_text_html: 'Χωρίς χρήματα ή τίτλους ιδιοκτησίας, οι σχέσεις μας με τα
          πράγματα θα καθορίζονται από τις σχέσεις μας με τους άλλους. Σήμερα, συμβαίνει
          το ακριβώς αντίθετο: οι σχέσεις μας με τους άλλους καθορίζονται από τις
          σχέσεις μας με τα πράγματα. Το να απαλλαγείς από την ιδιοκτησία δεν σημαίνει
          να χάσεις τα πράγματα που σου ανήκουν. Σημαίνει ότι δεν θα υπάρχει κανένα
          κράτος και καμιά χρηματιστηριακή  κρίση που να μπορεί να σου στερήσει όλα
          όσα χρειάζεσαι και αυτά στα οποία βασίζεσαι για να ζήσεις. Αντί να είμαστε
          υπόλογοι στην γραφειοκρατία, καλύτερα να πάρουμε σαν σημείο εκκίνησης τις
          ίδιες τις ανθρώπινες ανάγκες. Αντί να εκμεταλλευόμαστε ο ένας τον άλλον
          να εκμεταλλευτούμε όλα τα πλεονεκτήματα της αμοιβαιότητας και της αλληλεξάρτησης.
          Ο χειρότερος φόβος ενός παλιανθρώπου είναι μια κοινωνία χωρίς ιδιοκτησία-
          γιατί τότε θα πάρει μόνο αυτό που πραγματικά του αξίζει. Σε έναν κόσμο χωρίς
          χρήματα, οι άνθρωποι κερδίζουν την εκτίμηση των άλλων με την συνεισφορά
          στην ευτυχία τους, όχι με τους εκβιασμούς και τις δωροδοκίες που σκάρωσαν
          ώστε οι άλλοι να δουλεύουνε για αυτούς. Σε μια κοινωνία χωρίς κέρδος, κάθε
          προσπάθεια έχει άμεσα τη δικιά της ανταμοιβή και άρα δεν υπάρχει κίνητρο
          για καταστροφικές και χωρίς νόημα εργασίες. Τα πράγματα που πραγματικά έχουν
          σημασία σε αυτή την ζωή –το πάθος, η συντροφικότητα, η γενναιοδωρία- είναι
          διαθέσιμα σε αφθονία. Απαιτούνται λεγεώνες της αστυνομίας και επιθεωρητές
          ιδιοκτησίας για να επιβληθεί η έλλειψη τους που μας παγιδεύει σε αυτή την
          εξαντλητική βιοπάλη.'
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: |-
          Ποιες είναι οι ενδείξεις πως είσαι σε μια σχέση με κάποιον που σε κακοποιεί; Αυτός που σε κακοποιεί θα προσπαθήσει να ελέγξει την συμπεριφορά σου ή να δυναστεύσει τις σκέψεις σου, να μπλοκάρει ή να ρυθμίσει την πρόσβαση σου στους πόρους διαβίωσης, θα χρησιμοποιήσει απειλές και βία εναντίον σου ή θα σε κρατά σε ένα σημείο επιβεβλημένης δέσμευσης και εξάρτησης υπό συνθήκες διαρκούς παρακολούθησης. Όλα αυτά περιγράφουν τέλεια την συμπεριφορά κάποιου ατόμου που κακοποιεί συστηματικά κάποιο άλλο άτομο, αλλά ταιριάζουν απόλυτα σαν περιγραφές και για την κυβέρνηση, την αστυνομία, την εφορία, τις τράπεζες και κάθε άλλο θεσμό που κυβερνά αυτή την κοινωνία. Πρακτικά όλοι αυτοί οι θεσμοί βασίζονται στην ιδέα πως ο άνθρωπος έχει την ανάγκη να αστυνομευθεί, να τον διαχειριστούν, να τον διευθύνουν.

          Όσο μεγαλύτερες είναι οι ανισότητες και οι ανισορροπίες που μας επιβάλλονται, τόσο μεγαλύτερος είναι και ο έλεγχος που απαιτείται για να διατηρηθούν. Στην μια πλευρά του συνεχούς της εξουσίας, ο έλεγχος  εξασκείται σε ατομικό επίπεδο με απόλυτη βαναυσότητα: σφαίρες και δακρυγόνα, τμήματα ειδικά εκπαιδευμένων και εξοπλισμένων στρατιωτών και αστυνομικών (ΜΑΤ, ΔΙΑΣ, ΔΕΛΤΑ κ.α.), εισαγγελικές παρεμβάσεις, κελιά απομόνωσης, φυλετικές διακρίσεις κ.λ.π., κ.λ.π., κ.λ.π.  Από την άλλη πλευρά, ο έλεγχος είναι πανταχού παρών και αόρατος, σύμφυτος με κάθε κοινωνική δομή:Ισολογισμοί, προϋπολογισμοί και εξισώσεις που καθορίζουν χρηματικές συναλλαγές, πιστώσεις, δάνεια, τόκοι και επιτόκια, μισθοί, συντάξεις και ασφάλιστρα, στατιστικές έρευνες και πολεοδομικοί σχεδιασμοί, η αρχιτεκτονική των ιστοσελίδων γνωριμιών και οι παρακολουθήσεις από τις πλατφόρμες των social media.Η NSA (Εθνική Υπηρεσία Πληροφοριών) παρακολουθεί και καταγράφει όλες τις online κινήσεις μας, δεν έχει όμως την δύναμη ελέγχου που έχουν στην πραγματικότητα μας οι αλγόριθμοι που καθορίζουν τί εμφανίζεται μπροστά μας όταν
        second_html: |-
          αναζητούμε κάτι στο google ή όταν κάνουμε log in στην σελίδα του facebook. Όταν οι άπειρες πιθανότητες της ζωής θα υποβαθμιστούν σε μια κωδικοποιημένη αλληλουχία από μονάδες και μηδενικά, τότε δεν θα υπάρχει πλέον και καμία διένεξη ανάμεσα στο σύστημα που κατοικούμε και την ζωή που ονειρευόμαστε. Και δυστυχώς αυτό θα συμβαίνει, όχι επειδή επιτύχαμε την απόλυτη ελευθερία, αλλά επειδή τελειοποιήσαμε το αντίθετο της. Ελευθερία δεν σημαίνει να επιλέγεις ανάμεσα σε ήδη καθορισμένες απαντήσεις αλλά να μπορείς να καθορίσεις εσύ τις ερωτήσεις.

          Το πρόβλημα είναι
          Η ΙΕΡΑΡΧΙΑ
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: Επειδή αυτές οι ιδέες στην βάση τους είναι πολύ συνηθισμένες
          μπορούν να φανούν χρήσιμες μόνο σε ανθρώπους που είναι ασυνήθιστοι και πραγματικά
          εκπληκτικοί. Κατά μεγάλη μας τύχη ταιριάζεις απόλυτα σε αυτή την περίπτωση.
        right_text_html: To&#8200;<br />change&#8200;<br />everything,<br />start&#8200;<br
          />anywhere.
      take_flight_html: Don’t cling to the old world
