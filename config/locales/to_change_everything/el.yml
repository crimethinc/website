      intro:
        left_text_html: |-
          Εάν μπορούσες να αλλάξεις τα πάντα, τι θα ήταν αυτό που θα άλλαζες; Θα πήγαινες διακοπές για όλο το υπόλοιπο της ζωής σου; Θα έφτιαχνες οικολογικά καύσιμα που θα σταμάταγαν την κλιματική αλλαγή; Θα προσπαθούσες να εφεύρεις τράπεζες και πολιτικούς με ηθική συνείδηση; Σίγουρα δεν υπάρχει τίποτα πιο ανεδαφικό και μη-ρεαλιστικό από το να επιλέξεις να αφήσεις τα πάντα ίδια και απαράλλαχτα και να περιμένεις να προκύψουν από αυτά διαφορετικά αποτελέσματα.

          Η προσωπική μας οικονομική και συναισθηματική καθημερινή πάλη για επιβίωση αντικατοπτρίζεται στις παγκόσμιες καταστροφές, συγκρούσεις και αναταραχές. Θα μπορούσαμε να χαραμίσουμε το υπόλοιπο της ζωής μας προσπαθώντας να σβήσουμε μία- μία αυτές τις πυρκαγιές που ξεσπούν παντού, όμως αυτές θα συνεχίσουν να ανάβουν πάντα από τα ίδια εύφλεκτα υλικά, τα ίδια αίτια. Καμία αποσπασματική λύση δεν θα λύσει το πρόβλημα. Πρέπει να σκεφτούμε ξανά τα πάντα από την αρχή, σύμφωνα με μια διαφορετική λογική.
        right_text_html: To&#8200;<br />change&#8200;<br />anything,<br />start&#8200;<br
          />everywhere.
      self:
        left_text_html: Κάποιοι από αυτούς τους μηχανισμούς έχουν πραγματικά απαξιωθεί.
          Πολλοί λίγοι πια πιστεύουν στην θεϊκή φύση του βασιλιά, παρότι για πολλούς
          αιώνες οποιαδήποτε άλλη θεμελιώδη βάση για την ύπαρξη της κοινωνίας ήταν
          πραγματικά αδιανόητη. Άλλοι μηχανισμοί είναι τόσο βαθιά ριζωμένοι που δεν
          μπορούμε να φανταστούμε καν την ζωή μας χωρίς αυτούς. Ποιος θα μπορούσε
          να μας δώσει μια εικόνα της ζωής χωρίς τίτλους ιδιοκτησίας; Και όμως, όλα
          αυτά είναι απλά κοινωνικές συμβάσεις όμως, αφού τις πιστεύουμε, γίνονται
          πραγματικές, δεν είναι όμως κατά ανάγκη απαραίτητες ή ωφέλιμες δεν είναι
          όλα αυτά που ζούμε μοιραία και αναπόφευκτα. Οι ύπαρξη γαιοκτημόνων και κατόχων
          κάθε είδους τίτλων ιδιοκτησίας δεν είναι σε τίποτα πιο «φυσική», «αναγκαία»
          ή «ωφέλιμη» από την ύπαρξη Αυτοκρατόρων. Όλοι αυτοί οι μηχανισμοί αναπτύχθηκαν
          μαζί και στηρίζουν ο ένας τον άλλον. Η ιστορία του ρατσισμού για παράδειγμα
          είναι αδιαχώριστη από την ιστορία του καπιταλισμού, καμιά από τις δύο αυτές
          ιστορίες δεν μπορεί να κατανοηθεί ξέχωρα από την ανάπτυξη της αποικιοκρατίας,
          του δουλοκτητικού συστήματος ή την φυλετική οργάνωση της εργασίας που ακόμα
          καθορίζει τον τρόπο οργάνωσης των φυλακών και των παραγκουπόλεων αυτού του
          κόσμου.  Με τον ίδιο τρόπο, χωρίς τις δομές του κράτους και τις άλλες ιεραρχίες
          της κοινωνίας μας, ο ατομικός φανατισμός και η μισαλλοδοξία δεν θα μπορούσαν
          ποτέ να οργανώσουν
        right_text_html: |-
          Οι γραφειοκρατίες σε επιβραβεύουν σύμφωνα με τον βαθμό που υπακούς στις οδηγίες τους, η οικονομία σε ενδυναμώνει ανάλογα με το πόσο κέρδος παράγεις για αυτήν, οι νεοσύλλεκτοι αστυνομικοί και στρατιώτες επιμένουν πως «ο καλύτερος τρόπος για να υπάρχεις» είναι να υποτάσσεσαι στις εξουσίες που αντιπροσωπεύουν με τα όπλα τους. Σου επιτρέπει κανένας από όλους αυτούς να πραγματώσεις τις ικανότητες σου με τους δικούς σου όρους, με τον τρόπο που πραγματικά θα το επιθυμούσες; Το κοινό μυστικό είναι όμως, ότι πράγματι, ότι και ΝΑ ΚΑΝΟΥΜΕ, όλοι μας έχουμε απόλυτο αυτοκαθορισμό. Όχι γιατί κάποιοι μας τον πρόσφεραν αλλά γιατί ακόμα και το πιο απολυταρχικό καθεστώς δεν μπορεί να μας τον αφαιρέσει. Για αυτό, ακριβώς μόλις αρχίσουμε να πράττουμε αυτό που πραγματικά θέλουμε, ερχόμαστε άμεσα σε σύγκρουση με όλους όσους υποτίθεται ότι προστατεύουν και εξασφαλίζουν τις ελευθερίες μας.

          Σε αυτό τον κόσμο, οι διευθυντές και  οι εφοριακοί, αρέσκονται να ρητορεύουν για την ατομική υπευθυνότητα. Αν όμως τελικά παίρναμε τις υποθέσεις στα χέρια μας και αναλαμβάναμε την πλήρη ευθύνη των πράξεων μας θα συνεχίζαμε να υπακούμε στις οδηγίες τους;

          Πολύ περισσότερο κακό έγινε σε αυτό τον κόσμο κατά την διάρκεια όλης της ιστορίας από την υπακοή παρά τελικά από την μοχθηρία και την κακία. Τα οπλοστάσια όλων των στρατών της Γης αποτελούν την φυσική πραγμάτωση της προθυμίας μας να υποκύπτουμε και να υπακούμε στους άλλους. Εάν θέλεις να είσαι σίγουρος πως δεν θα συνεισφέρεις ποτέ σε πόλεμο, γενοκτονία ή συνθήκες καταπίεσης, το πρώτο πράγμα που πρέπει να κάνεις είναι να σταματήσεις να υπακούς σε διαταγές. Αυτό ισχύει επίσης και για τις ηθικές σου αξίες. Αμέτρητοι κυβερνήτες και βιβλία κανόνων και κανονισμών απαιτούν την αδιαπραγμάτευτη υποταγή σου. Ακόμα όμως και αν επιθυμείς να παραχωρήσεις την ευθύνη των αποφάσεων σου σε κάποιο θεό ή κάποιο δόγμα, με ποιο τρόπο ακριβώς θα αποφασίσεις ποιος θεός και ποιο δόγμα πρέπει να είναι αυτό;  Είτε σου αρέσει είτε όχι, ΕΣΥ ΕΙΣΑΙ αυτός που πρέπει να πάρει την απόφαση κάθε φορά. Πιο συχνά οι άνθρωποι επιλέγουν ανάμεσα σε αυτά που βρίσκονται πιο κοντά τους, σε ότι μοιάζει πιο οικείο και συνηθισμένο ή πιο εύκολο και βολικό. Δεν υπάρχει καμιά διέξοδος διαφυγής από την ευθύνη που έχουμε για τα πιστεύω μας και τις επιλογές μας. Το να είμαστε υπεύθυνοι για τις πράξεις μας και υπόλογοι μόνο προς τους εαυτούς μας και όχι προς όσους μας διατάζουν και τις διαταγές τους, ίσως δεν μας απαλλάξει από τον να ερχόμαστε σε σύγκρουση μεταξύ μας αλλά τουλάχιστον, όταν θα γίνεται αυτό, θα γίνεται με τους δικούς μας όρους, όχι συσσωρεύοντας άσκοπες και άχρηστες τραγωδίες υπηρετώντας τα συμφέροντα κάποιων άλλων.

          Οι εργάτες που πραγματώνουν ένα έργο έχουν την ικανότητα και την δύναμη να το κάνουν, έχουν την ισχύ, τα αφεντικά που τους λένε τι να κάνουν έχουν την εξουσία. Οι ενοικιαστές που φροντίζουν και συντηρούν ένα κτήριο έχουν την ισχύ να το κάνουν, ο ιδιοκτήτης που το όνομα του βρίσκεται στους τίτλους ιδιοκτησίας έχει την εξουσία.  Ένα ποτάμι έχει δύναμη, ενέργεια…, η άδεια για να χτιστεί ένα φράγμα παρέχει εξουσία.
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: start by<br /><span class="bold">answering to<br />ourselves</span>
        right_text_html: |-
          Δεν υπάρχει τίποτα απαραίτητα καταπιεστικό στην ισχύ, την δύναμη, την ικανότητα, την ενέργεια. Πολλά είδη δύναμης μπορούν να είναι απελευθερωτικά: η δύναμη να νοιάζεσαι για αυτούς που αγαπάς, να υπερασπίζεσαι τον εαυτό σου και να λύνεις τις διαφορές, η ικανότητα να θεραπεύεις τους άλλους ή να οδηγείς ένα πλοίο ή να λικνίζεσαι στο ρυθμό χορεύοντας. Υπάρχουν επίσης τρόποι για να αυξάνεις τις ικανότητες σου καθώς συγχρόνως αυξάνεται και η ελευθερία των άλλων. Κάθε άτομο που δρα ώστε να εκδηλώσει το σύνολο των ικανοτήτων του προσφέρει ένα δώρο προς όλους γύρω του. Αντιθέτως, η εξουσία επάνω στους άλλους, σφετερίζεται την δύναμη και τις ικανότητες των άλλων. Και αυτό που αρπάζεις από τους άλλους, κάποιοι άλλοι θα το αρπάξουν από εσένα. Η εξουσία πάντα αντλείται  από επάνω: Ο στρατιώτης υπακούει τον στρατηγό, ο οποίος υπακούει στον πρόεδρο που αντλεί τις εξουσίες του από το Σύνταγμα- Ο παπάς υπακούει στον αρχιμανδρίτη, ο οποίος υπακούει στον αρχιεπίσκοπο, ο οποίος αντλεί την εξουσία του από τις γραφές, οι οποίες αντλούν την εξουσία τους από τον Θεό- ο εργαζόμενος υπακούει στον ιδιοκτήτη, ο οποίος εξυπηρετεί τον πελάτη του, ο οποίος υπακούει στην πολυεθνική εταιρία της οποίας η εξουσία αντλείται από το Δολάριο- ο αστυνομικός εκτελεί μια σύλληψη που έχει υπογραφεί από τον εισαγγελέα που αντλεί εξουσία από τον Νόμο - «Ανδρισμός», «Λευκή Φυλή», «Ιδιοκτησία», «Χρήμα» «Νόμος», «Θεός», «Σύνταγμα». Στην κορυφή όλων των πυραμίδων δεν βρίσκουμε δεσποτικές φυσιογνωμίες, βρίσκουμε κοινωνικές συμβάσεις: φαντάσματα που κρατούν υπνωτισμένη την ανθρωπότητα. Σε αυτή την κοινωνία, η εξουσία και η ισχύς, δηλαδή η ικανότητα για δράση, είναι σε τέτοιο βαθμό αλληλένδετες που είναι σχεδόν αδύνατο να τις διαχωρίσουμε:  μπορούμε να αποκτήσουμε ισχύ και ικανότητες μόνο προσφέροντας υποταγή και υπακοή. Και όμως, χωρίς ελευθερία, η ισχύς μας και οι ικανότητες μας είναι παντελώς άχρηστες!

          ΑΝΑΡΧΙΑ είναι αυτό που συμβαίνει όταν και όπου η κατάσταση των πραγμάτων δεν επιβάλλεται με κάποια μορφή εξαναγκασμού. ΕΛΕΥΘΕΡΙΑ είναι η διαδικασία συνεχούς επανεφεύρεσης του εαυτού μας και των σχέσεων μας.  Κάθε φαινόμενο ή διαδικασία που εκδηλώνεται ελεύθερα – ένα τροπικό δάσος, ένας κύκλος από φίλους, το ίδιο σου το σώμα- είναι μια αναρχική αρμονία η οποία διατηρείται μέσω της συνεχούς αλλαγής.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: Εάν ένας εχθρικός στρατός εισέβαλε σε αυτό τον τόπο, έκοβε
          τα δέντρα, δηλητηρίαζε τα ποτάμια και υποχρέωνε τα παιδιά μας να μεγαλώνουν
          δίνοντας όρκους υποταγής σε αυτόν, ποιος δεν θα έπαιρνε τα όπλα ενάντια
          σε έναν τέτοιο εχθρό; Όταν όμως η τοπική κυβέρνηση παίρνει τις ίδιες ακριβώς
          αποφάσεις, οι πατριώτες είναι πάντα πρόθυμοι να προσφέρουν τα παιδιά τους,
          την υπακοή τους και να στηρίξουν με τα χρήματα τους αυτές τις καταστρεπτικές
          αποφάσεις πληρώνοντας φόρους.
        right_text_html: |-
          Από την άλλη, ο έλεγχος από πάνω προς τα κάτω, μπορεί να διατηρηθεί μόνο μέσω εκβιασμών, εξαναγκασμών,  απαγορεύσεων και αποκλεισμών: η επισφαλής αυστηρότητα της σχολικής αίθουσας, η βιομηχανική φάρμα όπου τα εντομοκτόνα και τα ζιζανιοκτόνα υπερασπίζονται στειρωμένες σειρές από γενετικά μεταλλαγμένα καλαμπόκια, η εύθραυστη ηγεμονία κάθε δομής υπερεξουσίας.

          ΑΝΑΡΧΙΣΜΟΣ είναι η ριζοσπαστική ιδέα πως δεν υπάρχει κανένας ανώτερος και  πιο ικανός από εσένα τον ίδιο για να πάρει τις αποφάσεις που πρέπει να πάρεις εσύ ο ίδιος για τον εαυτό σου και το περιβάλλον σου.

          Όσων αφορά κάθε σύστημα αξιών και κάθε μορφή κατευθύνσεων που μπορεί να πάρει μια δράση, ο αναρχισμός θέτει πάντα ως κεντρικό αυτό το ερώτημα: «Με ποιο τρόπο το κάθε σύστημα διανέμει την ισχύ και την δυνατότητα»;

          Οι ΑΝΑΡΧΙΚΟΙ αντιτίθενται σε όλες τις μορφές ιεραρχίας, σε κάθε νόμισμα που συγκεντρώνει την εξουσία και τον πλούτο στα χέρια ελαχίστων, κάθε μηχανισμό που μας απομακρύνει από την πηγαία έκφραση των ικανοτήτων μας και των ενδεχόμενων προοπτικών μας. Ενάντια σε όλα τα κλειστά, δογματικά, απολυταρχικά συστήματα απολαμβάνουμε το άγνωστο που απλώνεται μπροστά μας, το χάος που βρίσκεται μέσα μας και λόγω του οποίου είμαστε ικανοί ΝΑ ΕΙΜΑΣΤΕ ΕΛΕΥΘΕΡΟΙ.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: αόρατα σύνορα μας διαχωρίζουν σε ισχυρούς και ανίσχυρους,
          εξουσιαστές και εξουσιαζόμενους, υπεύθυνους και ανεύθυνους, αυθεντίες και
          αποβλακωμένους. Σημεία ελέγχου, ιδιωτικές και κρατικές υπηρεσίες ασφαλείας,
          κωδικοί πρόσβασης, τιμοκατάλογοι και κοστολογήσεις μας καθορίζουν και μας
          διαιρούν. Χρειαζόμαστε τρόπους για να ανήκουμε κάπου, οι οποίοι δεν θα απαιτούν
          τον αποκλεισμό κάποιων άλλων για να σχηματιστούν και να διατηρήσουν την
          δομή τους. Τρόποι που δεν θα συγκεντρώνουν εξουσία στα χέρια μιας μειοψηφούσας
          αριστοκρατίας, που δεν θα παράγουν διαχωρισμένες ομάδες νόμιμων και λαθραίων,
          ενταγμένων και αποκλεισμένων, που δεν θα φυλακίζουν την ανθρώπινη συμπόνια
          σε περιφραγμένες κοινότητες.
        right_text_html: "Ξεκίνα από τον \nΑΥΤΟΚΑΘΟΡΙΣΜΟ"
