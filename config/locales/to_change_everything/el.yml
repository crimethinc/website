      reconciling:
        left_text_html: "Το πρόβλημα είναι \nΗ ΑΝΤΙΠΡΟΣΩΠΕΥΣΗ"
        right_text_html: "Ξεκίνα με το \nΝΑ ΡΩΤΗΣΕΙΣ ΤΟΝ ΕΑΥΤΟ ΣΟΥ"
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: Μπορείς να έχεις εξουσία μόνο εξασκώντας την, μπορείς να μάθεις
          ποια είναι τα συμφέροντα σου μόνο δρώντας σύμφωνα με αυτά. Εάν κάθε προσπάθεια
          σου να αποκτήσεις επίδραση σε αυτό τον κόσμο πρέπει να διοχετεύεται στην
          επιλογή διαμεσολαβητών και εκπροσώπων ή να ερμηνεύεται από πρωτόκολλα θεσπίσεων,
          τότε όλοι μας καταλήγουμε σε μια συνθήκη όπου αποξενωνόμαστε εντελώς ο ένας
          από τον άλλον, από τις ίδιες μας τις ενδεχόμενες πιθανότητες αλλά και τις
          δυνάμεις που έχουμε για να τις πραγματώσουμε.
        right_text_html: "Ξεκίνα αναζητώντας \nΤΗΝ ΙΚΑΝΟΤΗΤΑ, ΟΧΙ ΤΗΝ ΕΞΟΥΣΙΑ"
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: |-
          Το πρόβλημα είναι
          ΟΙ ΗΓΕΤΕΣ
        right_text_html: |-
          Ξεκίνα από τις ΣΧΕΣΕΙΣ ΠΟΥ ΒΑΣΙΖΟΝΤΑΙ ΣΤΗΝ ΕΜΠΙΣΤΟΣΥΝΗ

          Εν αντιθέσει με την εξουσία, η εμπιστοσύνη δίνει την ευθύνη και την ισχύ στα χέρια αυτών που την παρέχουν και όχι αυτών που την αρπάζουν. Ένα άτομο που έχει κερδίσει την εμπιστοσύνη δεν χρειάζεται την εξουσία. Εάν κάποιος δεν αξίζει την εμπιστοσύνη, σίγουρα δεν θα πρέπει να αποκτήσει εξουσία. Και όμως, ποιους άλλους εμπιστευόμαστε λιγότερο από τους πολιτικούς που μας κυβερνούν και τις εταιρίες που διευθύνουν την ζωή μας;
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: Η ηγεσία είναι μια κοινωνική διαταραχή, μια μορφή αταξίας,
          σύμφωνα με την οποία η πλειοψηφία μιας ομάδας είναι ανίκανη να πάρει πρωτοβουλίες,
          να σκεφτεί κριτικά ή να πάρει αποφάσεις σχετικά με  ζητήματα που την αφορούν.
          Από την στιγμή που αντιλαμβανόμαστε την ενεργητική επίδραση ως μια ειδική
          ατομική ιδιότητα που χαρακτηρίζει συγκεκριμένα άτομα και όχι σαν μια σχέση
          ανάμεσα στους ανθρώπους, τότε θα είμαστε για πάντα εξαρτημένοι από τους
          ηγέτες μας- για την ακρίβεια θα είμαστε για πάντα στο έλεος τους. Ακόμα
          και οι πραγματικά υποδειγματικοί ηγέτες είναι το ίδιο καταστροφικοί με τους
          διεφθαρμένους μιας και όλες οι  αξιέπαινες ποιότητες τους δεν κάνουν τίποτα
          άλλο παρά να επιβάλλουν μια ανώτερη κοινωνική θέση, να επιτείνουν το διαχωρισμό
          τους από τους υπόλοιπους ανθρώπους αλλά και να νομιμοποιούν στις συνειδήσεις
          του κόσμου την ίδια την λειτουργία της ηγεσίας.
        right_text_html: Ελεύθεροι από τις ανισορροπίες που επιβάλλει η εξουσία, οι
          άνθρωποι έχουν το πηγαίο, ενστικτώδες κίνητρο να διακανονίζουν τις διαφορές
          τους με αμοιβαία ικανοποιητικό τρόπο- κερδίζοντας ο ένας την εμπιστοσύνη
          του άλλου. Η ιεραρχία διαλύει αυτό το κίνητρο, δίνοντας την δυνατότητα σε
          όσους κατέχουν εξουσία να επιβάλλουν την κυριαρχία τους επάνω σε όλους όσους
          έχουν διαφορές μεταξύ τους. Η φιλία, στα καλύτερα της, είναι ένας δεσμός
          ανάμεσα σε ίσους που υποστηρίζουν και προκαλούν ο ένας τον άλλον ενώ σέβονται
          αμοιβαία την αυτονομία τους. Αυτή θα μπορούσε να είναι μια καλή σταθερά
          με την οποία να αποτιμήσουμε ΟΛΕΣ τις σχέσεις μας. Χωρίς τους περιορισμούς
          που μας επιβάλλονται σήμερα- την ταυτότητα του νόμιμου πολίτη ή του παράνομου
          και του λαθραίου, την ιδιοκτησία ή το χρέος, τις επιχειρηματικές, αστυνομικές
          και στρατιωτικές αλληλουχίες από εντολές- θα μπορούσαμε να ξανακατασκευάσουμε
          τις σχέσεις μας στην βάση της ανοιχτής, ελεύθερης συνεργασίας και της αμοιβαίας
          βοήθειας του ενός προς τον άλλον.
