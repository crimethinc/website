        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: the problem is<br /><span class="bold">hierarchy</span>
        right_text_html: |-
          ΞεκίναΣΥΜΦΙΛΙΩΝΟΝΤΑΣ ΤΟ ΑΤΟΜΟ ΜΕ ΤΟ ΣΥΝΟΛΟ

          «Τα δικαιώματα σου τελειώνουν εκεί όπου αρχίζουν τα δικαιώματα των άλλων». Σύμφωνα με αυτή την λογική, όσοι περισσότεροι είμαστε, τόσο πιο λίγες ελευθερίες θα έχουμε.
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: Η κυβέρνηση πάντα μας υπόσχεται δικαιώματα αλλά το μόνο που
          κάνει είναι να μας στερεί ελευθερίες.
        right_text_html: "Όμως η ελευθερία δεν είναι μια μικρή φυσαλίδα από ατομικά
          δικαιώματα. Δεν μπορούμε να διαχωριστούμε ο ένας από τον άλλον τόσο εύκολα.
          Το χασμουρητό και το γέλιο είναι μεταδοτικά, όπως επίσης ο ενθουσιασμός
          και η απελπισία. Είμαι συντεθειμένος από τα κοινωνικά στερεότυπα που κυλάνε
          ανεξέλεγκτα στην γλώσσα μου, τα τραγούδια που γυροφέρνουν στο μυαλό μου,
          οι διαθέσεις των φίλων μου καθορίζουν την διάθεση μου. Όταν οδηγώ το αυτοκίνητο
          μου εκπέμπω καυσαέρια στην ατμόσφαιρα που αναπνέεις, τα φαρμακευτικά σκευάσματα
          που χρησιμοποιείς περνάνε στο νερό που πίνουμε όλοι μας. \nΤο σύστημα που
          όλοι οι άλλοι αποδέχονται, είναι αυτό στο οποίο εσύ είσαι υποχρεωμένος να
          ζήσεις. Όταν όμως οι άλλοι άνθρωποι το αμφισβητούν, τότε και εσύ έχεις μια
          ευκαιρία να επαναδιαπραγματευθείς την πραγματικότητα σου. Η ελευθερία σου
          ξεκινά εκεί που ξεκινά και η δικιά μου ελευθερία και τελειώνει εκεί ακριβώς
          που τελειώνει και η δικιά μου. Δεν είμαστε συμπαγείς, διακριτές  ατομικότητες.
          Τα σώματα μας αποτελούνται από χιλιάδες διαφορετικά είδη που ζουν μαζί σε
          συνθήκες συμβίωσης: όντας κάτι πολύ περισσότερο από κλειστά φρούρια, τα
          σώματα μας είναι συνεχείς, ακατάπαυστες ανοιχτές διαδικασίες τις οποίες
          διαπερνούν διαρκώς θρεπτικές ουσίες, βιταμίνες και μικρόβια. Ζούμε σε συμβίωση
          με χιλιάδες άλλα είδη, τα χωράφια των καλαμποκιών αναπνέουν αυτό που εμείς
          εκπνέουμε. Μια αγέλη από άγριους λύκους και το μουρμούρισμα των βατράχων
          το απόβραδο συνιστά μια οντότητα, το ίδιο ενιαία, όσο κάθε ένα από τα σώματα
          μας. Δεν ζούμε σε ένα κενό αέρος απλά αυτό-προωθούμενοι από την λογική μας.
          Τα κύματα του κόσμου περνάνε από μέσα μας και μας διαπερνούν…\nΗ γλώσσα,
          μας εξυπηρετεί για να επικοινωνούμε, κυρίως, επειδή την έχουμε κοινή. Το
          ίδιο συμβαίνει με τις ιδέες και τις επιθυμίες μας : μπορούμε να τις επικοινωνήσουμε
          γιατί είναι σπουδαιότερες από εμάς τους ίδιους.   \nΟ καθένας μας είναι
          φτιαγμένος από ένα χάος αντικρουόμενων δυνάμεων, η καθεμιά από τις οποίες
          επεκτείνετε πολύ πέρα από εμάς στον χρόνο και το χώρο. Επιλέγοντας πια από
          αυτές τις δυνάμεις θα καλλιεργήσουμε, καθορίζουμε και τι ακριβώς θα ενθαρρύνουμε
          και τι θα προξενήσουμε στους ανθρώπους με τους οποίους συναναστρεφόμαστε.
          \                Η ελευθερία δεν είναι μια ιδιοκτησία, κάτι που κατέχουμε,
          είναι μια συσχέτιση. Το θέμα δεν είναι να προστατευτούμε από τον εξωτερικό
          προς εμάς κόσμο αλλά να συσχετιστούμε με αυτόν  με έναν τρόπο που θα μεγιστοποιεί
          την εκδήλωση και έκφραση των ήδη άπειρων πιθανοτήτων μας. Αυτό δεν σημαίνει
          πως θα πρέπει να αναζητούμε συμφωνίες για χάρη μόνο της συμφωνίας. Άλλωστε
          και οι συμφωνίες αλλά και οι συγκρούσεις μπορούν να μας ενδυναμώσουν και
          να μας διευρύνουν, εφόσον και εάν, δεν υπάρχει κάποια κεντρική υπερεξουσία
          που να έχει την δυνατότητα να εξαναγκάσει συμφωνίες ή να μετατρέψει τις
          διαφωνίες σε ανταγωνισμούς με το κλασσικό αποτέλεσμα «ο νικητής τα παίρνει
          όλα». Από το να σπάσουμε τον κόσμο σε μικρά κομμάτια ατομικών ελευθεριών
          καλύτερα να προσπαθήσουμε να ωφεληθούμε όλοι μας από το έπακρο των αμοιβαίων
          ελεύθερων συσχετίσεων.\n\nΞεκίνα από την\nΑΠΕΛΕΥΘΕΡΩΣΗ ΤΗΣ ΕΠΙΘΥΜΙΑΣ"
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: the problem is<br /><span class="bold">representation</span>
        right_text_html: Μεγαλώνοντας σε αυτή την κοινωνία, ούτε καν οι επιθυμίες
          μας δεν είναι δικιές μας.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
