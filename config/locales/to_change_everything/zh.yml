      liberation:
        left_text_html: 问题是领袖们
        right_text_html: 以权威做个对比，信用会把权力献给那些赋予它的人，而不是那些只接受的人。一位赢得信任的人不需要权威。如果某一个人不值得信赖，他当然不配拥有权威！然而，谁比政治家和董事长更缺乏我们的信用？当有冲突的时候，如果没有强加的权力失衡，人与人就会有动机解决冲突令双方都满意——来获取对方的信赖。等级制度会删除这个激励，使那些拥有权威的人能够压迫下层的人。最理想的友谊是平等的，彼此支持与挑战，同时尊重对方的自主。这可以说是一个对于我们所有的关系的好标准。如果没有那些在我们身上施加的限制——公民身份和非法生存，财产和债务，企业和军事指挥链——我们可以在自由结社和互助关系的基础上重建我们的关系。
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
