      self:
        left_text_html: 问题是边界
        right_text_html: |-
          自由的幻象仍然困扰着它投射着自身形象的世界。我们被承诺完全的自决权：我们社会的所有机构都应该兑现它。如果你有完全的自决权，你现在会做什么？想象一下你生命所拥有的巨大潜力：可能建立的人际关系，可能经历的经验，所有可以赋予你存在意义的方式。在你出生时，你可能成为什么似乎没有界限。你代表了纯粹的“可能性”。平常，我们不会停下来设想这些。只有在最完美的瞬间，当我们坠入爱河或者取得突破或者游览遥远的地方，我们才会看到我们生命潜能的真面目。是什么限制了你如何发挥自己的潜能？对于你身边的环境你有多少筹码，或者你如何花费自己的时间？那些根据你如何遵循指示而评估你的官僚机构，那个根据你产生多少利润而分配你多少权力的经济，那个强调“释放你完全的潜能”的方式是完全服从他们命令的征兵军官——做这些会让你的生活过得最充实吗？我们全都有完全的自我决定权是一个公开的秘密：不是因为它是赐给我们的，而是因为甚至连最极权主义的独裁也不能把它夺走。但当我们为自己行动时，马上就会和本来承诺担保我们自由的机构发生冲突。

          七
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: 如果异地的军队侵入了这国家，砍伐树木，在河流里下毒，强迫孩童长大后对他们致敬，谁不会举起武器反抗？但是如果当地政府作出同样的行为，爱国者便欣然地服从，给他们交税，让他们的孩子被社会化。边界不会保护我们，它们隔离我们——和那些被排斥的人群产生没有必要的摩查而掩盖我们和同胞的差别。即使最民主的社会也建立在参与者和局外人、合格与违法的居民的对立之上。在古代雅典，民主的诞生地，只有少数的男性有权利参与政治进程；美国民主的创始者都拥有奴隶。国籍和户口这些概念在本地人和外地人之间施加了障碍，让上万人无法掌控他们的生命。自由主义者的理想是不停扩大融入的范围直到整个世界都包括在一个巨大的民主系统内。但是不平等是这系统的根本。在社会的每一层次，无数的界限把我们分割为有权和无权的：检查站，信用评价，数据库密码，价格段。我们不需要依赖排外的归属形式，不需要集中权力与合法性，它导致我们的同情心只归于门控社区。
        right_text_html: 开始从对我们自己负责
