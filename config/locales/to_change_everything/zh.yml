      hierarchy:
        left_text_html: 政府承诺权利，但是他们只能夺走我们的自由。权利的观念暗示了一个中央权力来授予和维护它们。但是任何国家有足够力量可以赐给我们，它也有足够力量从我们这里夺走；让政府来解决一个问题只是在产生更多的问题。政府的权力不是从真空里成形的——他们支配的权力是我们的，而且我们可以有效率的实施我们的权力，并不需要这么多机构来代表我们。世上最自由民主的社会和最专制独裁的国家共享相同的原理：集权的结构来垄断使用武力的机会。不管是答复国王的官僚，还是投票的选民，这个集权的定律是一样的。法律、官僚主义和警察都比民主古老得多；他们在民主社会里的功能和法西斯社会里的角色是没有差别的。唯一的不同是，在一个民主社会里，因为我们可以选出管理他们的人，我们会把他们给看作我们的选择——即使他们是用来对付我们的。独裁的国家本身有内在的不稳定性：他们可以屠杀、监禁和洗脑一整代人，但是他们的后代会重新创造自由的斗争。但是承诺每一个人有机会把自己的意志强加于他人的系统，就可以让他们自愿支持一个让他们互相争斗的系统。越多人觉得他们可以影响国家的强制性机构，这些机构会获得越多的人气。这也许可以解释为什么民主主义的全球扩张和难以置信的资源和权力的不平等相一致：没有另外一种政府可以稳定这么岌岌可危的局面。当权力被集中，人们必须征服其他人获得权力来控制自己的命运。自主权的斗争被转化为政治权力的争夺：后殖民国家中原本和平共存的人口后来的内战是一个例子。那些有权的阶级只能不停的对自己人口和外国宣战来维持他们的地位：美国的国家警卫队从伊拉克转移回来部署在奥克兰。无论哪里有等级制度，上层阶级的优势会被用来更加巩固那些优势。建设更多的制衡代表我们在依靠原本需要管制的机构来管制他自己。唯一可以对抗当局的垄断而且不被他们的系统卷进去的方法是发展自主行动的横向网络。最终，当我们强大到足够迫使当局把我们认真对待，我们就足够强大来脱离他们，解决自己的问题。要获得自由，只有自由的道路会赐给我们。我们需要的是广泛的场所来行使权力，而不单一的机构施舍。我们需要可以容忍多重叙事的空间，而不是支持单一的叙述。我们需要支持自主的决策结构，还有自我防卫的实践来防止统治者的野心，来代替一个压迫性的政府。
        right_text_html: |-
          自由不是所有物或者财产；它是一个关系。它不是防御外部世界的存在的物质，而是和外界相关联的最大的可能性。这不是说我们必须为它的利益寻找共识；冲突与共识两者都可以扩展我们并使我们高尚，只要没有一个中央集权可以把冲突转变成赢家通吃的局面。我们不必把世界分割为封地，我们应该充分利用我们的互联与共存。

