      anarchy:
        first_html: 二十五
        second_html: |-
          问题是等级制度

          有许多不同的机制来强加不平等。有些需要集权装置的支持，比如法院系统。其他的可以比较非正式地运作，像裙带关系或者男女角色。有许多维持阶级层次的机制已经完全没有了信誉。极少的人会信国王的神圣权利，虽然过去这是许多社会的根本基础。现在还是有许多概念我们无法脱离。谁能想象一个世界没有产权？虽然这些都是社会建构——它们存在——但是它们不是注定的。地主和总经理的存在不比皇帝的存在更自然、更必要或有益。这些机构都是一起发展，一起加强。举个例子：种族歧视的发展和资本主义的发展是解不开的：两个都需要帝国主义，奴隶制度，或者工厂阶级互相搏斗的实行，两个都是在决定谁会被困在贫民窟或者关在监狱里。同样的，若没有国家的基础设施和其他的不平等机构，私人的偏见是不可能全面性的维持白人至上的偏执。一个黑人总统可以主持这些系统只是在稳定他们：是这个例外来辩解这个规章。用另一个方式说：只要有警察的存在，他们会骚扰谁？只要有监狱，谁会被派进去？只要有贫富差距，谁会是贫困的？认为我们能利用不平等机构实现平等是天真的思想。你可以洗牌，但是牌不变。
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: 无政府主义是每个人都完全享有自决权的理念。没有法律、政府，或者决策过程比真人的需求和欲望更重要。人们应该自由地形成让他们与他人彼此都满意的关系，还有为自己的权利站起来。无政府主义不是教条或者蓝图。它不是一个若以正确的方法应用便会成功的系统，比如民主政治，或者一个在遥远未来实现的目标，比如共产主义。它是一种我们现在可以付诸实践的行动或叙述方式。对于任何价值体系或行动方针，我们最初应该问的是：它怎么分配权利？
        right_text_html: 当我们可以看穿那些机构和机制的共同点，那些个人奋斗和普遍的斗争会更清楚地融合在一起。当我们以这个融合找到共同点，一切会改变：不只是我们的斗争，还有我们的主人翁感，我们喜悦的能力，感到我们生命的意义。只要我们能够用一个不同的逻辑行动，我们就能够找到彼此。
      take_flight_html: Don’t cling to the old world
