      property:
        left_text_html: 资本主义的基础是财产权——另一个我们从国王与贵族继承的社会建构。虽然现代财产会比较急速的交换，但是概念还是一样的：所有权会合法化暴力来执行资源和土地的人为失衡。有些人相信财产可以不靠国家而持续存在。但是财产权如果没有中央集权来执行是没有意义的——但是只要有中央集权，没有真正属于你的东西。你赚的钱是政府打印的，可以收税和通货膨胀。你车子的契税是政府车局控制的。你的家不是真正属于你的，而是属于给你贷款的银行或者拥有那块地的政府机构。即使那个房子已被买下来，政府还是可以征用它。保护对我们重要的东西会需要什么样的措施？政府只是凭借夺取我们的权利和实物而存在；他们永远都会拿的多过给的。市场只会奖励我们掏空其他人，或者其他人来掏空我们。唯一真正的安全网是我们的社会关系：如果我们要确保自己的安全性，我们需要可供自我保护的互助网络。没有金钱或财产权，我们与物的关系会由我们彼此的关系所决定。今天，这正好相反：我们对彼此的关系是由我们对实物的关系来决定的。废除财产不表示你失去全部的东西，而是没有警官或市场大跌把你依赖的东西夺走。我们会从人的需要开始，而不是应付官
        right_text_html: |-
          问题是掌控

          如果你在一个虐待性的关系里，会有哪些迹象？虐待者可能试图控制你的行为或想法，管制或停止你对资源的进接，威胁你或者对你使用暴力；或者强迫你只能依赖，或不停的被他们监控。这描述了个体侵犯者的行为，但也适合描绘许多政府机构。它们全部都遵守人类必须被管制、统治的理念。越严重的不平等强加在我们身上，越多的精力必须花费来维持那些不平等。在一个极端，管制以残暴的方式行事：无人机袭击、特警队、单独监禁、种族歧视。在另一端，行事的方式是隐形和无所不在的，融入了我们社会的基础：那些确定信用评级和保险费的方程式，那些从被收集的统计数据变成城市规划，那些网络社交媒体的设计。政府有机构探测我们网上的活动，但比起那些塑造我们现实的程序，政府的直接管制是微不足道的。当生活的可能性被简化到零和一的境界，我们存活的现实和我们的理想会无法分辨而导致我们失去斗争。这不是因为我们得到了完全的解放，而是因为完全的相反。自由不是从某些选项中做出选择，而是制定问题。
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
