      representation:
        left_text_html: the problem is<br /><span class="bold">representation</span>
        right_text_html: 在这个社会里，我们的热情和爱好都不是属于我们的；它们被广告和媒体控制，让我们不断地朝向他们的理想直奔。因为灌输，人们做给他们最终带来苦难的事情也可以很满足。我们被暂时的欢乐困在痛苦的迷宫里面。若要得到真正的自由，我们需要干预那些产生我们热情与爱好的过程。解放并不意味着只是满足今天一时的欲望，而是扩张我们感觉什么是可能的概念，所以我们的欲望能够沿着他们驱使我们创造的现实转移。这意味着我们不再从强制执行、主导、和占有的感觉采取快乐。这表示我们寻找的喜悦应该让我们远离那些让我们竞争和对抗的机制。如果你曾经克服过上瘾，你知道什么叫做转换欲望或者转换热情。
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
