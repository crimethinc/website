      power:
        left_text_html: 二十九
        right_text_html: |-
          管理者和税吏喜欢谈论个人的责任。但是，如果我们为自己所有的行为负全部责任的话，我们首先会服从他们的指示吗？历史上绝大部分的伤害不是由恶意造成，而服从命令的后果。世界上所有军队的武器仓库里装的军火是我们愿意服从的象征。如果你想确保你永远不会有助于战争、种族灭绝或压迫，第一步是停止服从命令。这也适用于你的价值观。无数的统治者和规则手册要求你绝对服从。但是，即使你想把自己的责任交给某一个神或教义，你如何决定向哪一个屈服？不管你喜欢与否，是你在做这个决定。通常，人们根据哪一个最熟悉或方便来简单地作出这个选择。我们对自己的信仰与决定有义不容辞的责任。我们服从自己，而不是指挥官或诫命，我们可能仍然会相互发生冲突，但至少我们是以自己的主张来发生摩擦，不是因为别人的动机而堆积悲剧。

          开始从
          寻求权力，而不是权威
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: start with<br /><span class="bold">relationships<br />built
          on trust</span>
        right_text_html: 那些履行劳动的劳动者有权力；那些监督他们的上司有权威。那些维护楼房的住户有权利；那个名字在契约上的地主有权威。一条河流有力量；一条建造大坝的许可证有权威。其实权力本身不具有压迫性。很多种权力可以带给我们解放：让你照顾你爱的人的权利，自我防卫和解决纠纷的权力，来执行针灸或者驾驶帆船或者在实行高难度的体操动作。有许多方式发展你自己的能力的同时也增加他人的自由。每个为自己实现个人最大的潜能的人是在给所有人提供一份礼物。另一方面，一方对另一方实施的权威是在篡夺权力。你对他人的窃夺，他人也对你夺取。权威是永远从上往下来执行：士兵服从将军，将军服从总统，总统的权威是从宪法里赐有的。神父服从主教，主教服从教皇，教皇服从圣经，圣经的权威是从神明赐有的。员工服从老板，老板服从顾客，顾客的权威是金钱赐有的。警员执行由地方法官签署手令，地方法官的权威是由法律赐有的。男子气概，白皮肤，财产——在这些金字塔的顶层，我们甚至不会找到暴君，只有社会建构在催眠人类。在这个社会里，权力与权威是如此相通，我们几乎无法区分它们：我们只能以服从换取权力。然而没有自由，权力是毫无价值的。
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
