      intro:
        left_text_html: 'С чего ты начнёшь, если тебе выпадет возможность изменить
          всё, что угодно? Уйдёшь в отпуск до конца жизни? Сделаешь так, чтобы углеводородное
          топливо перестало вызывать изменение климата? Понизишь проценты по кредитам
          или заставишь политиков быть честными? Признай: нет ничего более фантастического,
          чем ожидать изменений, сохранив всё как есть. Наши личные финансовые и эмоциональные
          проблемы взаимосвязаны с катастрофами и потрясениями всего мира. Мы можем
          потратить остаток жизни на тушение социальных пожаров, одного за другим,
          но они возникнут снова, причём из того же источника. Частичные решения не
          работают. Нам нужно переосмыслить всё, исходя из совершенно другой логики.'
        right_text_html: Чтобы изменить что-нибудь, начни откуда угодно
      self:
        left_text_html: начни с самоопределения
        right_text_html: Призрак свободы бродит по миру, созданному по его образу
          и подобию. Нам обещали полную свободу самовыражения – все институты общества
          должны были способствовать этому. Представь, что бы ты делал прямо сейчас,
          если бы мог быть собой на 100%? Подумай о безграничном потенциале твоей
          жизни. Об отношениях, которые у тебя могут появиться, ощущениях, которые
          ты можешь испытать, любых способах найти смысл своего существования. Когда
          ты появился на свет, казалось, что средствам твоей самореализации нет числа.
          В тебе дышала чистая возможность всего на свете. За рутинными задачами не
          остаётся времени подумать об этом. Только в самые волшебные моменты, когда
          мы влюбляемся, достигаем чего-то важного или путешествуем по далёким землям,
          мы видим намёк на то, какой могла бы быть наша жизнь. Что ограничивает тебя
          в раскрытии своего потенциала? Как ты влияешь на мир вокруг? Чем наполнены
          твои дни? Чиновники оценивают тебя по тому, как точно ты следуешь правилам.
          Экономика вознаграждает тебя за то, что ты приносишь прибыль. Генералы утверждают,
          что лучший способ «добиться вершин» – это подчиниться их власти. Разве эти
          люди позволят тебе придумать свои правила жизни? Секрет в том, что мы уже
          являемся самими собой. И не потому, что нам это позволили. Даже самая тоталитарная
          диктатура не сможет отнять этого у нас. Как только мы принимаемся действовать
          в своих интересах, мы вынуждены бороться с теми самыми институтами, что
          обещали дать нам свободу самовыражения.
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: начни с ответственности
        right_text_html: Начальники и налоговая инспекция говорят нам о личной ответственности.
          Но взяв на себя полную ответственность за свои действия, разве слушали бы
          мы их? За всю историю человечества куда больше вреда принесли те, кто бездумно
          следовал приказам, чем единичные злые гении. Арсеналы армий всего мира –
          это физическое доказательство нашего желания подчиняться. Если ты не хочешь
          способствовать войнам, геноциду и репрессиям, первый шаг – перестать подчиняться
          приказам. Вопрос принятия ответственности касается и твоих ценностей. Бесчисленные
          правители и кодексы требуют беспрекословного подчинения. Но даже если ты
          захочешь уступить ответственность за свои решения какой-либо идеологии или
          богу, то каким конкретно? Нравится тебе или нет, именно ты будешь выбирать
          между ними. Обычно люди выбирают наиболее знакомое или привычное. Невозможно
          снять с себя ответственность за убеждения и решения. Мы держим ответ перед
          самими собой, а не перед командирами. Взяв ответственность за свои решения
          на себя, ты по-прежнему будешь попадать в конфликтные ситуации, но делать
          это по своей воле, а не по умыслу других людей.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: начни искать силу, а не власть
        right_text_html: |-
          Работники, решающие непосредственные задачи, обладают силой, а начальники, отдающие приказы, обладают властью. Квартиросъёмщики, живущие в здании, обладают силой, а владелец здания – властью. У реки есть сила, а разрешение на постройку дамбы обеспечивает власть. Сила сама по себе не является угнетающей. Она часто дарит чувство освобождения: мы можем заботиться о любимых, защищать себя, разрешать споры, вести парусник, летать на трапеции, делать иглоукалывание. Можно развивать свои способности и не нарушать свободу окружающих. Каждый, кто стремится полностью раскрыть свой потенциал, действует и в общественных интересах. Власть же всегда стремится управлять чужой силой. Но всё, что ты взял путём применения власти, кто-то другой заберёт у тебя. Власть всегда идёт сверху: • Солдат подчиняется генералу, тот подчиняется президенту,

          а президент управляет ссылаясь на Конституцию. • Священник подчиняется епископу, тот – патриарху, а патри-

          арх – священной книге, которая наделена властью от Бога. • Работник подчиняется работодателю, тот обслуживает поку-

          пателя, а власть покупателя определяется наличием денег. • Полицейский действует по постановлению, подписанному

          судьёй, который получает власть благодаря закону.

          Маскулинность, белая кожа, недвижимость – на вершинах этих пирамид нет конкретных злодеев, это только социальные конструкции. Призраки, гипнотизирующие человечество. Власть и сила в нашем обществе так переплелись между собой, что их едва можно различить. Нам дали право проявлять силу в обмен на покорность, но без свободы

          наша сила не имеет смысла.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: начни с отношений, построенных на доверии
        right_text_html: В отличие от власти доверие наделяет силой того, кто даёт,
          а не того, кто получает. Если тебе доверяют, то власть уже не нужна. А если
          кто-то не заслуживает доверия, то уж точно не следует наделять его властью!
          Кстати, мы доверяем кому-нибудь меньше, чем политикам и гендиректорам? Иерархия
          не даёт возможности оставаться на равных, позволяя власть имущим подавлять
          любые конфликты. Отказавшись от навязанной силы, мы захотим разрешать конфликты
          так, чтобы обе стороны были удовлетворены, – тогда все заслужат доверие
          друг друга. Дружба в своём лучшем проявлении – отношения между равными.
          Равные поддерживают друг друга и даже в соревновании уважают личное пространство.
          Вот на что должны быть похожи все наши отношения. Без тех ограничений, которые
          навязаны нам сейчас – гражданство и нелегальность, собственность и долг,
          корпоративные и военные вертикали власти – мы могли бы перестроить наши
          отношения на основе свободных объединений и взаимопомощи.
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: начни с взаимосвязи частного и общего
        right_text_html: |-
          «Твои права заканчиваются там, где начинаются права другого человека». По этой логике, чем больше на Земле

          людей, тем меньше свободы.

          Но свобода – это не крошечный пузырёк личных прав. Нас нельзя так легко отделить друг от друга. Энтузиазм или отчаяние так же заразительны, как зевание и смех. Я состою из стереотипов и штампов, слетающих с моего языка, из песен, крутящихся в моей голове, из настроения, которое передаётся от окружающих. Я веду машину, и она загрязняет воздух, которым дышишь ты. Ты используешь лекарства, и они попадают в воду, которую пью я. Система, которую принимают все остальные, это система, в которой приходится жить тебе. Но, когда другие бросают ей вызов, ты можешь изменить свой взгляд на мир. Твоя свобода начинается там, где начинается моя свобода, и заканчивается одновременно с моей. Мы не отдельные организмы. В наши телах тысячи различных биологических видов, живущих в симбиозе. Тело не замкнутая система, а процесс, в котором происходят постоянные изменения и непрерывное взаимодействие питательных веществ и микробов. Мы живём в симбиозе с тысячами других видов. Пшеничное поле вдыхает то, что выдыхаем мы. Стая волков на охоте или квакающие к вечеру лягушки – такие же «организмы», как и мы. Люди не живут в вакууме, наше поведение определяет не только разум. Мы являемся частью вселенной. Язык помогает нашей коммуникации только в случае, если мы все его знаем. Так же работают идеи и желания: мы можем транслировать их другим людям, потому что наши идеи и желания больше нас. В каждом из нас – клубок противоречащих друг другу сил. И все они

          простираются далеко за пределы наших тел в пространстве и времени. Выбирая, какие из них развивать, мы определяем, что будем пробуждать в окружающих. Свободой невозможно обладать, свободу нельзя удержать. Свобода – это отношение. Это не состояние максимальной защиты от окружающего мира. Напротив, свобода в том, чтобы быть переплетённым с миром для роста наших возможностей. Это вовсе не означает, что стоит соглашаться со всем подряд. И конфликт, и согласие могут быть источником новых возможностей, а также шансом проявить твои лучшие качества, если только никакая централизованная сила не навязывает нам согласие и не трансформирует конфликт в соревнование с единственным победителем. Вместо того, чтобы делить мир на крошечные участки, давайте объединимся и получим

          его весь. Вместе.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: начни с освобождения желаний
        right_text_html: Тому, кто вырос в нашем обществе, не принадлежат даже его
          собственные желания. Они попадают к тебе в голову с рекламой и другими формами
          пропаганды, чтобы ты не мог вырваться из ловушки современного рынка. Благодаря
          продуманному устройству капитализма моментальную радость нам приносят те
          же вещи, что в долгосрочной перспективе делают нас несчастными. Мы заперты
          в нашем страдании, а замком служат наши желания. Чтобы освободиться, нам
          нужен контроль над процессами, рождающими их. Освободиться не означает исполнять
          сиюминутные «хочу». Напротив, мы расширяем понимание возможного, изменяя
          наши желания вместе с реальностью, возникающей благодаря им. Это означает
          отказ от наслаждений, которые мы получаем грубостью, навязывая, доминируя
          и обладая. Нам стоит искать удовольствия, освобождающие нас от покорности
          и конкуренции. Если ты хоть раз бросал вредную привычку, тебе известно на
          собственном опыте, что такое трансформация желаний.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: начни с сопротивления
        right_text_html: |-
          Фанатики обычно обвиняют в системных бедах общества частную группу – евреев в капитализме, иммигрантов в экономическом кризисе… и так далее. Точно так же обвиняют конкретных политиков в коррупции. Но проблема в самой системе. Кто бы ни был у власти, невозможно избежать дисбаланса сил и постоянных принижений одной из сторон. Проблема не в плохой работе системы, а в том,

          что она вообще есть.

          Наш враг не люди, а институты и правила, возводящие стены между нами и отгораживающие нас от самих себя. Внутри нас конфликтов больше, чем снаружи. Трещинами покрылись и наша цивилизация, и наша дружба, и наши сердца. Это конфликт, но не между людьми, а между разными типами отношений, разными способами существования. Когда мы отказываемся доминировать, мы обнажаем наши трещины и приглашаем других выйти из навязанной

          социальной роли.

          Лучше всего – окончательно покончить с доминированием. Не сделать его более «честным», не поменять местами тех, кто приказывает, и тех, кто подчиняется, не стабилизировать систему путём реформ. Цель протеста не в требовании более легитимных правил или правителей, а в демонстрации нашей способности действовать своими силами, вдохновлять этим других и отказываться от вмешательства власти. Это не война, не бинарный конфликт вооружённых противников, а скорее заразительное неповиновение. Недостаточно просто обсуждать и информировать, ожидая изменений в сердцах и умах. Если идеи не сопровождаются действием, если перед людьми не стоит конкретный выбор, разговоры не имеет смысла. Большинство

          отказывается вступать в дискуссии, однако если чтото происходит, если ставки высоки и существует ощутимая разница между сторонами – каждый неизбежно сделает выбор. Нам не нужны ни единогласные решения, ни полное понимание всего мира, ни точный план пути к месту назначения. Нам нужна лишь смелость выбрать иную тропу.
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: проблема в контроле
        right_text_html: |-
          Как понять, что с тобой неправильно обращаются? Скорее всего, твоё поведение пытаются контролировать или навязывают своё мнение, блокируют доступ к ресурсам или решают, когда и насколько тебя к ним подпускать. Тебе могут угрожать или применять силу. Наконец, тебя могут держать в зависимости, постоянно наблюдая за твоими действиями. Так поступают конкретные личности, но то же верно для налоговой полиции, ФСБ и других институтов, управляющих нашим обществом. Практически все они основаны на идее, что людьми необходимо управлять, их нужно

          направлять и усмирять.

          Чем больше дисбаланс сил в обществе, тем больше контроля требуется, чтобы сохранить его. С одной стороны, контроль виден невооружённым глазом: отряды ОМОНа, одиночное заключение, депортации мигрантов. Но есть и другой контроль, вездесущий и невидимый, встроенный в инфраструктуру общества: уравнения, вычисляющие кредитные лимиты и страховые выплаты, способы сбора статистики и методы городского планирования, архитектура социальных сетей. ФСБ наблюдает за тем, что мы делаем в Сети, но даже у них нет такого контроля над нашей реальностью, как у алгоритмов, которые определяют, что мы видим после входа на свой любимый сайт. Когда бесконечные возможности жизни сужаются до списка параметров, закодированных нулями и единицами, мы больше не видим пропасти между нынешней системой и жизнью, которой нам хотелось бы жить. Это происходит, увы, не потому, что мы достигли полной свободы, а потому, что мы пришли к её противоположности. Свобода – это не выбор между параметрами. это возможность самостоятельно прокладывать свой путь.
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: проблема в иерархии
        right_text_html: 'Существует множество схем для поддержания неравенства в
          обществе. Некоторые основаны на централизованном аппарате, например судебная
          система. Другие неформальны, например гендерные роли. Некоторые из них уже
          полностью потеряли наше доверие: мало кто сегодня верит в божественное происхождение
          короля, хотя долгие столетия никто не мог представить иной основы общества.
          Другие механизмы до сих пор сидят настолько глубоко, что мы не представляем
          себе жизни без них. Может ли существовать мир без права на собственность?
          Что произойдёт, если производство будет организовано горизонтально, без
          начальников? Это лишь одни из социальных конструкций: они есть сейчас, но
          не являются единственно возможными. Существование арендодателей или гендиректоров
          не более естественно, необходимо и полезно, чем существование императоров.
          Эти механизмы развивались совместно, помогая друг другу. Например, история
          национализма неотделима от истории капитализма: ни одно, ни другое не могли
          зародиться без колонизации, рабства и использования цвета кожи для натравливания
          работников друг на друга. Без государственной инфраструктуры и других иерархий
          нашего общества персональный фанатизм не смог бы привести к системному угнетению
          меньшинств. Стоит ответить себе на вопросы: пока существуют тюрьмы, кого
          будут в них бросать? Пока существует нищета, кто будет бедняком? Пока существует
          дискриминация, чья зарплата будет ниже? Наивно предполагать, что мы можем
          достичь равенства в обществе, построенном на иерархии. Можно перетасовать
          карты, но колода останется той же.'
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: проблема в границах
        right_text_html: |-
          Если бы в твою страну вторглась чужеземная армия, вырубила леса, отравила реки и заставила детей присягать себе на верность, разве не поднялся бы каждый на войну с ней? Но, когда то же самое делает местная власть, патриоты преподносят ей свою покорность, налоги и детей. Границы не защищают, а разделяют нас: создавая лишние препятствия «приезжим» и в то же время скрывая реальные различия среди «местных». Даже самое демократическое правительство основано на этом разделении «своих» и «чужих», легальных и нелегальных. В древних Афинах, колыбели демократии, в политический процесс была включена лишь небольшая часть мужчин. То же самое можно сказать о вече на Руси. Институт гражданства возводит барьеры между «местными» и «приезжими», лишая миллионы «нелегальных мигрантов» власти над своей жизнью. Либеральный идеал состоит в расширении пределов, пока весь мир не будет интегрирован в огромный демократический проект. Но неравенство лежит в основе самой этой структуры. Контрольно-пропускные пункты, кредитные лимиты, пароли к базам данных и диапазоны цен – на каждом уровне этого общества тысячи заборчиков делят нас на властных и бессильных. Нам нужны формы отношений, не основанные на исключении, не усиливающие власть и букву закона, не хранящие сопереживание

          за закрытыми дверями.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: проблема в представительстве
        right_text_html: Властью можно обладать, только применяя её, а осознать свои
          интересы – только на практике, действуя согласно им. Когда любое усилие
          по изменению мира проходит через посредников и переводится на язык протоколов,
          мы отстраняемся друг от друга и от нашего потенциала. Каждый аспект нашей
          деятельности, для которого мы находим посредника, становится неизвестным
          и враждебным. Вечно разочаровывающие политики – отличный пример того, насколько
          большую часть своей ответственности мы отдали. Жестокость полиции – это
          мрачный итог нашего нежелания самим разбираться с тем, что происходит в
          нашем районе. В цифровом мире, где каждый вынужден постоянно быть себе и
          секретарём, и пиар-менеджером, наша репутация становится чем-то внешним,
          вампиром, сосущим нашу кровь. Представь, что мы перестанем быть так отстранены
          друг от друга и бросим соревноваться в продаже себя на профессиональных
          и социальных рынках. Будем ли мы тратить столько времени и энергии на профили
          в социальных сетях, на золотых тельцов, отлитых по нашему образу и подобию?
          Мы цельны. Ни посредники, ни абстрактные концепции не могут заменить нас.
          Сводя людей к демографии, а живой опыт – к данным, мы перестаём видеть удивительное
          и уникальное в мире. Нам нужны присутствие, открытость, прямой контакт друг
          с другом, непосредственный контроль над нашими жизнями. Никакой представитель
          или посредник не может этого обеспечить.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: проблема в лидерах
        right_text_html: 'Лидерство – это социальная болезнь, при которой большинство
          участников группы не в состоянии проявлять инициативу и критически оценивать
          собственные действия. Пока мы отдаём право на действие конкретным личностям,
          а не рассчитываем на поддержку окружающих, мы всегда будем зависимы от великодушия
          наших лидеров. Даже если они добрые и честные, они не менее опасны, чем
          явные тираны. Их благородство только укрепляет их статус и подчинённую роль
          других, не говоря уже о самом институте лидерства. Когда полицейские прибывают
          на место протестной акции, они задают один и тот же вопрос: «Кто у вас главный?»
          Это происходит не потому, что лидерство необходимо для коллективного действия,
          а по той причине, что лидер окажется слабым звеном. Конкистадоры задавали
          тот же вопрос, когда прибыли в так называемый Новый Свет. Везде, где они
          получали ответ, они экономили века, уходящие на подчинение аборигенов. Если
          уже есть лидер, его можно сменить, подкупить, взять в плен. В лучшем случае
          зависимость от лидеров – это ахиллесова пята общества. В худшем – лидерство
          воспроизводит интересы властей и вертикаль власти даже среди тех, кто против
          этого. Лучше, когда у каждого есть своё собственное мнение и ответственность
          за свои действия.'
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: проблема в правительстве
        right_text_html: |-
          Правительства обещают права, но на деле могут лишь отнимать свободы. Идея прав предполагает центральную роль власти, дарующей и охраняющей их. На деле всё, что государство может гарантировать, оно же может и отнять. Если мы даём государству право решить одну проблему, мы открываем ему дверь для создания новых. Правительства не создают свою власть из ничего – они используют нашу силу, которую мы могли бы применить гораздо эффективнее, без механизмов представительства, работающих по принципу машин Голдберга: выполняющих очень простое действие чрезвычайно сложным образом. Наиболее либеральная демократия построена по тому же принципу, что и самая деспотичная диктатура: централизация власти и прав в структуре, предназначенной монополизировать использование любой силы. Неважно, перед кем держат ответ бюрократы, управляющие структурой: перед королём, президентом или электоратом. Законы, бюрократия и полиция старше, чем демократия. В демократическом государстве они функционируют точно так же, как при диктатуре. Разница лишь в том, что, поскольку мы можем голосовать за тех, кто управляет ими, предполагается, что мы должны считать их своими – даже если их используют против нас. Диктатура всегда нестабильна. Можно расстреливать, заключать в тюрьмы и промывать мозги целым поколениям, но их дети всё равно начнут борьбу за свободу. Однако пообещайте человеку шанс обладать властью над другими (через волю большинства), и тогда люди построят систему, которая стравит их друг с другом. Чем больше влияния общество (как ему кажется) имеет на государственные институты принуждения, тем более популярными они становятся.

          Возможно, это объясняет сочетание глобальной экспансии демократии с невероятным неравенством в распределении ресурсов и власти: никакая другая система управления не смогла бы стабилизировать такое шаткое положение. При централизованной власти одним людям приходится доминировать над другими, чтобы влиять на собственные судьбы. Борьба за автономию выражается в соревновании за политическую власть: взгляните на гражданские войны в постколониальных странах между народами, которые до этого мирно сосуществовали. Власть имущие могут сохранить эту самую власть только силами постоянной войны против народа, как собственного, так и других. Национальная гвардия возвращается из Ирака в Фергюсон, ОМОН возвращается из Чечни в Москву. Иерархия концентрирует власть наверху. Делать эту систему более справедливой – значит использовать для защиты тот объект, от которого следует защищаться. Единственный способ влиять на власти, не втягиваясь в их игру, – развивать горизонтальные самостоятельные сети. Когда мы станем достаточно сильны для того, чтобы власть воспринимала нас всерьёз, мы окажемся достаточно сильны, чтобы решать

          свои проблемы без власти.

          Нет пути к свободе, кроме как через свободу. Невозможно использовать лишь ограниченное законами пространство, оставленное нам для реализации своих желаний. Нам необходимо расширять границы дозволенного. Вместо насилия и подавления, неотъемлемо встроенных в институт государства, нам нужны структуры принятия решений, поощряющих автономию. Нам нужны практики самообороны, чтобы защитить нас от потенциальных правителей.
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: проблема в прибыли
        right_text_html: 'Деньги – идеальный механизм насаждения неравенства. Они
          абстрактны. Кажется, что в них измеряется всё остальное. Они универсальны.
          Совершенно разные люди принимают их всерьёз. Они безличны. В отличие от
          наследственных привилегий, деньги без проблем передаются от одного человека
          другому. Они динамичны. Чем легче сменить место в иерархии, тем стабильнее
          сама иерархия. Те, кто готов был восстать против диктатуры, легко принимают
          власть рынка. Когда единственным способом измерить ценность чего-либо становятся
          деньги, уникальные моменты нашей жизни теряют свою значимость. Они становятся
          лишь разменной монетой в погоне за тем, что, как может показаться, делает
          тебя выше остальных. Всё, что нельзя занести в бухгалтерские книги, отметается
          сразу. Жизнь превращается в соревнование за финансовый выигрыш – каждый
          против всех: продавай или сам становись товаром. Что значит «получить прибыль»?
          Раздобыть больше контроля над ресурсами общества. Прибыль не могут получить
          все сразу. Чтобы её получил один, остальные должны утратить пропорциональную
          долю ресурсов. Если инвесторы обогащаются за счёт труда работников, то финансовая
          пропасть между ними становится тем шире, чем больше работники трудятся.
          Система, основанная на жажде прибыли, производит нищету с той же скоростью,
          с какой производится богатство. Условия конкуренции производят инновации
          быстрее любой другой системы. Но вместе с тем они усиливают неравенство:
          там, где раньше всадники правили пешими, теперь над бездомными и автомобилистами
          кружат бомбардировщики. Поскольку все вынуждены гнаться за прибылью вместо
          того, чтобы жить в своё удовольствие, результат оказывается катастрофическим.
          Глобальное изменение климата – только одно из бедствий, которые не могут
          предотвратить даже самые влиятельные капиталисты. Кроме того, капитализм
          вознаграждает предпринимателей не за предотвращение кризисов, а за обогащение
          на них.'
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: проблема в собственности
        right_text_html: |-
          В основе капитализма лежит право собственности – социальное наследство, полученное нами от королей и аристократов. Сегодня хозяева у собственности меняются быстрее, чем раньше, но смысл остаётся тем же: идея владения оправдывает насилие ради сохранения искусственного неравенства в правах на землю и другие ресурсы. Некоторые считают, что собственность может существовать и без государства. Но право на собственность не имеет веса без центральной власти, которая это право навязывает. Кроме того, пока существует центральная власть, ничто не является полностью твоим. Деньги, которые ты зарабатываешь, печатает государство, на них влияют налоги, инфляция и курсы валют. Номер на твоей машине контролирует полиция. Твоя квартира принадлежит не тебе, а банку, который выдал ипотеку. Как далеко мы зайдём в попытке защитить то, что для нас важно? Правительства существуют за счёт того, что мы отдаём. А отнимают они всегда больше, чем дают в ответ. Рынок вознаграждает нас за облапошивание других, а их в свою очередь – за облапошивание нас. Единственная настоящая страховка – наши социальные связи. Если мы хотим быть уверенными в своей безопасности, нам нужны сети взаимопомощи, способные защитить себя. Без денег и собственности наше отношение к вещам будет определяться нашими отношениями друг с другом. Сейчас всё ровно наоборот: наши отношения друг с другом определяются нашим отношением к вещам. Упразднение собственности не означает, что ты лишишься своих вещей. Оно означает, что дома и квартиры больше не будут пустовать в ожидании очередной спекуляции – в них смогут заселиться нуждающиеся. Вместо того, чтобы под39

          чиняться бюрократам, мы поставим во главу всего потребности людей. Вместо того, чтобы жить за счёт других, мы будем использовать преимущества взаимной зависимости. Самый жуткий страх мошенника – это общество без собственности. Ведь в таком обществе его будут уважать лишь настолько, насколько он реально заслуживает. В обществе без денег людей ценят за то, что они привносят в жизнь других, а не за то, кого они могут подкупить. В обществе без прибыли любое усилие будет оставаться лишь самим усилием, так что не будет потребности в бессмысленной или деструктивной деятельности. Всё то, что действительно имеет значение: страсть, товарищество, щедрость – доступно каждому. Целые легионы полицейских и судебных приставов навязывают идею дефицита ресурсов, чтобы вовлечь нас в бесконечный бег по кругу и по их правилам.
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: последнее преступление
        right_text_html: |-
          Любой порядок установлен благодаря преступлению. Это преступление против прошлого, разрушившее старый порядок. Только благодаря ему новый порядок вещей становится очевидным, и люди принимают его как должное. Например, фундаментальное преступление коммунистов – бунт против власти Российской империи. Фундаментальное преступление будущего общества (если мы переживём общество существующее) уничтожит современные

          законы и институты.

          Преступлением называют всё, что выходит за пределы общественного порядка: и то, что хуже его, и то, что лучше. Любая система боится того, что она не может контролировать или включить в себя. В любом порядке вещей

          есть зачатки его разрушения.

          Ничто не вечно. Империи и цивилизации тоже. А что может заменить существующий порядок вещей? Давайте вообразим общество, не основанное на разделении легального и нелегального, законности и преступности, правителей и управляемых. Что может стать последним

          преступлением?
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: 'АНАРХИЯ – это то, что происходит, когда порядок не навязывается
          силой. Это просто свобода: процесс постоянного переосмысления самих себя
          и наших взаимоотношений. Любой свободно происходящий процесс или явление
          – твоё собственное тело, круг друзей, джунгли, – это анархическая гармония,
          стабильная в вечном изменении. Вертикальный контроль, напротив, можно удерживать
          лишь ограничениями и принуждением. Это и излишняя дисциплина в школе, и
          сельскохозяйственная индустрия, и хрупкая гегемония сверхдержав. АНАРХИЗМ
          – это идея о том, что каждый имеет право на полное самовыражение. Никакой
          закон, правительство или метод принятия решений не может быть более важным,
          чем нужды и желания реальных людей. Люди должны иметь возможность выстраивать
          отношения друг с другом, основанные на взаимном удовлетворении, и стоять
          за свои интересы так, как они сами считают нужным. Анархизм – это не догма
          и не чёткий план. Это не система, такая, как, например, демократия, которая
          (предположительно) будет работать, если её правильно применить. Это и не
          идеал далёкого будущего, как коммунизм, к которому нужно стремиться. Это
          способ действовать и строить отношения, который можно воплотить в жизнь
          прямо сейчас. В основе любой системы ценностей или плана действий стоит
          вопрос: «Как здесь распределяется власть?» АНАРХИСТЫ противостоят любым
          формам иерархии – любой денежной системе, концентрирующей власть в руках
          немногих, любому механизму, ограничивающему наш потенциал. Отвергая закрытые
          системы, мы наслаждаемся неизвестностью впереди и хаосом внутри нас, который
          и даёт нам возможность быть свободными.'
        second_html: Этот текст предоставлен CrimethInc, международной сетью революционеров-вдохновителей.
          Ты найдёшь все наши проекты на crimethinc.com, включая книги, фильмы, подкасты
          и репортажи из первых рук о борьбе за свободу во всём мире. Мы создали этот
          текст в сотрудничестве с товарищами с пяти континентов, сотни волонтёров
          оплатили печать, чтобы ты держал эту брошюру в руках. Электронная версия
          доступна на десятках языков на сайте tochangeeverything.com. Там ты сможешь
          заказать брошюры, оплатив почтовые расходы, и найдёшь множество сопутствующих
          материалов и ресурсов. Русскоязычная версия выпущена совместными усилиями
          «Радикальной теории и практики» (rtpbooks.org) и Автономного Действия (avtonom.org).
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: ''
        right_text_html: |-
          Когда мы видим нечто общее в различных институтах и механизмах господства, становится ясно, что индивидуальная борьба

          каждого из нас – часть чегото большего, часть того, что

          может сплотить нас. Когда мы объединяемся на основе этой связи, меняется всё: не только наша борьба – растёт наше чувство сопричастности, наша способность радоваться, появляется осмысленность нашей жизни. Всё, что нужно, чтобы найти друг друга – начать действовать по другой логике.

          Чтобы изменить всё, начни откуда угодно
      take_flight_html: НЕ ЦЕПЛЯЙСЯ ЗА СТАРЫЙ МИР!
