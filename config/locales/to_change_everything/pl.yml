  to_change_everything:
    show:
      title_html: 'Zmienić<br />  Wszystko'
      subtitle_html: <span class="green">anarchistyczny</span> <span class="pink">apel</span>
      video_cte: Obejrzyj Video
      video_url: https://player.vimeo.com/video/111159930
      pdf_cte_html: Ściągnij<br /> PDF
      pdf_get_url: https://cdn.crimethinc.com/assets/tce/images/to-change-everything-polski.pdf
      pdf_image: tce-cover-200-polski.png
      intro:
        left_text_html: '<p>Jeśli mógłbyś/mogłabyś coś zmienić, to co by to było? Czy pojechał(a)byś na niekończące się wakacje? Czy sprawił(a)byś, żeby paliwa kopalne nie przyczyniały się więcej do zmian klimatu? Czy poprosił(a)byś o uczciwe banki i etycznych polityków? Cokolwiek nie wymyślisz, to i tak nie będzie to bardziej nierealistyczne, niż pozostawienie wszystkiego tak jak jest i oczekiwanie, że wyniki będą inne. </p> <p>Nasze prywatne zmagania finansowe i emocjonalne odzwierciedlają globalne niepokoje i katastrofy. Możemy spędzić resztę naszych dni próbując gasić te pożary jeden po drugim, ale one pochodzą z tego samego źródła. Żadne fragmentaryczne rozwiązanie nie zadziała. Musimy przemyśleć wszystko według innej logiki. </p>'
        right_text_html: 'By coś<br />zmienić,<br /> trzeba<br />zacząć<br /> wszędzie.'
      self:
        left_text_html: 'zacznijmy od<br /><span class="bold">wolnej woli</span>'
        right_text_html: '<p>Widmo wolności ciągle hula po świecie. Obiecano nam całkowicie wolną wolę: wszystkie instytucje naszego społeczeństwa mają ją gwarantować. </p> <p>Jeśli miał(a)byś całkowicie wolną wolę, to co byś teraz robił/-a? Pomyśl o ogromnym potencjale swojego życia: relacjach międzyludzkich, które mógłbyś/mogłabyś mieć; rzeczach, które mógłbyś/mogłabyś doświadczyć; wszystkich tych możliwościach mogących nadać sens twojej egzystencji. Kiedy się urodziłeś/-aś wydawało się, że nie ma żadnych ograniczeń co do tego, kim mógłbyś/mogłabyś zostać. Reprezentowałeś/-aś czyste możliwości.</p> <p>Zazwyczaj, nie przestajemy sobie tego wyobrażać. Tylko w tych pięknych chwilach, gdy się zakochamy, albo osiągniemy jakiś przełom, czy odwiedzimy daleki kraj, to uświadamiamy sobie czym mogłoby być nasze życie.</p> <p>Jakie granice mogłyby zaspokoić twój potencjał? Jaki masz wpływ na środowisko dookoła ciebie, albo na to, co robisz w wolnym czasie? Biurokracje które oceniają cię w zależności od tego jak wypełniasz instrukcje, ekonomia która nadaje ci uprawnienia w zależności od tego jak duże zyski generujesz, „łowcy głów”, którzy utrzymują, że najlepszym sposobem by „być wszystkim tym, czym można być” to poddać się ich autorytetowi – czy to umożliwia ci osiągnąć najwięcej w twoim życiu na twoich własnych warunkach?</p> <p>Tajemnicą Poliszynela jest to, że to my <em>sami</em> mamy całkowicie wolną wolę: nie dlatego, że jest nam dana, ale dlatego, że nawet najbardziej totalitarna dyktatura nie może nam jej odebrać. Niemniej jednak, jak tylko zaczniemy działać w swoim własnym imieniu, to wejdziemy w konflikt z tymi samymi instytucjami, które miały nam zapewnić wolność.</p>'
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: 'zacznijmy od<br /><span class="bold">odpowiedzenia<br />sobie samym</span>'
        right_text_html: '<p>Menadżerowie i poborcy podatkowi uwielbiają mówić o odpowiedzialności osobistej. Ale jeśli weźmiemy całkowitą odpowiedzialność za wszystkie nasze działania, to czy wtedy w ogóle będziemy wykonywać ich instrukcje?</p> <p>W historii świata więcej zła wyrządzono wykonując rozkazy, niż żywiąc do kogoś niechęć. Arsenały wszystkich armii świata są fizyczną manifestacją naszej chęci zdawania się na innych. Jeśli chcesz mieć pewność, że nigdy nie przyłożysz ręki do wojny, rzezi, czy opresji, to pierwszym krokiem będzie zaprzestanie wykonywania poleceń.</p> <p>Odnosi się to także odnosi do twoich wartości. Niezliczeni władcy i zbiory zasad żądają twojego bezwarunkowego poddania. Ale nawet jeśli chcesz scedować odpowiedzialność za swoje decyzje na jakiegoś boga, czy dogmat, to w jaki sposób zdecydujesz, który to będzie? Czy to ci się podoba, czy nie, to ty musisz wybrać między nimi. Zazwyczaj ludzie po prostu dokonują wyboru w oparciu o to, co jest najbardziej znajome lub wygodne.</p> <p>Jesteśmy nieuchronnie odpowiedzialni za nasze przekonania i decyzje. Odpowiadanie sobie samym, bardziej niż komendantom i przykazaniom, może nadal prowadzić do konfliktu między nami, ale przynajmniej możemy zrobić to na naszych własnych zasadach, nie generując niepotrzebnych tragedii u innych.</p>'
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American athletes Tommie Smith and John Carlos during their medal ceremony at the 1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned to face their flags and hear the American national anthem, they each raised a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: 'zacznijmy od<br />szukania<br /><span class="bold">siły, nie władzy</span>'
        right_text_html: '<p>Pracownicy wykonujący pracę – mają siłę; szefowie, którzy mówią im co mają robić – mają władzę. Lokatorzy, którzy utrzymują budynek – mają siłę; właściciel, który ma akt własności ma władzę. Rzeka ma siłę; pozwolenie na budowę zapory daje władzę.</p> <p>Nie ma nic represyjnego w samej sile. Wiele rodzajów siły może mieć wyzwoleńczy charakter, np. siła by dbać o tych, których kochamy, by bronić siebie i rozwiązywać spory, wykonywać akupunkturę i sterować łódką czy huśtać się na trapezie. Istnieją sposoby pomocne w rozwijaniu własnych zdolności, które z kolei zwiększają wolność innych. Każda osoba, która zachowuje się tak, by osiągnąć swój pełny potencjał, oferuje dar innym.</p> <p>Z drugiej strony, władza nad innymi uzurpuje sobie ich siłę. I to co im odbierzesz, inni odbiorą tobie. Władza zawsze pochodzi z góry:</p> <p class="inlinequote">Żołnierz wykonuje rozkazy generała, który słucha prezydenta, który czerpie swoją władzę z Konstytucji.</p> <p class="inlinequote">Ksiądz odpowiada przed biskupem, biskup przed papieżem, papież przed pismem świętym, które z kolei czerpie swoją władzę od Boga.</p> <p class="inlinequote">Pracownik odpowiada przed właścicielem, ten przed konsumentem, którego władza wywodzi się z pieniądza.</p> <p class="inlinequote">Policjant wystawia mandat z upoważnienia magistratu, który czerpie władzę z prawa.</p> <p>Dominacja mężczyzn, białych, własności – na szczycie każdej z tych piramid nie tyle znajdujemy despotów, co społeczne wytwory: duchy hipnotyzujące ludzkość.</p> <p>W takim społeczeństwie, siła i władza przenikają się na tyle, że trudno je odróżnić: możemy co najwyżej uzyskać władzę w zamian za posłuszeństwo. Ale i tak, bez wolności, siła jest bezwartościowa.</p>'
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: 'zacznijmy od <br /><span class="bold">relacji opartych<br />na zaufaniu</span>'
        right_text_html: '<p>W przeciwieństwie do władzy, zaufanie umieszcza siłę w rękach tych, którzy ją nadają, a nie tych którzy ją otrzymują. Osoba, która zyskała zaufanie, nie potrzebuje władzy. Jeśli ktoś nie zasługuje na zaufanie, zdecydowanie nie powinien być obdarzony władzą! A mimo to, do kogo mamy mniejsze zaufanie niż do polityków, czy prezesów wielkich korporacji?</p> <p>Bez narzuconej nierównowagi władzy, ludzie mają bodziec by rozwiązywać konflikty ku swojej wzajemnej satysfakcji – by zyskać wzajemne zaufanie. Hierarchia usuwa ten bodziec, umożliwia tym, którzy mają władzę, tłumić konflikty.</p> <p>Przyjaźń, w swoim najlepszym wydaniu, to więź między równymi, którzy wspierają i kwestionują siebie nawzajem, równocześnie respektując własną autonomię. To bardzo dobra norma, według której oceniane są <em>wszystkie</em> nasze relacje. Bez tych ograniczeń, które są nam dzisiaj narzucone (obywatelstwo i nielegalna imigracja, własność i długi, sieci korporacyjnych i militarnych powiązań) moglibyśmy odtworzyć nasze relacje na podstawie swobodnego zrzeszania się i wzajemnej pomocy.</p>'
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form a fire-brigade-line to transport cobblestones to the front lines of a confrontation with police
      reconciling:
        left_text_html: 'zacznijmy od <br /><span class="bold">pogodzenia<br />jednostki i całości</span>'
        right_text_html: '<p>„Twoje prawa kończą się tam, gdzie prawa innych się zaczynają.” Biorąc pod uwagę tę logikę, im jest więcej ludzi, tym mniej jest wolności.</p> <p>Ale wolność to nie mała bańka praw osobistych. Nie możemy odróżniać się od siebie nawzajem tak łatwo. Ziewanie i śmiech są zaraźliwe, podobnie z entuzjazmem i rozpaczą. Składam się z klisz, które toczą się z mojego języka; piosenek, które siedzą mi w głowie; nastrojów, które podłapuję od moich znajomych. Kiedy jadę samochodem, zanieczyszcza on powietrze, którym ty oddychasz; kiedy korzystasz z leków, przedostają się one do wody, którą piją wszyscy. System, który wszyscy akceptują to ten, w którym ty musisz żyć – ale gdy inni ludzie go kwestionują, to masz szansę renegocjować także swoją rzeczywistość. Twoja wolność zaczyna się tam, gdzie zaczyna się moja, a kończy tam, gdzie kończy się moja.</p> <p>Nie jesteśmy jednorodnymi osobami. Nasze ciała są kompromisem tysięcy różnorodnych gatunków żyjących w symbiozie: bardziej niż zamkniętą fortecą, są one ciągłym procesem w którym składniki odżywcze i mikroby nieprzerwanie przemijają. Żyjemy w symbiozie z wieloma tysiącami gatunków, polami kukurydzy wchłaniającymi to co my wydychamy. Wataha wilków czy wieczorne kumkanie żab jest tak samo indywidualne, co wspólne, jak jedno z naszych ciał. Nie działamy w samorzutnie napędzającej się próżni; energia kosmosu przepływa przez nas. </p> <p>Język służy komunikowaniu tylko dlatego, że jest pospolity. To samo odnosi się do idei i pragnień: możemy je <em>przekazać</em>, bo są większe niż my. Każdy z nas jest stworzony z chaosu przeciwstawnych sił, które rozciągają się poza nami w czasie i przestrzeni. Poprzez wybór, które z nich kultywować, określamy to, co będziemy wspierać w każdej osobie, którą spotkamy.</p> <p>Wolność to nie jest coś co można posiadać, to nie własność – to relacja. Nie chodzi o to, by być chronionym przed światem zewnętrznym, ale przecinać go w taki sposób, by zmaksymalizować swoje możliwości. To nie znaczy, że dla własnego dobra trzeba szukać konsensusu. Zarówno konflikt, jak i konsensus mogą nas rozwijać i uszlachetniać tak długo, jak żadna scentralizowana władza nie jest w stanie wymusić zgody lub przekształcić konflikt w regułę „zwycięzca bierze wszystko”. Ale zamiast dzielić świat na malutkie państewka, spróbujmy raczej uczynić go jak najbardziej powiązanym.</p>'
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: 'zacznijmy od<br /><span class="bold">wyzwolenia<br />pragnień</span>'
        right_text_html: '<p>Dorastanie w tym społeczeństwie sprawia, że nawet nasze pasje nie są nasze. Są one kultywowane przez reklamę i inne formy propagandy po to, aby utrzymać nas w kieracie gospodarki rynkowej. Dzięki indoktrynacji ludzie mogą lubić robić rzeczy, które na dłuższą metę czynią ich nieszczęśliwymi. Jesteśmy zamknięci w naszym cierpieniu i nasze przyjemności są ściśle uszczelnione.</p> <p>By być naprawdę wolnym, musimy skupić się na procesach, które odpowiadają za nasze pragnienia. Wyzwolenie nie polega na spełnianiu dzisiejszych pragnień, ale rozwinięciu poczucia tego, co jest możliwe, więc nasze pragnienia mogą dogonić realia, które zmuszają nas do tworzenia. Oznacza to, że powinniśmy odrzucić przyjemność wynikającą z wymuszenia, dominacji i posiadania, a szukać przyjemności, która wyzwoli nas z oków posłuszeństwa i konkurencji. Jeśli kiedykolwiek przezwyciężyłeś/-aś uzależnienie, to zasmakowałeś tego, czym jest przekształcanie pragnień.</p>'
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the tango together in the street
      revolt:
        left_text_html: 'zacznijmy od<br /><span class="bold">buntu</span>'
        right_text_html: '<p>Fanatycy zazwyczaj oskarżają specyficzną grupę o problemy systemowe: Żydów za goniący za zyskiem kapitalizm, imigrantów za ekonomiczną recesję. W ten sam sposób ludzie oskarżają pojedynczych polityków za korupcję w polityce. Ale problemem są same systemy. Nie ważne kto trzyma wodze, produkuje on tę samą nierównowagę władzy i chorobliwe upokorzenie. Problemem nie jest to, że są one uszkodzone, ale przede wszystkim to, że działają.</p> <p>Naszymi przeciwnikami nie są ludzie, ale instytucje i normy, które separują nas od siebie nawzajem, jak i separują nas od siebie samych. <em>Więcej konfliktów jest w nas niż między nami.</em> Te same błędne bariery, które przecinają naszą cywilizację, przebiegają również przez nasze przyjaźnie i serca; to nie jest konflikt między różnymi ludźmi, ale pomiędzy różnymi rodzajami relacji, różnymi rodzajami życia. Kiedy odmówimy naszych ról w panującym porządku, ukarzemy te fałszywe bariery, zapraszając innych by także zajęli stanowisko.</p> <p>Najlepszą rzeczą byłoby odrzucenie dominacji jako całości – nie poprzez bardziej uczciwe zarządzanie detalami, nie poprzez przesuwanie pozycji tego kto karze i tego kto to znosi, nie stabilizowanie systemu poprzez jego reformowanie. Sednem protestu jest nie wezwanie o bardziej legitymizowane rządy lub władców, ale pokazanie, że możemy działać w oparciu o naszą własną siłę, zachęcając równocześnie innych do tego samego i zniechęcając władze do ingerowania. To nie jest kwestia wojny – binarnego konfliktu między zmilitaryzowanymi przeciwnikami – ale raczej <em>zaraźliwego nieposłuszeństwa.</em></p> <p>Nie chodzi tylko o to by edukować i dyskutować, czekając na to aż serca i umysły innych się zmienią. Dopóki idee nie są wyrażone w działaniu, konfrontując ludzi z konkretnymi wyborami, pozostaje jedynie abstrakcyjna rozmowa. Większość ludzi woli zdystansować się od teoretycznych dyskusji, ale gdy coś się <em>dzieje</em>, gdy stawka jest wysoka i kiedy mogą zobaczyć znaczące różnice pomiędzy przeciwnymi stronami, to wtedy podejmą działanie. Nie potrzebujemy jednomyślności, ani pełnego zrozumienia świata jako całości, ani mapy drogowej do precyzyjnego celu – tylko odwagi, aby ustawić się na alternatywnej ścieżce. </p>'
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5, 1989, the morning after the Chinese military had suppressed the Tiananmen Square protests of 1989 by force, who later became known as the Tank Man. The tanks maneuvered to pass by the man, and he moved to continue to obstruct them, in something like a dance.
      control:
        left_text_html: 'problemem jest<br /><span class="bold">kontrola</span>'
        right_text_html: '<p>Jakie są oznaki tego, że jesteś w toksycznym związku? Sprawca może kontrolować twoje zachowanie lub dyktować ci co myśleć; blokować lub regulować twój dostęp do zasobów; używać gróźb lub przemocy wobec ciebie; albo sprawić byś był/-a od niego/niej zależny/-a, a wszystko to pod ciągłym nadzorem.</p> <p>To opisuje zachowanie konkretnych sprawców, ale to samo tyczy się urzędów podatkowych, ABW i większości innych instytucji, które kontrolują nasze społeczeństwo. Praktycznie wszystkie one opierają się na założeniu, że ludzie muszą być kontrolowani, zarządzani i administrowani.</p> <p>Im większą niesprawiedliwość się na nas nakłada, tym trzeba większej kontroli by ją utrzymać. Na jednym końcu kontinuum władzy, kontrola jest bezpośrednio brutalnie sprawowana: ataki dronów, oddziały specjalne policji, odosobnienia, czy profilowanie rasowe. Na drugim końcu, są wszechobecne i niewidzialne, wbudowane w infrastrukturę społeczną algorytmy, które determinują rankingi kredytowe i składki ubezpieczeniowe, sposoby tworzenia statystyk i przekształcania ich w planowanie przestrzenne, architekturę stron towarzyskich czy platform mediów społecznościowych. Amerykańska Agencja Bezpieczeństwa Narodowego (NSA) monitoruje wszystko to, co robimy w internecie, ale to i tak nie obejmuje tyle kontroli nad naszym życiem, co algorytmy, które określają to, co my widzimy, kiedy podłączymy się do internetu.</p> <p>Kiedy nieskończone możliwości życia zostaną zredukowane do zbioru opcji zero-jedynkowych, to nie będzie więcej tarć między systemem, który odziedziczymy i życiem, które możemy sobie wyobrazić – nie dlatego, że możemy osiągnąć całkowitą wolność, ale dlatego, że będziemy mieli tego doskonałą odwrotność. Wolność nie oznacza wyboru między opcjami, ale formułowanie pytań.</p>'
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: 'problemem jest<br /><span class="bold">hierarchia</span>'
        right_text_html: '<p>Istnieje wiele różnych mechanizmów, przy pomocy których można narzucić nierówności. Niektóre są zależne od scentralizowanego aparatu, jak na przykład sądownictwo. Inne mogą funkcjonować bardziej nieformalnie, jak np. stara dobra męskie solidarność czy role płciowe.</p> <p>Niektóre z tych mechanizmów zostały prawie całkowicie zdyskredytowane. Niektórzy ciągle wierzą w boskie prawo królów, mimo, że przez stulecia żadna inna forma społeczeństwa nie była nawet brana pod uwagę. Inni są ciągle głęboko przekonani, że nie możemy wyobrazić sobie bez nich życia. Kto może sobie wyobrazić świat bez praw własności? Mimo wszystko są to tylko konstrukcje społeczne: one są prawdziwe, ale nie nieuniknione. Istnienie właścicieli budynków i prezesów nie jest bardziej naturalne, konieczne lub korzystne, niż istnienie cesarzy.</p> <p>Wszystkie te mechanizmy rozwijały się wspólnie, wspierając się nawzajem. Historia rasizmu, na przykład, jest nierozłącznie związana z historią kapitalizmu: nie jest on możliwy bez kolonizacji, niewolnictwa, czy koloru skóry, w oparciu o którą podzielono pracowników. To wszystko pozwala zrozumieć, kto na świecie zapełnia więzienia i slumsy. Podobnie, bez infrastruktury państwowej i innych hierarchicznych struktur społecznych, niezorganizowani fanatycy nie mogliby nigdy stworzyć systemowej supremacji białych. To, że Czarny Prezydent może przewodzić tym strukturom w USA, jedynie je stabilizuje: to wyjątek potwierdzający regułę.</p> <p>Innymi słowy: tak długo jak istnieje policja, to jak myślisz, kogo będzie prześladować? Tak długo jak są więzienia, to jak myślisz, kto je będzie wypełniał? Tak długo jak jest ubóstwo, to jak myślisz, kto będzie biedny? Naiwnością jest wierzyć, że możemy osiągnąć równość w społeczeństwie bazującym na hierarchii. Możesz potasować karty, ale to nadal ta sama talia.</p>'
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands guard in front of several Ku Klux Klan members in full robes, one of whom carries a American flag
      borders:
        left_text_html: 'problemem są<br /><span class="bold">granice</span>'
        right_text_html: '<p>Gdyby obca armia zaatakowała kraj, wycięła lasy, zatruła rzeki i zmusiła dzieci, by były jej wierne, kto by nie chciał sięgnąć po broń i się temu przeciwstawić? Ale jeśli to samo robi miejscowa władza, patrioci ochoczo wyrażają swoje podporządkowanie, oddają im podatki i dzieci.</p> <p>Granice nie chronią nas, one nas dzielą – tworzą niepotrzebne spięcia z wykluczonymi, podczas gdy przesłaniają prawdziwe różnice między miejscowymi. Nawet najbardziej demokratyczny rząd jest utworzony w oparciu o ten podział, pomiędzy uczestnikami i outsiderami, legalnymi i nielegalnymi. W starożytnych Atenach, kolebce demokracji, tylko ułamek ludności został uwzględniony w procesie politycznym; amerykańscy Ojcowie Założyciele współczesnej demokracji posiadali niewolników. W USA obywatelstwo ciągle stwarza bariery między miejscowymi i wykluczonymi, pozostawiając miliony nielegalnych mieszkańców bez wpływu na swoje życie.</p> <p>Liberalna idea zakłada rozciągnięcie linie integracji tak, aby cały świat stał się jednym ogromnym demokratycznym projektem. Jednakże nierówności są zakodowane w samej strukturze. Na każdym poziomie tego społeczeństwa, tysiące malutkich granic dzieli nas na tych co mają władzę i tych co jej nie mają: punkty kontrolne, rankingi kredytowe, hasła dostępu do baz danych, przedziały cenowe. Potrzebujemy takich form przynależności, które nie opierają się na wykluczeniu, takich które nie centralizują władzy i jej nie legitymizują, takich, które nie wymuszają empatii dla zamkniętych osiedli.</p>'
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: 'problemem jest<br /><span class="bold">reprezentacja</span>'
        right_text_html: '<p>Możesz mieć wyłącznie władzę dzierżąc ją; możesz się tylko nauczyć co cię interesuje uczestnicząc w tym. Kiedy na świecie wszelkie próby wywierania nacisku muszą być przekazywane poprzez przedstawicieli albo przetłumaczony na język protokołu instytucji, zaczynamy się alienować od siebie nawzajem i własnego potencjału. Każdy aspekt naszych działań, który kreujemy, pojawia się na nowo jako coś nierozpoznawalnego i nam nieprzyjaznego. Politycy, którzy nas zawsze zawodzili, pokazują jedynie jak dużo władzy utraciliśmy nad naszym własnym życiem; przemoc policji to mroczna konsekwencja naszych pragnień by wyzbyć się osobistej odpowiedzialności za to, co dzieje się w naszym sąsiedztwie.</p> <p>W wieku cyfryzacji, kiedy każdy człowiek musi służyć jako swój własny sekretarz do zarządzania swoim publicznym wizerunkiem, nasza własna reputacja stała się tak obca, jak żerujące na nas wampiry. Jeśli nie bylibyśmy tak bardzo od siebie odizolowani, konkurując ze sobą o to, by sprzedać się na tylu zawodowych i społecznościowych rynkach, czy zainwestowalibyśmy tyle czasu i energii w te profile, plastikowe wydmuszki zrobione na nasze własne podobieństwo?</p> <p>Jesteśmy nieredukowalni. Ani przedstawiciele, ani abstrakcyjne teorie nie mogą za nami stanąć. Jeśli zredukujemy ludzi do demografii i surowych danych doświadczalnych, to stracimy z oczu wszystko to, co jest cenne i unikalne na świecie. Potrzebujemy obecności, bliskości, bezpośrednich kontaktów między sobą, bezpośredniej kontroli nad naszym życiem – rzeczy, których przedstawiciele i reprezentacja nam nie dostarczą.</p>'
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: 'problemem są<br /><span class="bold">liderzy</span>'
        right_text_html: '<p>Przywództwo jest chorobą społeczną, gdzie większość uczestników w grupie nie przejmuje inicjatywy lub myśli krytycznie o swoich akcjach. Tak długo, jak rozumiemy działanie jako własność poszczególnych osób, a nie relacji między ludźmi, to zawsze będziemy zależni od liderów i ich łaski. Naprawdę wzorowi liderzy są tak samo niebezpieczni, jak ci skorumpowani, w tym sensie, że ich wychwalane pod niebiosa przymioty wzmacniają ich status i szacunek innych, nie mówiąc o legitymizacji samego przywództwa jako takiego.</p> <p>Kiedy policja zjawia się w czasie protestu, to pierwsze pytanie jakie stawiają, zawsze brzmi: „Kto jest organizatorem?” – nie dlatego, że przywództwo jest niezbędne do zbiorowego działania, ale dlatego, że zawiera luki. O to samo pytali konkwistadorzy gdy przybywali do tzw. Nowego Świata; kiedykolwiek pojawiała się odpowiedź, to zaoszczędzała im problemów w ujarzmianiu tych społeczeństw na wieki. Tak długo jak jest lider, może być on zastąpiony, wymieniony, czy wzięty do niewoli. W najlepszym razie poleganie na liderach jest piętą achillesową; w najgorszym, reprodukuje interesy władzy oraz struktury władzy u przeciwnika. Lepiej już, gdy każdy ma poczucie własnego sprawstwa i swoje priorytety jako takie.</p>'
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that surround him
      government:
        left_text_html: 'problemem jest<br /><span class="bold">rząd</span>'
        right_text_html: '<p>Rządy obiecują prawa, ale mogą jedynie odbierać wolności. Idea praw zakłada centralne uprawnienia do ich nakładania i zabezpieczania. Mimo to, wszystko co państwo jest w stanie zagwarantować, jest także w stanie odebrać. Upoważnienie rządu do rozwiązania jednego problemu, otwiera drogę ku stworzeniu wielu problemów. Rządy nie generują władzy z niczego – przejęły <em>naszą</em> władzę, którą my możemy poprowadzić znacznie bardziej efektywnie bez biurokratycznej machiny reprezentacyjnej.</p> <p>Najbardziej liberalna demokracja dzieli te same zasady, co najbardziej despotyczne autokracje: centralizacja władzy i legitymizacja w strukturach przeznaczonych do zmonopolizowania użycia siły. I nieważne czy biurokraci zarządzający tymi strukturami odpowiadają przed królem, prezydentem, czy elektoratem. Prawa, biurokracja i policja są starsze niż demokracja; działają w ten sam sposób w demokracji, jak i w dyktaturze. Jedyna różnica jest taka, że ponieważ możemy głosować, kto nimi zarządza, to przyjęliśmy traktować je jako <em>własne</em> – nawet wtedy, gdy są wykorzystywane przeciwko nam.</p> <p>Dyktatury są dziedzicznie niestabilne: możesz zabijać, więzić i ogłupiać całe pokolenia, a ich dzieci i tak będą wymyślać na nowo walkę o wolność. Ale obiecaj każdemu człowiekowi szansę narzucenia woli większości swoim towarzyszom, a wszyscy oni staną razem za systemem, który wystawia ich przeciwko sobie nawzajem. Im bardziej ludzie myślą, że mają wpływ na instytucje przymusu państwa, to tym bardziej te instytucje staną się popularne. Być może tłumaczy to, dlaczego globalne ekspansja demokracji związana jest z niesamowitymi nierównościami w dystrybucji zasobów i władzy: żaden inny system rządów nie mógłby utrzymać tak niepewnej sytuacji.</p> <p>Kiedy władza jest scentralizowana, ludzie muszą osiągnąć panowanie nad innymi po to, by mieć jakikolwiek wpływ na własne losy. Walka o autonomię jest skanalizowana w walkę o polityczną władzę: świadczą o tym wojny domowe w postkolonialnych krajach pomiędzy narodami, które wcześniej pokojowo współegzystowały. Ci, którzy mają władzę, mogą ją jedynie zachować dzięki prowadzeniu bezustannej wojny przeciwko swoim własnym populacjom, tak jak i przeciwko ludziom z innych krajów, np. amerykańska Gwardia Narodowa wraca z Iraku po to, by być wykorzystana w Oakland.</p> <p>Wszędzie tam, gdzie są hierarchie, to faworyzują one tych na górze by scentralizowali władzę. Budowanie większej kontroli i równowagi w systemie oznacza poleganie na ochronie rzeczy, przed którą potrzebujemy ochrony. Jedyny sposób by wywierać nacisk na władzę i nie być wchłoniętym w jej grę, to rozwijać horyzontalne sieci, które mogą działać autonomicznie. Wtedy gdy będziemy wystarczająco silni, aby zmusić władze do potraktowania nas serio, będziemy wystarczający silni by rozwiązać nasze problemy bez ich udziału.</p> <p>Nie ma innej drogi do wolności niż poprzez wolność. Zamiast jednego wąskiego gardła dla wszystkich państwowych agencji, potrzebujemy wielu różnych obszarów, w oparciu o które można by sprawować władzę. Zamiast pojedynczej legitymizacji, potrzebujemy przestrzeni dla wielu opowieści. Zamiast przymusu występującego w rządzie, potrzebujemy takiego procesu decyzyjnego, który promując autonomię i praktyki samoobrony, trzyma niedoszłych władców pod kontrolą.</p>'
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded by press and their minions, a summit meeting with greek columns of marble and a traditional fresco in the dome above
      profit:
        left_text_html: 'problemem są<br /><span class="bold">zyski</span>'
        right_text_html: '<p>Pieniądz to idealny mechanizm podtrzymujący nierówności. Jest treściwy: wydaje się być zdolnym do reprezentowania wszystkiego. Jest uniwersalny: ludzie, którzy nie mają nic wspólnego, akceptują go jako wspólny element życia. Jest bezosobowy: w odróżnieniu od dziedzicznych przywilejów, może być natychmiast przekazywany z jednej osoby na drugą. Jest płynny: im łatwiej jest zmienić pozycję w hierarchii, tym bardziej stabilna jest sama hierarchia. Wielu którzy protestują przeciwko dyktaturze, akceptuje autorytet rynku.</p> <p>Kiedy wszystkie wartości są skoncentrowane w pojedynczym instrumencie, to nawet te bezpowrotnie stracone momenty naszego życia są wyprute ze znaczeń, stają się żetonami w abstrakcyjnej kalkulacji władzy. Wszystko czego nie można finansowo określić spada na dalszy plan. Życie staje się walką o finansowe korzyści: każdy przeciwko wszystkim, sprzedaj albo będziesz sprzedany. </p> <p><em>Osiągnąć zysk:</em> tzn. uzyskać większą kontrolę nad zasobami społecznymi w stosunku do innych. Nie możemy wszyscy w tym samym czasie zarabiać. Ujmując rzecz proporcjonalnie, zarobek dla jednej osoby, to strata dla kogoś innego. Kiedy inwestorzy czerpią zyski z pracy pracowników, to znaczy, że im więcej zatrudni on osób, tym większa powstaje między nimi finansowa dziura.</p> <p>System napędzany przez zysk produkuje ubóstwo w tym samym tempie, w jakim koncentruje bogactwo. Nacisk na to, by konkurować, generuje innowacje szybciej niż poprzedni system, ale równocześnie nawet szybciej produkuje dysproporcje: kiedyś jeźdźcy panowali nad piechurami, teraz niewidzialne bombowce latają nad bogatymi i bezdomnymi. A ponieważ każdy ma realizować zyski, a nie osiągać rzeczy dla swojego własnego dobra, wyniki całej tej pracy mogą być fatalne. Zmiany klimatu to tylko ostatnia z serii katastrof, której nawet najpotężniejsze reżimy kapitalistyczne nie są w stanie powstrzymać. Bo kapitalizm nie nagradza przedsiębiorców za zażegnanie kryzysowi, ale na nich zarabia.</p>'
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: 'problemem jest<br /><span class="bold">własność</span>'
        right_text_html: '<p>Fundamentem kapitalizmu są prawa własności – kolejna społeczna konstrukcja, którą odziedziczyliśmy po królach i arystokratach. Dzisiaj własność zmienia właścicieli bardzo gwałtownie, ale pomysł jest ten sam: idea własności legitymizuje użycie przemocy, w celu wymuszenia sztucznych dysproporcji w dostępie do ziemi i zasobów.</p> <p>Niektórzy ludzie wyobrażają sobie, że własność mogłaby istnieć bez państwa. Ale prawa własności są nieważne bez scentralizowanej władzy, która je narzuca – i tak długo, jak istnieje scentralizowana władza, nic tak naprawdę nie jest twoje. Wybijane przez państwo pieniądze, które ty zarabiasz, podlegają opodatkowaniu i inflacji. Rejestracja twojego samochodu jest kontrolowana przez wydział ruchu. Twój dom nie należy do ciebie, ale banku, który użyczył ci kredytu hipotecznego.</p> <p>Co byśmy zrobili żeby zabezpieczyć rzeczy, które są dla nas ważne? Rządy istnieją tylko dzięki naszemu przyzwoleniu; zawsze będą brały więcej niż dawały. Rynki tylko wynagradzają nas za obskubywanie naszych kompanów i innych za oskubywanie nas. Naszym jedynym prawdziwym ubezpieczeniem są więzi społeczne: jeśli chcemy być pewni naszego bezpieczeństwa, to potrzebujemy wzajemnych sieci pomocowych, które mogą nas obronić.</p> <p>Bez pieniędzy albo praw majątkowych, nasze relacje do rzeczy będą zależne od naszych relacji każdego z każdym. Dzisiaj, jest dokładnie na odwrót: nasze wzajemne relacje są zdeterminowane przez relacje do rzeczy. Zniesienie własności nie znaczy, że utracisz to co posiadasz; to będzie raczej znaczyło, że żaden komornik czy załamanie rynku nie odbierze ci rzeczy, na których ci zależy. Zamiast odpowiadać na biurokrację, moglibyśmy zacząć od ludzkich potrzeb; zamiast wykorzystywać siebie nawzajem, powinniśmy szukać zalet we współzależności.</p> <p>Największym strachem łajdaka jest społeczeństwo bez własności – bo bez tego, otrzyma on tylko tyle szacunku, na ile zasługuje. Bez pieniędzy ludzie są cenieni za to, co dodadzą do życia innych, a nie za to, ile mogą osiągnąć przy pomocy łapówek. Bez zysków, każdy wysiłek musi być nagrodą samą w sobie, więc nie ma zachęty do bezwartościowej lub destrukcyjnej aktywności. Rzeczy które w życiu są naprawdę ważne – pasja, koleżeństwo, dobroczynność – są dostępne w obfitości. Trzeba by wielu oddziałów policji i ochroniarzy by utrzymać pułapki, które złapały nas w tym wyścigu szczurów.</p>'
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the window, being used as community organizing location
      lastcrime:
        left_text_html: '<span class="bold">ostatnia zbrodnia</span>'
        right_text_html: '<p>Każde polecenie opiera się na zbrodni przeciwko wcześniejszemu poleceniu – przestępstwo, które to rozwiązuje. Po wszystkim, nowy porządek zaczyna być postrzegany jako legitymizowany, bo ludzie zaczynają go uważać za dany. Założycielską zbrodnią USA była rewolta przeciwko władzy króla Anglii. Założycielską zbrodnią nadchodzącego społeczeństwa, jeśli przetrwamy obecne, będzie pozbycie się praw i instytucji z dnia dzisiejszego. </p> <p>Kategoria zbrodni posiada wszystko to, co przekracza granice społeczeństwa – to co najlepsze i najgorsze. Każdy system jest nawiedzany przez wszystko to, co nie może być włączone lub kontrolowane. Każde polecenie zawiera nasiona własnej destrukcji.</p> <p>Nic nie trwa wiecznie, dotyczy to także imperiów i cywilizacji. Ale co mogłoby to zastąpić? Czy można sobie wyobrazić polecenie, nie dzielące życia na prawomocne i nieprawomocne, legalne i nielegalne, rządzących i rządzonych? Co mogłoby być <em>ostatnią zbrodnią? </em></p>'
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: '<p><span class="green black">Anarchia</span> jest gdziekolwiek tam, gdzie polecenie nie jest narzucane przy pomocy siły. To wolność: proces ciągłego rozwijania siebie i naszych relacji.</p> <p>Każdy swobodnie zachodzący proces czy zjawisko – las tropikalny, krąg przyjaciół, twoje własne ciało – to anarchiczna harmonia, która istnieje poprzez ciągłą zmianę. Z drugiej strony, sterowanie odgórne może być utrzymane tylko poprzez ograniczenie lub przymus: niejasna dyscyplina izby zatrzymań, rolne gospodarstwo przemysłowe w którym pestycydy i herbicydy chronią sterylne rządki genetycznie zmodyfikowanej kukurydzy, krucha hegemonia mocarstwa.</p>'
        second_html: '<p><span class="pink black">Anarchizm</span> to idea, że każdy może mieć wolną wolę. Żadne prawo, rząd czy proces decyzyjny nie jest ważniejszy niż potrzeby i pragnienia człowieka. Ludzie powinni mieć swobodę w kształtowaniu relacji ze swoich wzajemnych satysfakcji i stać się takimi, jakimi chcą.</p> <p>Anarchizm to nie dogmat albo wzór. To nie system (jak demokracja), który mógłby zadziałać tylko wtedy, gdy się go odpowiednio wdroży. To nie cel, który ma być zrealizowany w jakiejś odległej przyszłości (jak komunizm). To sposób na działanie i zachowanie, które w praktyce możemy zastosować już teraz. W odniesieniu do jakiegokolwiek systemu wartości lub sposobu działania, możemy zacząć od pytania: <em>Jak dystrybuuje on władzę?</em></p>'
        third_html: '<p><span class="blue black">Anarchiści</span> sprzeciwiają się wszelkim formom hierarchii – każdej formie, która koncentruje władzę w rękach garstki, każdemu mechanizmowi, który oddala nas od naszego potencjału. Wobec zamkniętych systemów, możemy rozkoszować się tym, co przed nami nieznane, chaosem wewnątrz nas, dzięki któremu możemy być wolni.</p>'
      outro:
        left_text_html: '<p>Kiedy widzimy, co wszystkie instytucje i mechanizmy dominacji mają wspólnego, staje się jasne, że nasze indywidualne zmagania są także częścią czegoś większego niż my, czegoś co mogłoby nas połączyć. Kiedy stworzymy razem podstawy tej więzi, wszystko się zmieni: nie tylko nasze zmagania, ale także nasze poczucie działania, nasza zdolność do radości, poczucie, że nasze życie coś znaczy. To wszystko co jest potrzebne by odnaleźć siebie, to zacząć działać według innej logiki.</p>'
        right_text_html: 'By<br />zmienić<br />wszystko,<br /> zacznij<br />gdziekolwiek.'
