      intro:
        left_text_html: 'Kdybychom mohli něco změnit, co by to bylo? Udělali bychom
          si prázdniny do konce života? Skoncovali s fosilními palivy, která způsobují
          změnu klimatu? Požadovali od bank a politiků etické jednání? Ať tak či tak,
          nic by nebylo pošetilejší, než nechat vše tak, jak to je a zároveň očekávat
          změnu. Naše osobní, finanční a emocionální problémy do velké míry jen odrážejí
          celosvětové společenské otřesy a pohromy. Můžeme klidně strávit zbytek života
          hašením jednoho malého požáru po druhém, ale vzhledem k tomu, že všechny
          drobné požáry zakládá jeden žhář, žádné postupné řešení nám už nepomůže.
          Musíme vše přehodnotit novou optikou (podle nové logiky):'
        right_text_html: Změň všechno, začni všude!
      self:
        left_text_html: začni sebeurčením
        right_text_html: |-
          Fantom svobody stále pronásleduje svět, odráží se v jeho podobě. Bylo nám slíbeno úplné právo na svobodné rozhodování. Všechny instituce, které jsme si jako společnost vytvořili, ho mají přece zaručovat. Kdybychom měli úplné právo na svobodné rozhodování, co bychom asi dělali právě teď? Přemýšlejme nad nekonečnými možnostmi lidského života; nad vztahy, které bychom mohli mít, nad vším, co bychom mohli zažít a získávat přitom nové zkušenosti a nad všemi možnostmi, jak dát svému životu smysl. Když se člověk narodí, zdánlivě ho nic nelimituje a může se stát, kýmkoli bude chtít. Život se jeví jako čistá příležitost

          bez hranic.

          Většina z nás si nesplněné sny nikdy nepřestane představovat. Ovšem pouze v těch nejkrásnějších okamžicích života, třeba když se zamilujeme, učiníme zásadní objev, nebo když navštívíme vzdálenou zem, spatříme oslnivý záblesk toho, jaké by naše životy mohly

          být neustále.

          Co nás ale limituje? Kolik prostoru k seberealizaci a sebeurčení máme v prostředí, ve kterém žijeme a trávíme svůj čas? Kdo vytváří ten prostor? Jsou to byrokracie, a instituce, které nás oceňují podle toho, jak následujeme jejich pokyny? Ekonomika, která nám přiděluje moc na základě výše našeho výdělku? Nebo jsou to školy a jiné instituce, které nám říkají, jak můžeme „být vším, čím chceme být“, když se poddáme jejich pravidlům? Doopravdy nám umožňují žít život naplno? Veřejným tajemstvím je, že jsme plné právo na sebeurčení a seberealizaci máme jen my: ne proto, že nám ho dal někdo jiný, ale protože nám ho ani ta nejvíce totalitní diktatura nemůže vzít. A proto se, jakmile začneme jednat podle svého, dostáváme do konfliktu právě s těmi institucemi, které by měly zajišťovat naší

          svobodu.
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: začni odpovědností za sebe
        right_text_html: |-
          Manažeři a výběrčí daní rádi mluví o osobní odpovědnosti. Když ale převezmeme celou odpovědnost za naše jednání, budeme potom vůbec ještě potřebovat jejich

          pokyny? V historii bylo naděláno více škody pasivní podřízeností, než aktivním zlem. Arzenál všech světových armád je fyzickou manifestací naší ochoty podrobit se ostatním. Pokud si chceme být opravdu jistí a jisté, že se nikdy nepodílíme na válce, genocidě, nebo útlaku, prví krok, který musíme udělat, je přestat poslouchat rozkazy

          někoho jiného.

          To se týká i našich názorů a hodnot. Nekonečné množství vládců, pravidel a směrnic neustále vyžaduje naší nekritickou podřízenost. Říkají nám, jak se máme chovat, jak máme myslet. Kdybychom chtěli převést naši zodpovědnost na někoho jiného, třeba boha, anebo doktrínu, jak zvolíme ty, kteří to budou? Ať se nám to líbí nebo ne, my jsme těmi, kdo si musí vybrat. Většina lidí jednoduše zvolí podle toho, co znají, co je zaběhané a

          tudíž pohodlné. Všichni jsme nevyhnutelně odpovědni za naše přesvědčení a rozhodnutí. Odpovědností k sobě samým a svým myšlenkám, radši než k velitelům a příkazům, můžeme tak i tak vyvolávat konflikty mezi lidmi. Přinejmenším to ale budou konflikty vycházející z nás samých, založené na neshodách našich vlastních přesvědčení, nikoli další zbytečné vršení tragédií ve

          službách cizích zájmů.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: začni hledáním moci, ne autority
        right_text_html: |-
          Ti, kteří odvádějí práci, mají moc – šéfové, kteří jim říkají, co dělat, mají autoritu. Nájemníci udržující dům v dobrém stavu, mají moc – majitel domu, jehož jméno je na nájemní smlouvě, má autoritu. Řeka má moc – povolení ke stavbě přehrady vytavuje úředník, tedy autorita. Na moci samotné není nic utlačujícího. Mnoho druhů moci může být osvobozujících: moc starat se o ty, které milujeme, moc bránit se a vyřešit spory, moc provádět akupunkturu, kormidlovat plachetnici, nebo se houpat na vysuté hrazdě. Existuje řada možností jak rozvíjet vlastní kapacitu, která může osvobodit i ostatní kolem. Každý člověk, který jedná tak, aby dosáhnul celého svého potenciálu, tím obdarovává

          své okolí.

          Autorita si usurpuje moc ostatních, která jí nepatří. To co je lidem bráno, jsou nuceni vzít jiným. Autorita je proto vždy

          čerpaná vertikálně:

          Voják se podřizuje generálovi, ten se zodpovídá prezidentovi, jehož autorita pochází z Ústavy. Kněz se zodpovídá biskupovi, biskup papeži a papež Písmu svatému, které dostalo autoritu od „Boha“. Zaměstnanec se zodpovídá majiteli, který obsluhuje zákazníka. Zákazníkova autorita je určována množstvím

          peněz.

          Policista vykonává příkaz k prohlídce podepsaný magistrátem, a ten čerpá autoritu ze zákona. Mužství, bělost, majetek – všechny tyto vrcholy pyramid, nejsou tvořeny tyrany. Jsou to pouze sociální konstrukty: duchové hypnotizující lidstvo. V současné společnosti jsou moc a autorita propojeny natolik, že je jen stěží dokážeme oddělit. Moc můžeme získat jenom výměnou za poslušnost. Jenomže moc bez

          svobody je bezcenná.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: začni vztahy budovanými na důvěře
        right_text_html: Důvěra, na rozdíl od autority, soustředí moc do rukou těch,
          kteří jí udělují a ne těm, kteří jí dostávají. Člověk, který má něčí důvěru,
          nepotřebuje autoritu. A pokud si někdo nezaslouží důvěru, pak by mu rozhodně
          neměla být dána ani autorita! Komu důvěřujeme méně než politikům a generálním
          manažerům? Bez vynucené nerovnováhy sil, jsou lidé motivováni řešit konflikty
          ke vzájemné spokojenosti. Tím si získají důvěru jedné/jednoho v druhou/druhého
          a naopak. Hierarchie tuto motivaci odstraňuje, a těm, kteří májí autoritu
          umožnuje konflikty potlačit. Přátelství je pouto mezi sobě rovnými, kteří,
          nebo které se vzájemně podporují respektujíce přitom vzájemnou autonomii.
          To je příklad, od kterého můžeme odvodit všechny naše vztahy. Bez zábran,
          které jsou nám denně nuceny, bez státního občanství a ilegality, majetku
          a dluhů, anebo bez korporátních a byrokratických okovů bychom mohli naše
          vztahy budovat na nových základech vzájemné pomoci a svobodného společenství.
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: začni usmířením osobního i celku
        right_text_html: |-
          „Tvá svoboda končí tam, kde začíná svoboda někoho jiného.” Podle této logiky, čím více lidí, tím méně svobody. Svoboda ale není drobná bublina osobních práv. Není možné od sebe jednotlivé lidi tak jednoduše oddělit. Zíváni a smích jsou nakažlivé; stejně jako nadšení a beznaděj. Každý/každá z nás v sobě nosí různá odkoukaná klišé, písně neúprosně zapsané v hlavě, nebo nálady, které přebíráme od svých přátel. Když řídíme auto, uvolňujeme znečištění do atmosféry, kterou sami dýcháme; když používáme farmaceutika, dostávají se do vody, kterou všichni pijeme. Systém, který všichni ostatní akceptují je ten, ve kterém musíme žít i my — když jej ale ostatní lidé napadají, pak i my máme novou šanci promyslet naši realitu. Naše svoboda začíná tam, kde začíná svoboda ostatních a končí tam, kde končí

          svoboda ostatních.

          Nejsme oddělená individua. Naše těla jsou tvořena z tisíců různých druhů žijících v symbióze. Nejsme uzavřené pevnosti, ale nekonečné procesy, skrze které bezstarostně putují živiny a mikroby. Žijeme v symbióze s tisíci dalšími druhy. Lesy a louky vdechují to, co my vydechujeme. Svolávající se smečka vlků, nebo večerní kvákání žab je individuální i společné. Stejně tak, jako naše těla. Nežijeme v samohybném vakuu; naopak, prochází skrz nás veškeré záchvěvy kosmu. Jazyk slouží ke komunikaci zkrátka proto, že je nám společný. Totéž platí pro myšlenky a touhy: můžeme je sdělovat, protože mají větší význam než my sami. Každého z nás tvoří chaos protichůdných sil, které proudí časem a prostorem mimo nás. Svou volbou sil, které

          chceme kultivovat, určuje, co podpoříme v každém, koho

          potkáme.

          Svoboda není vlastnictví nebo majetek, je to vztah. Svoboda nespočívá v ochraně před vnějším světem. Svoboda leží ve vzájemném obcování takovým způsobem, který maximalizuje možnosti všech zúčastněných. To neznamená, že musíme dosáhnout konsensu za každou cenu. Obojí, konflikt i konsensus, nás dokáží rozvíjet a povznášet. Dokáží to tak dlouho, dokud nějaká centralizovaná moc není schopná souhlas vynutit, nebo přeměnit konflikt v soutěž, v které vítěz bere vše. Ovšem radši než rozbít svět na malá panství, pojďme vyzískat maximum z našeho vzájemného propojení.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: začni osvobozením touhy
        right_text_html: |-
          Když vyrůstáme v současné společnosti, dokonce ani vášně nejsou naše vlastní; jsou pěstovány reklamou a dalšími formami propagandy tak, aby nás udržely konstantně ve službách trhu. Díky tomuto naočkování, lidé mohou pociťovat spokojenost, mohou být spokojeni s činnostmi, které je nakonec činí nešťastnými. Uzamykáme se do vlastního utrpení a touha po laciné spokojenosti je jen zámkem, který nás nepouští ven. Být opravdu svobodný, znamená ovlivňovat procesy, které diktují naše touhy. Osvobození neznamená pouze naplňovat touhy, které máme dnes, ale rozšiřovat fantazie možností budoucích. Jen tak se mohou naše sny sloučit s

          realitami, které vytváříme.

          To znamená odmítnout ta potěšení, která přijímáme za svá pod tlakem, dominancí a ovládáním a nově hledat potěšení, která nás vytrhnou z koloběhu podřízenosti a soutěže. Kdokoli někdy zlomil závislost, ví jak chutná

          proměna touhy.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: začni vzpourou
        right_text_html: |-
          Fanatici obvykle viní určitou skupinu ze způsobení systémové chyby – Židy z proměny kapitalismu v bezohledný kapitalismus, imigranty za ekonomickou recesi – stejně, jako lidé obviňují jednotlivé politiky za korupční rozklad politiky jako celku. Problém je ale samotný systém. Nezáleží na tom, kdo drží opratě, ty stejně vždy vytvářejí nerovnováhu moci, podřízenosti, ponížení a nedůstojné zacházení. Problém není v tom, že vlády fungují špatně, ale v první řadě v tom, že existují. Naši nepřátelé nejsou lidé, ale instituce a návyky, které nás odcizují jednoho od druhého a od nás samotných. Existuje více konfliktů v nás samých, než mezi námi vzájemně. Stejné zlomové linie, které otřásají civilizací, otřásají také našimi vztahy, přátelstvími a srdci. Nejde o střet mezi lidmi, ale o střet mezi rozdílnými typy vztahů, rozdílnými způsoby života. Když odmítneme naše role v nynějším uspořádání, vymažeme tak tyto falešné hranice

          a strhneme s sebou i ostatní.

          Nejlepší by bylo zbavit se nadvlády jako takové – ne ji v drobných součástech nastavovat spravedlivěji, ne míchat pozicemi těch, kdo rozdávají rány a těch, kdo tyto údery snáší, ne systém reformami stabilizovat. Smysl protestu není ve volání po rozumnějších pravidlech a vládcích, ale je demonstrací toho, že můžeme sami jednat na základě vlastních možností, že můžeme povzbuzovat ostatní, aby to dělali také a zároveň odrazovat autority od zásahů do našich životů. Nejde tu o válku, o ozbrojený konflikt dvou stran, ale mnohem spíš o nakažlivou neposlušnost. Nestačí se jenom vzdělávat a diskutovat, a čekat, až se srdce a myslí ostatních změní. Dokud myšlenky nejsou

          zhmotněny v činnosti, která lidi konfrontuje s konkrétními volbami, zůstává konverzace abstraktní. Většina lidí chce stát mimo teoretické diskuze, ale v momentě, kdy se něco děje, když je co ztratit a jasně se ukazují rozdíly mezi nepřátelskými stranami, pak zaujmou stanovisko. Nepotřebujeme jednohlasnou shodu, nepotřebujeme zevrubně rozumět celému světu do poslední čárky a nepotřebujeme ani mapu vedoucí na konkrétní místo – stačí mít kuráž a vydat se po nové cestě.
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: problémem je kontrola
        right_text_html: |-
          Jak poznáte, že jste ve vztahu tyranizováni? Nejspíš podle toho, že se násilník snaží mít kontrolu nad vaším chováním i myšlenkami, omezuje nebo úplně znemožní váš přístup k prostředkům, vyhrožuje násilím nebo vás učiní na sobě samém závislé a v této pozici vás za neustálého dohledu

          udržuje.

          Tento model popisuje nejen chování jednotlivých násilníků, ale sedí také na chování daňových úřadů, bezpečnostních složek státu a většiny dalších institucí, které řídí chod společnosti. Víceméně všechny tyto instituce stojí na myšlence, že lidé potřebují být hlídáni, řízeni a

          usměrňováni.

          Čím nevyrovnanější stav je nám ukládán, tím více kontroly je potřeba na jeho udržení. Na jedné straně autority vykonávájí kontrolu tvrdě a cíleně, prostředky jako jsou útoky dronů, použití zásahových jednotek, samovazba nebo rasové škatulkování. Na straně druhé disponují kontrolou všudypřítomnou a neviditelnou zabudovanou do infrastruktury společnosti. Jsou to třeba rovnice pro výpočet úvěrových ratingů a pojistných poplatků1, způsoby výroby statistik na míru, podle nichž se pak vytváří územní plán, ale i struktura seznamek a sociálních médií. Americký daňový úřad a Národní bezpečnostní agentura monitorují, co děláme online, tím ale nemají zdaleka takovou moc nad naší realitou jako samotné algoritmy, které určují, co vidíme,

          když se přihlásíme.

          Když budou nekonečné možnosti života redukovány na sbírku kódů složených z jedniček a nul, nebude už žádné tření mezi systémem, který obýváme a životy, které si dovedeme představit. Ovšem ne proto, že budeme žít v naprosté svobodě, ale proto, že dovede k dokonalosti její přesný opak. Svoboda neznamená volbu z možných

          odpovědí, ale kladení otázek.

          1) V politickém systému USA jsou to pro každého velmi důležitá čísla, která významně ovlivňují životní standard např. v otázce dostupnosti zdravotní péče (pozn. překl.)
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: problémem je hierarchie
        right_text_html: |-
          Nerovnost se dá vynutit celou řadou mechanismů. Některé jsou součástí centralizovaného aparátu, jako například soudní systém, jiné fungují víc neformálně, jako třeba sítě konexí a známostí z prestižních soukromých škol nebo

          genderové role. Některé z těchto mechanismů jsou téměř úplně zdiskreditovány. Jen málokdo dnes věří v bohem danou moc krále, a to i přesto, že po dlouhá staletí byl jiný základ společnosti naprosto nemyslitelný. Nicméně některé mechanismy jsou tak hluboce zakořeněny, že si život bez nich stále neumíme představit. Kdo si dokáže představit třeba svět bez vlastnických práv? Každopádně to jsou stále jen sociální konstrukty: jsou skutečné, ale ne nezvratně nutné. Existence vlastníků ohromných ploch půdy nebo generálních ředitelů není o nic víc přirozená, nutná nebo užitečná, než byla existence císařů. Všechny tyto mechanismy se vyvíjely společně a vzájemně se posilují. Například historie rasismu je neoddělitelná od historie kapitalismu. Ani jeden z nich není myslitelný bez kolonialismu, otroctví, nebo rasové segregace, která dělila pracující a dodnes určuje, kdo naplní světová vězení a chudinské čtvrtě. Stejně tak by samotná bigotnost jednotlivců nedokázala prosadit systematickou nadvládu bílých ve společnosti, kde není státní aparát a různé společenské hierarchie. Černošský prezident USA klidně může tomu všemu předsedat, ale tím systém pouze stabilizuje. Je to výjimka potvrzující pravidlo. Jinými slovy, dokud je tu policie, koho asi bude otravovat nejvíc? Dokud budou vězení, kdo je asi bude plnit? Dokud bude existovat chudoba, kdo asi bude chudý? Bylo by naivní si myslet, že můžeme dosáhnout rovnosti ve společnosti založené na nadvládě. Ano, můžeme zamíchat karty, ale stále je to ten stejný balíček.
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: problémem jsou hranice
        right_text_html: |-
          Kdyby USA, Evropu, nebo ČR napadla zahraniční armáda, pokácela stromy, otrávila řeky a nutila děti, aby jí od mala slibovaly svoji věrnost, málokdo by se nepokusil o odpor. Když se tak ale chová vláda, patrioti jí pohotově poskytují svojí podřízenost, peníze a děti. Hranice nás nechrání, ale rozdělují – vytváří zbytečné třenice s lidmi vně hranic, zatímco zastiňují opravdové rozdíly mezi lidmi žijícími uvnitř. I ta nejdemokratičtější vláda je založena na rozdělení mezi těmi, kdo se na ní smí podílet a outsidery, mezi těmi, které chrání zákon a těmi které ne. V antických Aténách, rodišti demokracie, se na rozhodování a politické činnosti směla podílet jenom malá část mužského obyvatelstva. Tzv. otcové zakladatelé, tedy autoři moderní podoby demokracie vlastnili otroky. Státní občanství v USA, nebo EU vytváří bariéru mezi vítanými a vyloučenými, a vytváří tak zástupy milionů nelegálních obyvatel, kteří přicházejí o

          možnost řídit své životy.

          Liberální ideál leží v rozšiřování hranic inkluze, dokud se celý svět neintegruje v jeden demokratický projekt. Jenomže nerovnost je zakódovaná už do samotné struktury. Na každé úrovni společnosti existují tisíce malých hranic, které nás rozdělují na mocné a bezmocné, jako třeba bezpečnostní kontroly při vstupech, úvěrové ratingy, přístupy k datům a informacím nebo cenové skupiny. Potřebujeme takové formy sounáležitosti, které nejsou založeny na vyloučení ostatních, které necentralizují moc a legitimitu a které neničí naši empatii

          k vyloučeným komunitám.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: problémem je reprezentace
        right_text_html: |-
          Jediný způsob, jak mít moc, je skutečně ji ovládat a vykonávat, jediný způsob, jak zjistit, co je ve vašem zájmu, je jednat podle něj. Pokud ale musí být všechny snahy o uplatnění vlastního vlivu na svět směrovány skrz zprostředkování politických zastupitelů nebo převáděny do protokolů různých institucí, vzájemně se odcizujeme ostatním lidem i vlastnímu potenciálu. Jakékoliv naše působení na svět, které od nás vychází, se pak dá jen těžko rozpoznat a jeví se jako něco cizího. Politici, kteří nás neustále dokola zklamávají, pouze ukazují jak velké části moci a vlivu nad našimi životy jsme se vzdali. Třeba policejní násilí je jen tíživým důsledkem naší touhy vyhnout se osobní odpovědnosti nad tím, co se děje v

          našem okolí.

          V digitální době, kde každý člověk musí být sám sobě tajemníkem či tajemnicí vlastního veřejného obrazu, se naše renomé stalo něčím vnějším a je jako upír, který z nás saje. Kdybychom nebyli vzájemně oddělováni předháněním se v prodeji nás samotných na nesčetných pracovních a společenských trzích, investovali bychom také tolik času a moci do všech těch profilů a dalších

          zlatých telat naší image?

          Jsme neredukovatelní. Ani delegáti, ani abstrakce nás nemohou zastupovat. Zaměňováním lidských bytostí za demografii a skutečných zážitků za pouhá data ztrácíme přehled o všem, co je na světě skvostné a jedinečné. Potřebujeme přímé prožitky, bezprostřednost, přímý kontakt s ostatními, přímou kontrolu nad našimi životy –věci, které nám žádný zastupitel ani jiná politická

          reprezentace nemůže zajistit.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: problémem jsou vůdčí představitelé
        right_text_html: |-
          Vůdcovství je porucha společnosti, kvůli které většina jejích členů není s to převzít iniciativu nebo o svých činech přemýšlet kriticky. Budeme-li vliv chápat jako majetek určitých jednotlivců a ne jako vztahy mezi lidmi, budeme vždycky závislí na vůdcích a na jejich schovívavosti. I skutečně příkladní vůdci jsou nebezpeční, stejně jako ti skutečně zlí, protože všechny jejich chvályhodné činy a vlastnosti jenom posilují jejich status a neochotu ostatních zpochybňovat roli vůdce samu o sobě. Když na demonstraci přijede policie, jejich první otázka zpravidla bývá „Kdo to tady vede?” Ne proto, že by velení bylo zásadní pro kolektivní akci, ale protože představuje zranitelnost. Když připluli kolonizátoři do Ameriky, ptali se úplně stejně. Když se jim dostalo odpovědi, ušetřilo jim to staletí práce s podrobováním obyvatelstva samotného. Pokud tedy existuje vůdce, může být zastoupen, může být vyměněn, nebo unesen. Závislost na vůdcích je přinejmenším Achillovou patou. Nebezpečnější ale je tím, že vede k reprodukování zájmů autorit a struktur moci mezi těmi, kdo jim oponují. Je lepší když každý a každá má svoji vlastní agendu a pocit

          vlastní moci nad sebou.
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: problémem je vláda
        right_text_html: |-
          Vláda sice slibuje práva, ale bere svobodu. Už v samotné myšlence práv je zahrnuta centrální moc, aby práva uznala a ochránila. Jakkoli je stát silný aby práva zaručil, je i dostatečně silný aby je mohl odebrat. Zmocníte-li vládu k vyřešení jednoho problému, otevírá to jenom dveře k tomu, aby jich spoustu dalších vytvořila. Vlády negenerují svojí moc ze vzduchu – je to naše moc, kterou oni třímají, a kterou dokážeme využít mnohem lépe bez nesmyslného byrokratického aparátu státu a politických

          zástupců.

          I nejliberálnější demokracie je postavena na stejných principech jako ta nejdespotičtější autokracie: na centralizaci moci a legitimity do struktur vytvořených na monopolizaci použití moci. To, jestli se byrokraté, kteří obsluhují tyto struktury, zodpovídají králi, prezidentovi nebo voličstvu je nepodstatné. Zákony, byrokracie a policie jsou starší než demokracie a fungují stejně v demokracii jako v diktatuře, ovšem s tím rozdílem, že si můžeme zvolit, kdo je spravuje. Tím pádem se od nás očekává, že na ně budeme nahlížet jako na naše, a to i když jsou používány proti nám samotným. Diktatury jsou svým způsobem nestabilní: můžou popravit, zavřít a vymýt mozky celým generacím lidí, ale jejich děti stejně začnou nový boj, boj za svobodu. Naproti tomu, dáte-li každému člověku možnost vnucovat vůli většiny jeho blízkým, dostanete lidi zaručeně do soukolí systému, který je staví proti sobě. Čím více lidé věří, že mají vliv na donucovací instituce státu, tím přijatelnější se jim zdají být. Tím se dá možná vysvětlit čím to, že celosvětové šíření demokracie je doprovázeno neuvěřitelnými nerovnostmi v rozdělení zdrojů, bohatství a moci. Žádný jiný politický systém by nedokázal tak vratkou situaci stabilizovat.

          Když je moc centralizovaná, lidé musí nabýt nadvlády nad ostatními, aby dosáhli vlivu na své vlastní životy. Boje za autonomii jsou svedeny v zápasy o politickou moc. O tom mimo jiné svědčí I občanské války v postkoloniálních zemích, kde mezi sebou bojují lidé, kteří předtím koexistovali v míru. Ti, kteří jsou u moci, si ji mohou udržet pouze vedením neustálé války proti své vlastní populaci, stejně jako proti cizím lidem. Například americká Národní Garda byla odvolána z Iráku, aby mohla být nasazena proti protestujícím v Oaklandu. Hierarchie ze své podstaty vždycky pomáhají těm v horních patrech k centralizaci moci. Pokusy o zabudování dalších kontrolních mechanismů a rovnováhy do systému nejsou ničím jiným, než spoléháním se ve věcech naší ochrany na tu věc, před kterou potřebujeme ochraňovat. Jediná cesta jak zvětšit vliv na autority bez toho, abychom byli vtaženi do této hry, je vytvoření a rozvoj horizontálních sítí, které mohou jednat autonomně. Nicméně ve chvíli, když už jsme dostatečně silní a silné k vytváření takového nátlaku na autority, který musí brát vážně, jsme i dostatečně silní na to, abychom řešili naše

          problémy bez nich.

          Ke svobodě neexistuje jiná cesta než skrze svobodu. Spíš než svedení veškerého rozhodování do jednoho místa, potřebujeme širokou paletu prostorů, kde můžeme práci s vlastní mocí nacvičovat. Více než nedotknutelnou pravdu potřebujeme prostor pro rozmanitá vyprávění. Namísto u vlád běžného nátlaku a donucování potřebujeme takové rozhodovací procesy, které podporují autonomii a sebeobranné praktiky, které nám pomohou udržet vlády-chtivce na uzdě.
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: problémem je zisk
        right_text_html: |-
          Pro nastolení sociální nerovnosti jsou peníze tím nejlepším prostředkem. Jsou zcela abstraktní a zdánlivě tak můžou reprezentovat cokoliv. Jsou universální, takže i lidé, kteří jinak nemají nic společného, je akceptují jako životní fakt. Jsou neosobní, jelikož na rozdíl od dědičných práv mohou být okamžitě převedeny z jedné osoby na druhou. Jsou v pohybu, a to z dobrého důvodu. Čím snáz se dá změnit poloha v rámci hierarchie, tím stabilnější samotná hierarchie je. Mnozí, kteří by bojovali proti nadvládě diktátora bez problémů, akceptují autoritu trhu. Když je všechna hodnota koncentrována do jednoho prostředku, stávají se i nenahraditelné momenty našich životů bezvýznamnými, měnící se v pouhé žetony v abstraktním kalkulu moci. Vše, co nemůže být finančně vyčísleno, spadá na vedlejší kolej. Život se stává honem za finančním ziskem. Jeden proti všem – prodej, nebo buď

          prodán.

          Vytvářet profit znamená získat víc kontroly nad zdroji než ostatní. Nemůžeme zkrátka profitovat všichni zároveň. Pro zisk jednoho člověka musí stručně řečeno ostatní přijít o svůj ekonomický vliv. Když investoři profitují z práce jejich zaměstnanců, znamená to, že se mezi nimi a zaměstnanci vytváří větší finanční propast. Systém vedený ziskem produkuje chudobu stejnou rychlostí, jako koncentruje bohatství. Tlak na soutěžení generuje inovace rychleji, než jakýkoli předchozí systém, ale s tím produkuje stále rostoucí nerovnováhu. Tam kde jízda kdysi drtila pěšáky, vznášejí se dnes neviditelné bombardéry nad motoristy a lidmi bez domova. A protože všichni namísto dosahování vlastních cílů a zájmů musí zkrátka hromadit zisk, můžou být následky veškeré jejich práce katastrofální. Klimatické změny jsou jen tou dosud poslední ze série pohrom, které neumí zastavit ani ti nejmocnější. Kapitalismus neodměňuje podnikatele za nápravu krizí, ale

          za její zpeněžení.
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: problémem je majetek
        right_text_html: |-
          Základem kapitalismu jsou vlastnická práva, další ze sociálních konstruktů, které jsme zdědili po králích a aristokracii. Majetek dnes mění majitele rychleji než kdy dřív, ale podstata zůstává stejná. Koncept soukromého vlastnictví legitimizuje užití násilí k prosazení uměle vytvořených nerovností v přístupu ke zdrojům a půdě. Někteří lidé věří, že vlastnictví může existovat bez státu. Ale nebýt centralizované autority a jejích předpisů, vlastnická práva by neměla žádný význam. Ve skutečnosti nic není doopravdy naše, dokud existuje centralizovaná autorita. Peníze, které vyděláš, jsou tištěny státem a podléhají zdanění a inflaci. Techničák tvého auta spadá pod kontrolu registru vozidel. A ani tvůj dům nepatří tobě, ale bance, která ti dala hypotéku. A jestli ho vlastníš přímo, státní vyvlastnění je nakonec vždycky silnější. Co potřebujeme k ochraně věcí, které jsou pro nás důležité? Vlády existují pouze z toho, co nám seberou a vždycky si samozřejmě berou víc, než dávají. Obchody nás ocení za oškubání našich blízkých, a ostatní jsou oceněni, když oberou nás. Jediná reálná jistota jsou naše sociální vazby. Pokud si chceme být jistí naší bezpečností, potřebujeme síť vzájemné pomoci, která se dokáže sama

          ubránit.

          Bez peněz a soukromého vlastnictví by naše vztahy k věcem byly vytvářeny našimi vztahy s ostatními lidmi. Dnes, je to přesně naopak: vztahy mezi námi jsou určovány na základě vztahům k věcem. Odstranění soukromého vlastnictví by neznamenalo, že ztratíme svůj majetek. Znamenalo by to, že žádný státní úředník, soudce, nebo pád na burze by nemohli odebrat věci, na

          kterých jsme závislí a které denně používáme. Namísto odpovědnosti vůči byrokracii můžeme začít s lidskými potřebami. Namísto využívání jeden druhého, můžeme využívat výhody vzájemné propojenosti a závislosti. Největší noční můrou lumpů je společnost bez soukromého vlastnictví, neboť bez něj by se jim dostávalo jen tolik úcty, kolik si zaslouží. Bez peněz jsou lidé cenění za to, čím přispívají do života ostatních a ne za to, že podplácí ostatní, aby si jich cenili. Bez profitu se každá snaha stává svým vlastním oceněním, a tím mizí důvody k provozování nesmyslných, nudných nebo destruktivních aktivit. Toho, na čem v životě opravdu záleží – vášeň, přátelství, štědrost, láska – je kolem nás hojnost. Jsou tak zapotřebí celé zástupy policistů a exekutorů k vytváření iluze nedostatku, která nás drží v

          tomto krysím závodě.
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: poslední zločin
        right_text_html: |-
          Každé uspořádání je založeno na zločinu proti přechozímu režimu, na zločinu, který ten starý režim rozpustil. Nový režim pak nebývá zdání legitimity s tím, jak ho lidé začínají brát jako daný a samozřejmý. Zločin, na kterém byly založeny Spojené Státy Americké, bylo povstání proti autoritě, králi Anglie2. Zločin zakládající novou společnost, přežijeme-li tu současnou, odstraní

          zákony a instituce dneška.

          Do kategorie zločinu spadá vše, co přesahuje limity společnosti – ty nejhorší i ty nejlepší. Pro každý systém je strašidelnou hrozbou všechno, co do sebe nedokáže včlenit nebo to ovládat. Každý režim má v sobě zaseta i

          zrnka vlastního zničení.

          Nic nevydrží věčně, ani impéria, ani civilizace. Co by ale dokázalo nahradit tu současnou? Dokážeme si představit uspořádání, které se neopírá o dělení na přijímané a vyloučené, legalitu a kriminalitu, vládce a ovládané? Co by mohlo být tím posledním zločinem?

          2) Zločinem ustavujícím vznik Československa byla vojenská vzpoura a neposlušnost proti autoritě, císaři Rakouska-Uherska

          (pozn. překl.)
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: |-
          ANARCHIE je to, co nastane kdykoliv řád není vynucený

          mocí a silou. Je to svoboda, proces neustálého objevování sebe samých a našich vzájemných vztahů. Jakékoliv volně se objevující procesy a fenomény – deštný prales, okruh přátel, tvé vlastní tělo – jsou anarchistickou harmonií, která trvá díky neustálé proměně. Na druhou stranu kontrola postupující od shora dolů může být udržena pouze neustálým tlakem. Ten se projevuje například v pochybných disciplinárních metodách užívaných na středních školách, jako jsou detenční místnosti, můžeme ho vidět v působení pesticidů a herbicidů, které chrání řady sterilní geneticky modifikované, odráží se v křehké hegemonii supervelmocí.

          ANARCHISMUS je myšlenka, že každá a každý z nás má nárok na sebeurčení a svobodné rozhodování. Žádný zákon, vláda, ani rozhodovací proces není důležitější, než potřeby a touhy skutečných lidských bytostí. Lidé by měli být svobodní, vytvářet mezi sebou vztahy vedoucí k vzájemné spokojenosti a starat se o sebe tak, jak uznají za vhodné. Anarchismus není dogma, nebo projekt. Není to systém, který by pravděpodobně fungoval, jenom když bude aplikovaný správně, jako demokracie, ani cíl, který bude realizován v nějaké vzdálené budoucnosti, jako komunismus. Je to způsob jednání a vztahů, který můžeme uvést do praxe právě teď. Při setkání s jakýmkoliv systémem hodnot nebo způsobem jednání, můžeme začít s otázkou: Jak právě tohle

          pracuje s rozdělováním moci? ANARCHISTÉ A ANARCHISTKY se staví proti

          všem hierarchickým systémům – proti každému uspořádání, které soustředí moc v rukou několika málo lidí, proti každému mechanismu, který nás drží od našich možností. Na rozdíl od uzavřených systémů si vychutnáváme vše neznámé před námi a chaos v nás, na základě kterého jsme schopni a schopné být

          svobodní a svobodné.
        second_html: |-
          Tento projekt vám přináší mezinárodní síť revolucionářek a revolucionářů, zvaná CrimethInc. Na crimethinc.com můžeš najít víc příkladů naší práce včetně knih, filmů, podcastů a zpravodajství z první ruky

          o povstáních po celém světě.

          Tento text jsme vyprodukovali ve spolupráci s přáteli z pěti různých kontinentů; stovky dobrovolníků a dobrovolnic přispěli na pokrytí nákladů na tisk, díky nim můžeš tuhle brožuru držet v rukou. Digitální verze je dostupná ke stažení v bezmála dvaceti jazycích na tochangeeverything.com spolu s širokým spektrem podobných médií a zdrojů. Za cenu poštovného můžeš získat větší množství výtisků na

          tcecz.noblogs.org.
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
