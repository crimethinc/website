      intro:
        left_text_html: Sekiranya anda dapat mengubah sesuatu, apa yang anda ubahkan?
          Adakah anda akan pergi bercuti seluruh hidup? Membuat minyak fosil untuk
          menghentikan perubahan cuaca? Meminta bank dan politikus lebih beretika?
          Tiada yang lebih tidak realistik apabila mengekalkan setiap yang ada dan
          mengharapkan keputusan yang berbeza. Kepayahan kewangan peribadi dan emosi
          kita mencerminkan kebangkitan dan bencana global. Kita boleh menghabiskan
          seumur hidup kita untuk memadamkan api kesengsaraan satu demi satu, tetapi
          semuanya berpunca dari satu perkara. Tiada penyelesaian mudah; kita perlu
          memikirkan semuanya berdasarkan logik yang berbeza.
        right_text_html: Untuk Mengubah Semuanya, Mulakan Di Mana-Mana Sahaja
      self:
        left_text_html: Mulakan dengan Pengukuhan Kehendak Diri Sendiri
        right_text_html: 'Bayang-bayang kebebasan masih dihantui oleh pelakonnya berdasarkan
          imej sendiri. Kita dijanjikan dengan pengukuhan kehendak diri sendiri: semua
          institusi di dalam masyarakat yang sepatutnya hasilkan. Sekiranya anda memiliki
          pengukuhan kehendak diri sendiri secara menyeluruh, apa yang anda lakukan
          sekarang? Fikirkan potensi hidup anda; perhubungan yang boleh anda miliki,
          pengalaman yang boleh anda alami, dan memberi makna pada kewujudan anda.
          Apabila anda dilahirkan, seolah-olah tiada batasan apa yang boleh anda kecapi.
          Ketika itu, anda mewakili semua kemungkinan yang tulen. Selalunya, kita
          tidak berhenti untuk membayangkan semuanya. Hanya di dalam waktu yang indah,
          kita jatuh cinta atau menggapai cita-cita atau melawat tanah yang jauh,
          adakah kita dapat mendakap impian yang memeningkan di dalam kehidupan kita.
          Apakah yang menghalang anda dari mencapai semua potensi anda? Berapa banyak
          perlu anda pertaruhkan kehidupan sekeliling anda, atau bagaimana anda membahagikan
          masa anda? Badan-badan birokrasi yang mengiktiraf kewujudan anda berdasarkan
          kebolehan anda mematuhi arahan mereka, ekonomi yang mengukuhkan berdasar
          keuntungan yang anda perolehi semata-mata, penemuduga JPA yang memaksa anda
          menerima “anda boleh jadi apa sahaja” adalah dengan tunduk kepada arahan
          mereka – adakah ini semua membolehkan anda mencapai semua keinginan di dalam
          kehidupan anda berdasarkan kehendak anda sendiri? Bukan rahsia lagi apabila
          kita ada kehendak diri sendiri: bukan kerana ia diberikan kepada kita, ataupun
          bukan diktator yang paling totalitarian merampas dari kita. Namun apabila
          kita mula bertindak untuk diri sendiri, kita berkonflik berhadapan dengan
          institusi yang sepatutnya menjamin kebebasan kita.'
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: Mulakan Dengan Menjawab Untuk Diri Sendiri
        right_text_html: |-
          Pengurus dan pengutip cukai gemar menceritakan mengenaitanggungjawab diri sendiri. Tetapi apabila kita melihat keseluruhan tanggungjawab peribadi kita, adakah kita akan mematuhi kata-kata mereka sejak dari mula? Lebih banyak keburukan dilakukan di dalam sejarah adalah kerana patuh kepada arahan berbanding dengan keengkaran arahan. Senjata semua ketenteraan di dalam dunia adalah manifestasi fizikal terletak di atas kesediaan diri kita sendiri untuk menjawab perintah dari orang lain. Sekiranya anda ingin memastikan anda tidak menyumbang di dalam peperangan, pembunuhan beramai-ramai atau penindasan, langkah pertama adalah berhenti menerima arahan. Inilah letaknya nilai anda, juga. Tidak terkira pemerintah dan buku undang-undang, persoalkanlah kepatuhan tanpa soal anda. Sekalipun anda inginkan serahkan tanggungjawab di atas keputusan anda kepada sesetengah tuhan ataupun dogma, bagaimana anda serahkan keputusan di antara kedua-duanya? Suka atau tidak, andalah menentukan keputusan antara keduanya. Kebiasaannya, manusia membuat pilihannya berdasarkan kebiasaannya ataupun keselesaannya. Kita tidak dapat melarikan diri dari bertanggungjawab di atas kepercayaan dan keputusan. Menjawab untuk diri sendiri berbanding kepada komander-komander atau peraturan-peraturan, kita tetap akan berhadapan dengan konflik antara satu sama lain, tetapi sekurang-kurangnya kita melakukannya berdasarkan peraturan diri sendiri, bukannya terbabit di dalam banyaknya tragedi yang tidak sepatutnya terjadi di dalam memenuhi kehendak agenda

          orang lain.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: Mulakan Dengan Memiliki Kuasa, Bukannya Pemerintahan
        right_text_html: |-
          Pekerja yang menjalankan kerja-kerja buruh memiliki kuasa; majikan pula mengarahkan mereka membuat kerja, memiliki perintah. Penyewa bangunan memiliki kuasa; pemilik yang membenarkan bangunan disewa memiliki perintah. Tiada penindasan berkaitan dengan kuasa secara umumnya. Banyak kuasa boleh jadi juga membebaskan: kuasa untuk menjaga orang yang anda cintai, mempertahankan diri dan menyelesaikan perbalahan, mengemudi kapal layar serta menghayunkan buaian. Terdapat berbagai cara untuk anda meningkatkan keupayaan anda untuk meningkatkan tahap kebebasan orang lain juga. Setiap manusia yang bertindak untuk mengecapi keseluruhan keupayaannya dapat memberi manfaat kepada orang lain. Perintah ke atas orang lain, sebaliknya, merampas kuasa dari orang lain. Apa yang anda ambil dari mereka, yang lain akan ambil dari anda. Perintah selalunya datang dari ‘atas’: Seorang tentera patuh kepada jeneralnya, yang akan patuh dari Perdana Menteri – Seorang imam mengambil perintah dari seorang nazir, nazir mengambil perintah daripada ulama, ulama mengambil perintah dari mufti, mufti memperolehinya daripada Quran, yang menceritakan perintah dari tuhan – Seorang pekerja menjawab daripada pemilik, pemilik yang menjawab kepada pelanggan, yang memiliki perintah daripada

          wang ringgit..

          Kelakian, kebangsaan, perkauman, harta milikan – di atas puncak semua piramid-piramid ini, kita tidak akan menjumpai penindasan pada struktur sosial. Di dalam masyarakat ini, kuasa dan perintah sangat berkait rapat sehingga sukar bagi kita untuk membezakannya: Kita hanya memiliki kuasa sebagai balasan kepada kepatuhan kita. Tanpa kebebasan, kuasa tetap

          tidak berguna.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: Mulakan Hubungan Yang Dibina Berdasarkan Kepercayaan
        right_text_html: |-
          Berbanding dengan perintah, kepercayaan meletakkan kuasa ditangan orang yang menghulurkannya, dan bukan pada orang yang menerimanya. Seseorang yang telah diletakkan kepercayaan tidak memerlukan pemerintah. Sekiranya seseorang itu tidak layak menerima kepercayaan, dia sepatutnya tidak dilibatkan di dalam pemerintahan. Dan kepada siapa kita kurang meletakkan kepercayaan berbanding dengan politikus

          dan CEOs? Tanpa mengenakan ketidak-seimbangan kuasa, manusia memiliki insentif untuk menyelesaikan konflik sehingga memenuhi kepuasan hati bersama – untuk memiliki kepercayaan antara manusia. Hierarki membuang insentif tadi, untuk membolehkan mereka yang memegang pemerintahan

          memadamkan konflik.

          Paling utama, semangat setiakawan akan terbina bersama-sama ketika menyokong dan membangkang sesama sendiri disamping menghormati autonomi masing-masing. Inipun sudah meletakkan standard yang sepatutnya di dalam menganalisa semua perhubungan kita. Tanpa sekatan yang dikenakan ke atas kita hari ini – kerakyatan dan ketidak-sahkan undang-undang, harta milikan dan hutang, korporat dan struktur organisasi ketenteraan – kita dapat membina kembali hubungan berdasarkan pertubuhan bebas dan kesefahaman

          bersama.
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: Mulakan Membaik Hubungan Sesama Individu Dan Masyarakat
        right_text_html: |-
          “Hak anda berakhir apabila hak yang lain bermula”. Berdasarkan logik tersebut, lebih ramai manusia yang ada, lebih sedikit kebebasan. Tetapi kebebasan bukanlah hal kecil di dalam hak peribadi. Kita tidak dapat membezakan hak antara satu sama lain begitu sahaja. Apabila saya memandu kereta, ia melepaskan pencemaran udara untuk anda bernafas; apabila anda menggunakan ubat-ubatan farmaseutikal, mereka lepaskan ke dalam air yang semua orang minum. Sistem yang diterima oleh orang lain telah dipaksa ke atas anda untuk hidup di bawahnya – tetapi apabila ada orang lain yang mencabarnya, anda berpeluang untuk berunding kembali menngenai realiti anda juga. Kebebasan anda bermula sebaik saja kebebasan saya bermula, serta berakhir apabila kebebasan saya berakhir. Kita bukanlah individu yang terasing. Tubuh kita terdiri daripada beribu spisis yang hidup secara simbiosis. Bukan hanya sebuah tubuh yang tertutup, proses ini sentiasa saja berjalan melalui nutriens dan kehidupan mikro tanpa henti-henti. Simbiosis yang kita hidup juga melibatkan beribu lagi spisis, terhimpun ketika kita menarik nafas apa yang telah kita hembus keluar. Sekumpulan serigala yang besar, katak yang bising ketika senja juga adalah individu, sesuatu yang saling bersatu, seperti juga dengan keadaan tubuh badan kita. Bahasa yang bertindak sebagai komunikasi hanya apabila kita berkongsi kefahaman yang sama. Seperti itu jugalah idea dan kehendak: kita boleh berkomunikasi dengan idea dan kehendak tadi kerana kedua-duanya adalah lebih penting dari diri kita. Setiap dari kita terdiri daripada sulitnya tenaga perbezaan yang kelam kabut; semuanya melampaui kita melalui masa dan ruang. Dalam memilih perkara-perkara yang perlu difikirkan, kita yang menentukan keputusan hasil

          dari pertemuan sesama kita.

          Kebebasan bukanlah sesuatu yang digunapakai atau milikan harta; ia adalah hubungan. Ia bukanlah sesuatu yang boleh dilindungi daripada dunia luar, tetapi di dalam cara-cara untuk memaksimumkan segala kemungkinan. Ini tidak bermakna kita harus mencari persamaan di atas kepentingan diri sendiri, kedua-dua konflik dan persamaan dapat berkembang dan memuliakan kita, selagi pemusatan kuasa itu tidak menjadikan kita terpaksa menerima persetujuan atau mengubah konflik kepada pertandingan-pemenang-menang-semua. Yang lebih penting adalah kita menghalusi pecahan kecil kebebasan, dan biarkan ia saling berhubungan sesama kita.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: Mulakan Dengan Kehendak Yang Merdeka
        right_text_html: |-
          Membesar di dalam masyarakat, di mana minat kita bukanlah minat kita sendiri; tetapi yang disemai melalui iklan dan berbagai-bagai lagi propaganda untuk membiarkan kita terus berlari di atas mesin lari di pasaran. Terima kasihlah kepada pendoktrinan, manusia senang dipuaskan hati mereka sendiri dengan melakukan perkara yang akan memudaratkan mereka dalam jangka masa panjang. Kita terpenjara dengan penderitaan dan keseronokan kita pula adalah kuncinya. Untuk benar-benar bebas, kita perlukan sesuatu modal untuk memproseskan semua yang menghasilkan kehendak kita. Kemerdekaan ini bukanlah sekadar memenuhi semua kehendak kita hari ini, tetapi mengembangkan kepada kita apa yang tidak mustahil, supaya keinginan kita tadi disalurkan bersama realiti yang menjadi panduan untuk kita cipta. Ia bermakna membuang jauh keseronokan yang dipaksa, mendominasi dan memiliki ke atas kita, mencari keseronokan yang membebaskan kita dari kerosakkan mesin-mesin ketaatan dan perlumbaan. Sekiranya anda berjaya melepaskan diri dari apa-apa ketagihan, anda merasakan erti kata yang sebenar mengenai mengubah

          kehendak anda.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: Mulakan Dengan Penentagan
        right_text_html: |-
          Bigot selalunya menyalahkan perkumpulan yang spesifik untuk sebuah permasalahan bersistem – Yahudi untuk keuntungan semata-mata kapitalisma, pendatang asing di dalam krisis ekonomi – sama seperti manusia menyalahkan politikus secara individu di dalam korupsi politik. Masalahnya adalah sistem itu sendiri. Tidak kira siapa pun yang memerintah, mereka tetap menghasilkan kuasa yang tidak seimbang dan tidak ada lansung harga diri. Masalah itu bukannya kerana ia rosak, tetapi memang begitulah sistem itu berfungsi. Musuh kita bukanlah manusia, tetapi institusi-institusi dan rutin yang mengasingkan

          sesama kita dan diri sendiri.

          Garis kesalahan yang sama juga berjalan di dalam tamadun kita melalui persahabatan dan hati kita; melalui perhubungan yang berbeza, cara hidup yang berbeza. Apabila kita tidak mengikuti peranan yang terpaksa kita laksanakan, kita membuka garis kesalahan itu, dan mengajak orang lain untuk membuat pendirian masing-masing. Perkara terbaik adalah dengan mengelakkan daripada keseluruhan dominasi –tidak mengurus sistem itu untuk menjadi lebih baik, tidak mengubahkan pangkat mereka yang terlibat dan mereka yang menerimanya, tidak menstabilkan sistem dengan mereformasikannya. Matlamat utama protes adalah tidak meminta lebih banyak undang-undang atau pemimpin, tetapi untuk menunjukkan bahawa kita sendiri dapat bertindak berdasarkan kekuatan kita, menggalakkan mereka yang lain melakukan yang sama dan tidak menggalakkan pihak pemerintah untuk masuk campur. Ini bukanlah persoalan peperangan – konflik yang selari dengan pihak tentera musuh yang tersusun – tetapi lebih kepada ketidak-taatan

          yang merebak.

          Tidak cukup hanya dengan edukasi dan perbincangan, menunggu hati dan fikiran mereka yang lain untuk berubah. Sehinggalah idea-idea diluahkan melalui aksi, berdepan dengan orang lain dengan pilihan yang konkrit, perbincangan kekal sebagai sesuatu yang abstrak. Ramai manusia bertindak berdasarkan perbincangan teoritikal, tetapi apabila sesuatu terjadi, apabila yang dipertaruhkan menjadi tinggi dan mereka dapat melihat perbezaan yang ketara antara kedua-dua belah pihak yang bertelagah, mereka akan menetapkan pendirian. Kita tidak perlukan kesamaan, juga bukanlah pemahaman yang menyeluruh seluruh dunia, juga bukan sebuah peta jalan untuk betul-betul sampai ke destinasi – cukuplah dengan keberanian untuk berjalan di jalan yang lain.
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: Masalahnya Adalah Pengongkongan
        right_text_html: 'Apakah tanda-tanda anda di dalam perhubungan yang menderakan?
          Pendera akan cuba mengawal perangai anda atau cuba mengongkong pemikiran
          anda; menutup atau mengenakan undang-undang untuk anda mendapatkan maklumat;
          menggunakan ugutan atau kekerasan ke atas anda; atau cuba mengekalkan anda
          di dalan suasana pergantungan. Ini semua adalah ciri-ciri perangai seorang
          yang pendera, tetapi itu juga sama seperti SKMM, PDRM dan hampir semua institusi
          yang menguruskan masyarakat kita. Kewujudan semua institusi ini adalah berdasarkan
          idea bahawa manusia perlu dikawal, diurus dan diperintah. Lagi besar ketidak-stabilan
          yang dikenakan kepada kita, lagi banyak kawalan yang diperlukan untuk mempertahankan
          mereka. Satu pihak perlukan kuasa yang berterusan, kawalan yang dijalankan
          secara ganas ke atas setiap individu: Akta Hasutan, perkauman, unit SB,
          pengasingan penahanan, pengasingan perkauman. Di dalam masa yang sama, ia
          adalah sesuatu yang nyata tetapi tidak jelas, dibina ke dalam infrastruktur
          masyarakat: pengiraan yang menentukan kadar kredit dan premium insuran,
          seperti statistik dikumpulkan dan dirumuskan. SKMM memantau apa yang kita
          lakukan di laman maya, tetapi ia tidak kelihatan seperti mengawal realiti
          kita. Apabila tidak terbatasnya segala kemungkinan di dalam kehidupan yang
          telah dikurangkan kepada barisan pilihan yang mereka tetapkan, tidak ada
          lagi pertentangan di antara sistem yang kita hidup dan sistem yang kita
          dambakan – bukan kerana kita sudah mencapai kebebasan secara keseluruhan,
          tetapi adalah kerana kita sudah menyempurnakan apa yang bertentangan. Kebebasan
          tidak bermakna memilih antara semua pilihan, tetapi menyelesaikan semua
          persoalan.'
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: Masalahnya Adalah Hierarki
        right_text_html: |-
          Ada berbagai-bagai mekanisma untuk melaksanakan ketidak-samarataan. Sesetengahnya bergantung dengan aparatus-aparatus pusat, seperti sistem kehakiman. Sesetengahnya dapat berfungsi secara tidak rasmi, seperti perkumpulan atau pertubuhan lama dan peranan

          jantina.

          Sesetengah mekanisma adalah terlampau dan sangatlah menghina. Ramai yang masih percaya mengenai hak dari langit untuk raja-raja, sedangkan berabad lamanya tiada kepentingan pada masyarakat. Sesetengahnya juga masih memikirkan bahawa kita tidak dapat hidup tanpa mereka. Siapa dapat membayangkan dunia tanpa milikan peribadi? Semua itu pun adalah struktur sosial: ia wujud, tetapi bukanlah suatu yang tidak dapat dielakkan. Kewujudan tuan tanah dan CEO tidak berbezapun dari segi natural, keperluan atau bermanfaat dari

          kewujudan seorang emperor.

          Semua mekanisma ini dibina bersama, dan saling memperkuatkan masing-masing. Sejarah perkauman, sebagai contoh, adalah selari dengan kewujudan kapitalisma: penjajahan, perhambaan, atau garisan perbezaan warna kulit yang memisahkan pekerja. Untuk menerangkannya lagi: selagi adanya polis, siapakah yang anda fikir mereka akan mengganggu? Selagi adanya penjara, siapakah yang akan memenuhnya? Selagi ada kemiskinan, siapa yang akan miskin? Adalah naif apabila kita cuba mencapai kesamarataan di dalam

          masyarakat yang berhierarki.

          Anda boleh mengocok satu dek kad, tetapi ia masih kad yang sama di dalam satu dek.
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: Masalahnya Adalah Sempadan
        right_text_html: |-
          Sekiranya tentera asing yang menjarah tanah ini, memotong pokok, meracuni sungai-sungai, dan memaksa kanak-kanak untuk membesar berikrar menyokong mereka, siapa yang tidak akan mengangkat senjata menentang mereka? Tetapi apabila kerajaan tempatan melakukan perkara yang sama, golongan patriot begitu bersemangat pula untuk terus taat, membayar cukai dan

          menyerahkan anak-anak mereka.

          Sempadan tidak melindungi kita, malah memisahkan kita – mencipta pemisahan yang tidak perlu dengan golongan yang tidak diingini di samping mengelirukan pemisahan yang nyata pula di kalangan yang diingini pula. Zaman purba Athens, tempat yang terkenal sebagai tempat kelahiran demokrasi, hanya sedikit lelaki yang terlibat di dalam proses politikal; yang memiliki hamba. Kerakyatan yang dikenakan pula masih diwujudkan antara yang diingini dan yang tidak diingini di dalam

          Malaysia.

          Kebebasan yang ideal adalah untuk mengembangkan garisan yang diingini sehingga seluruh dunia disatukan kepada satu projek besar demokrasi. Tetapi ketidak-samaan telah terbenam di dalam struktur itu sendiri. Di semua peringkat di dalam masyarakat, beribu sempadan kecil juga memisahkan kita kepada golongan berkuasa dan tidak berkuasa; kawalan keselamatan di pintu masuk, kadar kredit, harga kawalan. Kita perlukan borang ke atas milikan yang tidak diberikan kepada yang tidak diingini, yang tidak memusatkan kuasa dan keabsahan undang-undang, yang tidak mengurung ketidak-sefahaman ke atas golongan komuniti berpagar.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: Masalahnya Adalah Perwakilan
        right_text_html: |-
          Anda hanya dapat memiliki kuasa dengan mengamalkannya; anda hanya dapat belajar mengenai minat anda adalah dengan bertindak ke atas minat itu. Apabila semua usaha untuk menggunakan kuasa di dalam dunia perlu disalurkan ke arah perantaraan wakil atau diterjemahkan kepada protokol institusi, kita akan menjadi terasing antara satu sama lain dan juga potensi kita. Setiap aspek agensi yang kita hasilkan akan muncul sebagai sesuatu yang kita tidak kenal dan berbahaya kepada kita. Politikus yang selalu mengecewakan kita akan hanya muncul apabila kuasa yang kita beri kepada mereka; keganasan polis yang gelap hasil dari keinginan kita untuk mengelak tanggungjawab peribadi di atas di dalam kawasan kejiranan kita. Di dalam era digital, apabila semua orang perlu bertindak terus menerus pengurusk imej di mata umum, reputasi kita akan menjadi luaran. Sekiranya kita tidak diasingkan sesama kita, kita terpaksa bersaing sesama kita di dalam pasaran professional dan sosial, adakah kita akan melabur banyak masa dan tenaga untuk profil politikus tadi, anak lembu emas di dalam imej kita sendiri? Kita tidak akan dapat dikurangkan. Tiada delegasi ataupun penghalang yang dapat menghalang kita. Di dalam mengurangkan manusia kepada demografik dan pengalaman kasar kepada data, kita hilang pandangan di atas segala yang berharga dan unik di dalam dunia. Kita perlukan kehadiran, dekat, sentuhan lansung sesama sendiri, kawalan lansung ke atas kehidupan kita – perkara yang tidak ada wakil atau perwakilan yang dapat

          laksanakan.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: Masalahnya Adalah Pemimpin
        right_text_html: Kepimpinan adalah ketidak-aturan sosial di mana majoriti
          peserta di dalam kumpulan itu gagal untuk mengambil inisiatif atau berfikir
          secara kritikal di dalam tindakan mereka. Selagi kita memahami agensi sebagai
          milikan individu yang spesifik berbanding dengan hubungan sesama manusia,
          kita akan sentiasa bergantung dengan kepimpinan – dan di bawah sifat kasihan
          mereka. Contoh kepimpinan yang biasa tetapi sesuatu yang berbahaya adalah
          korupsi yang nyata, di sebalik kualiti terpuji mereka hanyalah akan menguatkan
          status mereka dan kehormatan yang lain, tidak perlu menyebut sahnya kepimpinan
          itu sendiri. Apabila polis muncul ketika protes, soalan pertama mereka selalunya
          adalah “Siapa yang bertanggung jawab?” – bukanlah kerana kepimpinan itu
          wajib di dalam tindakan kolektif, tetapi hanyalah ia melambangkan kelemahan.
          Penjarah menanyakan perkara yang sama ketika mereka sampai kononnya Dunia
          Baru; di mana ada jawapan, itu menyelamatkan mereka dari masalah yang berat
          menundukkan populasi yang terjarah. Selagi ada ketua, dia boleh digantikan,
          ditukar, atau dijadikan tebusan. Paling bagus sekalipun, bergantung dengan
          kepimpinan adalah kaki yang sakit; paling buruk pula, ia menghasilkan kepentingan
          kepimpinan dan struktur kuasa dalaman yang menentang mereka. Adalah lebih
          baik sekiranya semua orang ada agendanya sendiri dan merasakan dia memiliki
          agensi sendiri.
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: Masalahnya Adalah Kerajaan
        right_text_html: |-
          Kerajaan menjanjikan hak-hak, tetapi mereka hanya mengambil kebebasan. Idea hak-hak tersebut dicadangkan oleh pemusatan kuasa untuk memberi dan melindungnya. Apa sahaja kerajaan cukup berkuasa untuk menjamin, ia juga cukup berkuasa untuk mengambilnya semula. Kerajaan tidak menghasilkan kuasa dari entah mana – kuasa kita yang mereka ambil

          di parlimen.

          Demokrasi yang paling liberal turut berkongsi prinsip yang sama seperti autokratik yang menindas: pemusatan kuasa dan kesahihan undang-undang di dalam memonopoli struktur kuasa. Samada birokrasi yang mengendalikan struktur akan melaporkan tugas kepada raja-raja, perdana menteri, ataupun pilihanraya. Undang-undang, birokrasi, dan polis; mereka berfungsi sama seperti demokrasi di dalam pemerintahan diktator. Yang membezakan hanyalah, kita boleh mengundi siapa yang menguruskan semua, kita terpaksa menganggap mereka sebagai milik kita – sekalipun semua ini untuk menentang kita. Pemerintahan diktator mewarisi sesuatu yang tidak stabil: anda boleh dibunuh, dipenjara, dan mengawal minda seluruh generasi dan keturunan anda terpaksa mula mencipta perjuangan untuk kemerdekaan yang baru. Tetapi janji setiap manusia akan peluang untuk melaksanakan kehendak majoriti ke atas manusia lain, anda juga akan mendapati mereka semua bersama-sama membela sistem yang mencampakkan mereka untuk bertelagah sesama sendiri. Lagi kuat pengaruh manusia fikirkan mereka berkuasa daripada institusi kerajaan yang menindas, lagi popular institusi itu akan menjadi. Agaknya inilah yang menerangkan bagaimana pengembangan demokrasi global yang bertembung dengan ketidak-samarataan yang melampau di dalam agihan sumber dan kuasa.

          Apabila kuasa dipusatkan, manusia terpaksa melebarkan penguasaan ke atas orang lain untuk mencapai sebarang pengaruh ke atas tujuannya sendiri. Perjuangan pemerintahan sendiri disalurkan kepada pertandingan merebut kuasa politik: saksi kepada perang saudara di negara selepas era kolonial antara sesama manusia yang dulunya hidup dalam keadaan aman. Siapa yang memegang kuasa hanya dapat mengekalkan kuasa dengan melancarkan perang yang dirancang ke atas rakyatnya sendiri sama seperti orang asing. Di mana saja ada hierarki, ia akan melebihkan mereka yang berada di atas di dalam pemusatan kuasa. Mencipta kawal dan selia di dalam sistem hanyalah bermakna pergantungan ke atas perkara yang sepatutnya dilindungi daripada perlindungan. Satu saja cara untuk gunakan kuasa ke atas pemerintah tanpa terhumban di dalam permainan mereka adalah dengan membina jaringan melintang yang bertindak secara pemerintahan sendiri. Apabila kita cukup berkuasa untuk memaksa pemerintah untuk memberi perhatian kepada kita secara lebih serius, kita sudah cukup berkuasa untuk menyelesaikan permasalahan

          kita tanpa mereka.

          Tiada lagi jalan kebebasan melainkan jalan kebebasan. Daripada sesebuah agensi yang menyempit, kita perlu kepada tempat yang lebih luas untuk melaksanakan kuasa. Daripada sesuatu matawang untuk berurusan secara sah, kita perlukan ruang untuk berbagai-bagai naratif. Di tempat yang mewariskan penindasan di dalam kerajaan, kita perlukan struktur pembuat keputusan yang mempromosikan pemerintahan sendiri, dan melaksanakan pertahanan diri sendiri yang akan mengenepikan bakal pemerintah yang sedang menanti.
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: Masalahnya adalah Keuntungan
        right_text_html: 'Duit adalah mekanisma yang ideal untuk melaksanakan ketidak-samarataan.
          Ia adalah abstrak: ia nampak sesuatu yang boleh mewakili semua perkara.
          Ia adalah seluruh dunia: manusia tidak akan ada apa-apa yang sama kecuali
          ia adalah fakta kehidupan. Ia adalah aliran: lagi mudah ia bertukar posisi
          di dalam hierarki, lagi stabil hierarki itu sendiri. Apabila semua nilai
          ditumpukan kepada satu instrumen tunggal, sekalipun tidak dapat dipulihkan
          keadaan hidup kita. Semuanya tidak dapat diukur secara kewangan yang merudum
          jatuh. Hidup menjadi huru hara dengan keuntungan kewangan: masing-masing
          bertentangan, menjual atau terjual. Untuk membuat keuntungan: bermakna menguasai
          kawal ke atas sumber sosial relatif kepada orang lain. Kita tidak dapat
          untung semua sekali; untuk seorang yang untung, seorang lain terpaksa rugi.
          Apabila pelabur untuk ke atas tenaga buruh pekerja, ini bermakna lebih berat
          kerja bagi pekerja, lebih lebar perbezaan kewangan antara mereka. Sistem
          yang berasaskan keuntungan menghasilkan kemiskinan selari dengan kemewahan
          yang terkumpul. Tekanan untuk bersaing menghasilkan inovasi lebih cepat
          berbanding sistem terdahulu, tetapi dalam masa yang sama ia menghasilkan
          jurang yang semakin membesar. Oleh kerana semuanya harus mengejar keuntungan
          berbanding dengan pencapaian demi diri mereka sendiri, hasil semua tenaga
          buruh menjadi lebih mudarat. Perubahan iklim hanyalah siri-siri bencana
          yang terbaru terjadi sehingga kapitalis yang paling berkuasa menjadi tidak
          berupaya untuk menghalangnya. Sememangnya, kapitalisma tidak menganugerahkan
          usahawan untuk menyelesaikan krisis, tetapi hanyalah membiayai krisis itu.'
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: Masalahnya adalah Pemilikan
        right_text_html: |-
          Asas pembinaan kapitalisma adalah hak milikan – satu lagi struktur sosial yang kita warisi dari raja-raja dan aristokrat-aristokrat purba. Milikan berubah tangan lebih laju hari ini, tetapi konsepnya tetap sama: idea pemilikan yang mengesahkan penggunaan kekerasan untuk melaksanakan ketidak-seimbangan palsu untuk memiliki tanah dan sumber. Sesetengah manusia membayangkan milikan dapat wujud tanpa organisasi kerajaan. Tetapi hak milikan adalah tidak bermakna tanpa pemusatan pemerintahan yang melaksanakannya – dan selagi pemusatan pemerintahan wujud, tiada yang benar-benar milik anda, juga. Duit yang anda dapat dikeluarkan oleh organisasi kerajaan, tertakluk di bawah cukai dan inflasi. Milikan kereta anda juga dikawal oleh JPJ. Rumah anda bukanlah milik anda, tetapi bank yang memberikan anda pinjaman perumahan; walaupun anda menguasai hak menduduki rumah itu, pasaran kawasan pula melebihi semua kebaikan. Apa yang diperlukan untuk melindungi perkara yang penting untuk kita? Pemerintah hanyalah wujud di atas nilai yang mereka ambil dari kita; mereka akan selalu mengambil lebih dari yang mereka beri. Pasaran hanyalah memberi hasil kepada kita setelah mencekik darah saudara kita, dan orang lain mencekik darah kita. Yang benar-benar menjadi insuran adalah ikatan sosial kita; jikalau kita mahukan keyakinan akan keselamatan kita, kita perlukan jaringan usaha persefahaman yang akan mempertahankan sesama sendiri. Tanpa duit atau hak milikan, hubungan kita kepada benda ditentukan oleh hubungan sesama kita. Hari ini, ia berlaku sebaliknya; hubungan sesama kita adalah ditentukan oleh hubungan kita dengan benda. Menjauhkan kita dari milikan tidak bermakna kita kehilangan semua milikan kita; ia hanyalah bermakna tiada siapa yang menjadi pengawal ataupun kejatuhan harga saham yang akan mengambil semua perkara yang kita bergantung dengan. Di sebalik menjawab kepada birokrasi, kita mulakan dengan keperluan manusia; di sebalik mengambil kesempatan atas satu sama lain, kita mengejar manfaat atas kebergantungan bersama.

          Ketakutan penipu yang paling besar adalah masyarakat tanpa milikan – kerana tanpa milikan, dia hanya mendapat penghormatan yang sepatutnya dia berhak terima. Tanpa duit, manusia hanya dinilai apa yang disumbangkan pada orang lain, bukannya merasuahkan orang lain untuk melakukannya. Tanpa keuntungan, semua usaha adalah berdasarkan apa yang diusahakan, jadi tiadalah insentif yang tidak bermakna atau aktiviti yang memusnahkan. Perkara yang penting di dalam hidup seperti – minat, setiakawan, kemurahan hati – tersedia dengan banyaknya. Ia mengambil keseluruhan batalion polis dan perunding hartanah untuk mengenakan kekurangan yang memerangkap kita di dalam kehidupan berlumba-lumba ini.
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: Jenayah Terakhir
        right_text_html: Setiap arahan yang dibuat atas jenayah menentang arahan sebelumnya
          – jenayah yang menyelesaikannya. Selepas itu, satu arahan baru diterima
          sebagai sesuatu yang sah, dan manusia akan mula mengambilnya dengan mudah.
          Punca jenayah pada kemerdekaan Tanah Melayu, Sabah dan Sarawak adalah penentangan
          ke atas Ratu England. Punca jenayah masyarakat yang akan datang, apabila
          kita berjaya melaksanakannya, adalah dengan meninggalkan undang-undang dan
          institusi-institusi sekarang. Kategori jenayah memegang semuanya yang melampau
          dari keupayaan masyarakat – yang terburuk dan yang terbaik. Setiap sistem
          dihantui oleh sesuatu yang ia tidak dapat dikorporatkan dan dikawal. Setiap
          arahan mengandungi benih-benih kehancurannya sendiri. Tiada yang kekal selamanya;
          seperti juga empayar dan tamadun. Tetapi apakah yang dapat menggantikan
          sistem sekarang? Bolehkah kita bayangkan arahan yang ideanya tidak membahagikan
          kehidupan kepada yang disahkan dan ketidak-sahkan undang-undang, peraturan
          dan jenayah, pemerintah atau diperintah? Apakah yang sepatutnya menjadi
          jenayah terakhir?
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: |-
          ANARKI adalah apa yang terjadi apabila arahan tidak dikenakan melalui paksaan. Ia adalah kebebasan: proses yang berterusan memperbaharui diri kita dan hubungan kita. Apa saja proses atau fenomena wujud secara bebas – hutan belantara, kelompok persahabatan, tubuh badan anda – adalah anarkik harmoni yang wujud daripada perubahan yang sentiasa berlaku. Kawalan dari atas ke bawah, sebaliknya, hanyalah mengekalkan kongkongan dan penindasan: disiplin yang berbahaya kepada bilik tahanan sekolah, kilang perladangan di mana racun perosak mempertahankan barisan jagung yang diubah genetiknya, rapuhnya

          hegemoni kuasa besar.

          ANARKISMA adalah idea bahawa semua orang berhak untuk mendapat kehendak dirinya sendiri secara sepenuhnya. Tiada undang-undang, pemerintah ataupun proses membuat keputusan yang lebih penting daripada keperluan dan kehendak sebenar seorang manusia. Manusia perlu bebas untuk membentuk hubungannya berdasarkan kepuasan persefahaman bersama, bangun mempertahankan diri sendiri yang bersesuaian. Anakisma bukanlah dogma atau rangka kerja. Ia bukanlah sistem yang semestinya berfungsi dengan sempurna apabila diaplikasikan dengan betul, seperti demokrasi, ataupun tujuan yang perlu dilaksanakan untuk masa yang terlalu ke depan, seperti komunisma. Ia lebih kepada bagaimana kita bertindak dan berkaitan dengan apa yang perlu kita laksanakan sekarang. Sebagai rujukan pada mana-mana nilai sistem atau cara tindakan, kita mulakan dengan bertanya: Bagaimana ia

          mengagihkan kuasa?

          ANARKIS menentang semua bentuk hierarki – semua matawang yang menumpukan kuasa di tangan mereka yang sedikit, semua mekanisma yang memisahkan kita dari potensi kita. Menentang sistem yang tertutup, kita menghargai sesuatu yang tidak kita ketahui, keributan di dalam diri kita adalah nilai yang membolehkan kita hidup merdeka.
        second_html: |-
          Projek ini dibawa oleh CrimethInc. Sebuah rangkaian antarabangsa oleh para revolusioner yang bercita-cita tinggi. Anda boleh mendapatkan contoh-contoh kerja kami di crimethinc.com – termasuklah buku, filem, podcast dan juga laporan lansung mengenai kebangkitan di

          seluruh dunia.

          Kami menghasilkan keseluruhan text ini berdasarkan kerjasama dengan seluruh komrad di kelima-lima benua; beratus sukarelawan yang membiayai keseluruhan kos percetakan sehingga anda dapat memegangnya di tangan anda. Anda juga boleh mendapatkan versi digital, rakaman video sumbangan subMedia.tv, dan banyak lagi sumber di tochangeeverything.com, di mana anda dapat memesan lebih banyak naskah pada harga pos sahaja.
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: ''
        right_text_html: |-
          Apabila kami melihat semua perbezaan institusi-institusi dan mekanisma yang mendominasi wujud persamaan, sudah semakin jelas bahawa perjuangan kecil kami secara individu adalah sebuah bahagian daripada sesuatu yang lebih besar dari kami, sesuatu yang boleh menghubungkan kita. Apabila kita bersama-sama di dalam asas perhubungan ini, segalanya berubah: bukan saja perjuangan, malah rasa semua usaha, kapasiti kita untuk bergembira, rasa hidup kita lebih bermakna. Apa yang diperlukan adalah menyatukan sesama kita untuk mula bertindak berdasarkan logik yang berlainan.

          Untuk Mengubah Semuanya, Mulakan Di Mana-Mana Sahaja
