      intro:
        left_text_html: 'Wenn du etwas Beliebiges verändern könntest, was wäre es?
          Würdest du für den Rest deines Lebens Urlaub machen? Dafür sorgen, dass
          fossile Brennstoffe aufhören Klimawandel zu verursachen? Dir ethisch vertretbare
          Banken und Politiker_innen wünschen? Jedenfalls wäre sicherlich nichts unrealistischer,
          als alles so zu belassen wie es ist, und andere Resultate zu erwarten. In
          unseren Privaten, Finanziellen und emotionalen Kämpfen spiegeln sich globale
          Unruhen und Katastrophen. Wir könnten all unsere Zeit investieren, und ein
          Feuer nach dem anderen zu löschen, aber sie haben alle die selbe Ursache.
          Stückweise zu reformieren wird nichts in Ordnung bringen: wir müssen alles,
          entsprechend einer anderen Logik, überdenken.'
        right_text_html: Um etwas zu verändern, fang überall an.
      self:
        left_text_html: Anfangen mit Selbstbestimmung
        right_text_html: |-
          Das Phantom der Freiheit spukt immer noch durch die Welt, die angeblich nach seinem Vorbild erbaut wurde. Uns wurde komplette Selbstbestimmung versprochen: alle Institutionen unserer Gesellschaft sollen sie angeblich fördern. Wenn du komplett selbst-bestimmen könntest, was würdest du jetzt gerade tun? Denk an das riesige Potential deines Lebens: die Beziehungen, die du haben könntest; die Erfahrungen, die du machen könntest; an all die Möglichkeiten, wie du deiner Existenz einen Sinn geben könntest. Als du geboren wurdest, schien es so, als gäbe es keine Begrenzung dafür, was du alles werden könntest. Du hast einfach nur Möglichkeiten dargestellt. Üblicherweise hören wir auf, uns all das vorzustellen. Lediglich in den allerschönsten Momenten – wenn wir uns verlieben, einen persönlichen Durchbruch erreichen oder ein weit entferntes Land bereisen – erhaschen wir einen klitzekleinen Blick darauf wie all unsere Leben sein könnten. Was hindert dich, dein Potential voll auszuschöpfen? Wie viel Einfluss hast du auf deine Umgebung oder darauf, wie du deine Zeit verbringst? Die Bürokratien, die dich danach bewerten, wie du Vorschriften erfüllst; die Wirtschaft, die dir Macht gibt, je nach dem, wie viel Profit du bringst; die Bundeswehr, die dir durch „Wir. Dienen. Deutschland“ Selbstverwirklichung verspricht – ermöglicht das dir, das Beste aus deinem Leben nach deinen

          Vorstellungen zu machen?

          Das offene Geheimnis ist, dass wir alle komplett selbst-bestimmt sind: nicht weil uns Selbstbestimmung gegeben wird, sondern weil nicht einmal das totalitärste Regime sie uns nehmen könnte. Sobald wir aber für uns selbst handeln, geraten wir in Konflikt mit den Institutionen, die vermeintlich bestehen, um

          unsere Freiheit zu sichern.
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
      answering:
        left_text_html: Anfangen mit sich vor sich selbst verantworten
        right_text_html: |-
          Managerinnen und Steuereintreiber lieben es über persönliche Verantwortung zu reden. Wenn wir aber die gesamte Verantwortung für all unsere Handlungen übernehmen würden, würden wir dann ihren Vorschriften überhaupt gehorchen? Historisch gesehen wurde durch Gehorsam mehr Schaden angerichtet als durch böse Vorsätze. Die Waffenarsenale aller Armeen dieser Welt sind die physische Manifestation unseres Willens, uns anderen zu unterwerfen. Wenn du sicherstellen willst, niemals einen Teil zu Krieg, Genozid oder Unterdrückung beizutragen, ist der erste Schritt aufzuhören, Befehlen zu

          gehorchen.

          Dasselbe gilt für deine Werte. Unzählige Autoritäten und Regelwerke verlangen nach deiner uneingeschränkten Unterwerfung. Selbst wenn du die Verantwortung für deine Entscheidungen an einen Gott oder ein Dogma übertragen möchtest – wie entscheidest du welcher oder welches es sein wird? Ob‘s dir gefällt oder nicht, du bist es, der_die sich zwischen ihnen entscheiden muss. Üblicherweise fällen Leute diese Entscheidung lediglich gemessen daran, was ihnen am vertrautesten und bequemsten ist. Wir sind zwangsläufig für unsere Überzeugungen und Entscheidungen verantwortlich. Wenn wir uns vor uns selbst verantworten und nicht vor Kommandierenden und Kommandos, könnten wir immer noch untereinander in Streit geraten – aber wenigstens würden wir dies auf unserer selbst-gewählten

          Grundlage tun und nicht unnötigerweise Tragödien auf Grundlage von Vorstellungen anderer anhäufen.
        image_name: answering
        image_alt: 1968 Olympics Black Power salute raised by the African-American
          athletes Tommie Smith and John Carlos during their medal ceremony at the
          1968 Summer Olympics in the Olympic Stadium in Mexico City. As they turned
          to face their flags and hear the American national anthem, they each raised
          a black-gloved fist and kept them raised until the anthem had finished
      power:
        left_text_html: Anfangen mit der Suche nach Macht, nicht Herrschaft
        right_text_html: |-
          Die Arbeiterinnen haben Macht über ihre Produktionskraft; die Chefs sagen ihnen, was sie tun sollen. Die Bewohner halten ein Haus in Schuss, im Grundbuch steht jedoch der Name der Besitzerin. Ein Fluss hat Energie; die Baugenehmigung für einen Damm reguliert die Verfügung darüber. Macht an sich ist nicht unterdrückend. Viele Formen von Macht können befreiend sein: die Kraft für diejenigen zu sorgen, die du liebst; dich selbst zu verteidigen und Streit zu lösen; dir Wissen und Fähigkeiten anzueignen und all dies auch zu teilen. Es gibt Möglichkeiten die eigenen Fähigkeiten zu entwickeln, die gleichzeitig mehr Freiheiten für andere schaffen. Jede Person, die versucht ihr volles Potential auszuschöpfen, macht allen anderen ein Geschenk. Andererseits reißt Autorität über andere deren Macht an sich. Was du von ihnen nehmen kannst, nehmen wiederum andere von dir. Autoritäre Systeme folgen strengen Hierarchien. Die Soldatin gehorcht dem General, der wiederum der Präsidentin, die ihren Herrschaftsanspruch aus der Verfassung ableitet – Der Priester gehorcht dem Bischof, der Bischof dem Papst, der Papst der Bibel, die ihre Autorität von Gott ableitet – Der Angestellte gehorcht der Besitzerin, diese dient den Kund_innen, deren Autorität vom Euro abgeleitet wird – Der Polizist gehorcht seinen Vorgesetzten, die, genau wie die Richterin, ihren Herrschaftsanspruch vom Gesetz ableiten – Männlichkeit, Weiß-sein, Eigentum: an der Spitze all dieser Pyramiden finden wir keine Tyrannen, nur soziale Konstrukte: Geister, die die Menschheit hypnotisieren. In Hierarchien erhalten wir Macht immer nur im Austausch gegen Gehorsam. Macht und Herrschaft sind so stark verflochten, dass wir sie kaum auseinanderhalten können. Doch ohne Freiheit

          ist Macht wertlos.
        image_name: power
        image_alt: a worker in a gold mine confronts soldier keeping guard and grabs
          his rifle by the barrel as a crowd of workers watch
      relationships:
        left_text_html: Anfangen mit Beziehungen, die auf Vertrauen basieren
        right_text_html: |-
          Vertrauen konzentriert die Macht bei jenen, die es entgegenbringen und nicht bei jenen, die es erhalten. Eine Person, die sich Vertrauen verdient hat, braucht keine Absicherung durch Herrschaft. Wenn jemand nicht vertrauenswürdig ist, warum sollte die Person dann Autorität besitzen? Und dennoch: wem vertrauen wir weniger als Politiker_innen, der

          Polizei oder Manager_innen?

          Ohne Autoritäten haben Menschen einen Anreiz, Lösungen für Konflikte zu finden – um gegenseitiges Vertrauen zu erlangen. Hierarchien blockieren diesen Anreiz und ermöglichen es den Autoritäten Konflikte zu unterdrücken. Freundschaft ist im besten Fall eine Verbindung zwischen Gleichen, die sich gegenseitig unterstützen und herausfordern während sie die Autonomie des/der anderen respektieren. Das ist ein wirklich guter Standard, um daran all unsere Beziehungen zu bemessen. Ohne die Zwänge, die uns dieser Tage auferlegt werden – Staatsangehörigkeit und Illegalität, Eigentum und Schulden, wirtschaftliche und militärische Befehlsstrukturen – könnten wir unsere Beziehungen auf der Basis freier Vereinbarungen und gegenseitiger Hilfe neu

          aufbauen.
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: Anfangen mit der Versöhnung von Individualität und dem großen
          Ganzen
        right_text_html: |-
          „Deine Freiheit endet dort, wo die Freiheit der anderen beginnt.“ Nach dieser Logik müsste es, je mehr Menschen es gibt, umso

          weniger Freiheit geben.

          Freiheit ist jedoch keine kleine Blase von persönlichen Rechten. So einfach kann mensch uns nicht unterscheiden. Gähnen

          und Lachen sind genau wie Euphorie und Verzweiflung ansteckend. Ich bin eine Komposition aus den Klischees in meinem Kopf, den Ohrwürmern, die ich habe und den Launen, die ich von meinen Mitmenschen aufnehme. Wenn ich mit dem Auto fahre, verschmutze ich die Atmosphäre, die du atmest; wenn du Pharmazeutika nutzt, sickern sie ins Grundwasser, das von allen getrunken wird. Das System, das von allen anderen akzeptiert wird, ist das, unter dem du leben musst – wenn es von anderen Leuten hingegen in Frage gestellt wird, bekommst auch du die Chance, deine Realität neu auszuhandeln. Deine Freiheit beginnt, wo meine beginnt und endet dort, wo meine

          endet.

          Wir sind keine vereinzelten Individuen. Unsere Körper bestehen aus einer Symbiose von tausenden Spezies: statt geschlossenen Festungen sind sie andauernde Prozesse durch die Mineralien und Mikroben ständig passieren. Wir leben in einer Symbiose mit weiteren tausenden Spezies, zum Beispiel inhalieren Kornfelder, was wir ausatmen. Ein umherschweifendes Wolfsrudel oder ein Abend voller Grillenzirpen ist genau so individuell und einheitlich wie jeder einzelne unserer Körper. Wir handeln nicht in einem Vakuum, angetrieben aus irgendeinem Grund: die Gezeiten des Kosmos strömen durch uns. Sprache dient nur der Kommunikation, weil wir sie gemeinsam teilen. Das gleiche gilt für Ideen und Wünsche: wir können sie kommunizieren, weil sie größer sind als wir. Jede_r von uns ist verfasst aus einem Chaos gegensätzlicher Kräfte, die allesamt über uns hinaus durch Zeit und Raum gehen. Indem wir uns entscheiden, welche dieser Kräfte wir pflegen wollen, legen wir fest, was wir in allen, die uns begegnen, fördern.

          Photo by Joris V Freiheit ist kein Besitz oder Eigentum – Freiheit ist eine Beziehung. Es geht nicht plash darum von der Außenwelt beschützt zu werden, sondern darum auf eine Art und Weise zu interagieren auf die Möglichkeiten maximiert werden. Das bedeutet nicht, dass wir Konsens um seiner selbst Willen suchen sollten. Konflikt und Konsens können uns beide weiterbringen, solange keine zentralisierte Gewalt in der Lage ist, eine Einigung zu erzwingen oder Konflikt in einen Wettbewerb umzuwandeln, bei dem der Gewinner alles bekommt. Lasst uns lieber das Beste aus unseren gegenseitigen Verbindungen herausholen, statt die Welt in viele kleine Machtbereiche aufzuteilen.
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: Anfangen mit der Befreiung der Wünsche
        right_text_html: |-
          Für uns in dieser Gesellschaft Aufgewachsene sind nicht einmal unsere Leidenschaften unsere eigenen: sie sind geprägt von Werbung und anderen Formen der Propaganda, die uns immer weiter im Hamsterrad des Marktes laufen lassen. Dadurch sind einige sogar einigermaßen damit zufrieden, wenn sie Dinge tun, die sie auf lange Sicht ruinieren werden. Wir sind gefangen in unserem Leid und unsere Freuden sind

          das Siegel.

          Um wirklich frei zu sein, müssen wir auf den Prozess, der unsere Wünsche produziert, Einfluss nehmen. Befreiung bedeutet nicht nur, unsere heutigen Wünsche zu befriedigen, sondern auch, unseren Sinn für das Mögliche zu erweitern, damit sich unsere Wünsche gemeinsam mit den Realitäten, die sie uns erschaffen lassen, weiterentwickeln. Das bedeutet, den Gefallen, den wir an Befehlen, Herrschaft oder Besitz empfinden, abzulegen und Freuden aufzuspüren, die uns aus der Maschinerie von Gehorsam und Wettbewerb herausreißen. Wenn du jemals eine Abhängigkeit überwunden hast, war das eine Kostprobe dessen, was es bedeutet, deine Wünsche zu

          wandeln.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: Anfangen mit Revolte
        right_text_html: |-
          Fanatiker geben üblicherweise einer spezifischen Gruppe die Schuld für eine systemisches Problem – Antisemit_innen sehen „Raubtierkapitalisten“, Rechtspopulisten geben Hartz IV-Empfänger_innen und refugees die Schuld. Allgemein wird oft individuellen Politiker_innen die Schuld für die korrupte Politik gegeben. Das Problem jedoch sind die Systeme an sich. Ganz egal, wer die Zügel in der Hand hält, die Institutionen bringen immer die gleichen Demütigungen und Ungleichheiten hervor. Nicht etwa, weil sie fehlerhaft sind, sondern weil sie genau

          dazu da sind.

          Unsere Feinde sind nicht Menschen, es sind Institutionen und Gewohnheiten, die uns voneinander und von uns selbst entfremden. In uns selbst sind mehr Konflikte als zwischen uns. Die selben Brüche, die unsere Zivilisation durchziehen, durchziehen auch unsere Freundschaften und unsere Herzen. Es handelt sich nicht um einen Kampf zwischen Menschen, sondern um einen Kampf verschiedener Beziehungsformen und Lebensweisen. Wenn wir unsere Rollen innerhalb der herrschenden Ordnung verweigern, öffnen wir diese Brüche und laden andere ebenfalls dazu ein, Stellung zu beziehen. Wir wollen Herrschaft insgesamt abschaffen – nicht ihre Details vernünftiger verwalten, nicht austauschen, wer befiehlt und wer gehorcht, nicht das System durch Reformen stabilisieren. Statt nach legitimeren Gesetzen oder Gesetzgebenden zu verlangen, lasst uns lieber unsere eigenen Stärken erkennen und lernen sie gemeinsam zu nutzen. Es geht nicht um einen Krieg, einen binären Konflikt zwischen zwei militarisierten Feinden, sondern um sich verbreitenden Ungehorsam.

          Es ist nicht genug, einfach nur zu propagieren und zu diskutieren und darauf zu warten dass die Herzen und der Verstand der Anderen sich ändern werden. Solange Ideen nicht aktiv ausgedrückt werden und dadurch Menschen mit konkreten Wahlmöglichkeiten konfrontieren, bleiben die Gespräche abstrakt. Die meisten bleiben theoretischen Diskussionen fern,
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: ''
        right_text_html: |-
          Was sind die Anzeichen dafür, in einer missbräuchlichen Beziehung zu sein? Der Täter versucht vielleicht dein Verhalten zu kontrollieren oder dir deine Gedanken zu diktieren; deinen Zugang zu Ressourcen zu blockieren oder zu regulieren; Gewalt­androhungen gegen dich zu nutzen; oder dich in Abhängigkeit unter ständiger Überwachung zu halten. So kann das Verhalten individueller Täter beschrieben werden, so kann aber auch das Verhalten vom Verfassungsschutz, dem Finanzamt oder der meisten anderen Institutionen, die unsere Gesellschaft regieren, beschrieben werden. All diese Institutionen basieren auf der Idee, dass menschliche Wesen kontrolliert, geführt und verwaltet werden müssen. Je größer die Ungleichheiten, desto mehr Kontrolle ist nötig um sie aufrecht zu erhalten. Auf der einen Seite des

          Photo by Mathias P.R. Reding from Pexels

          Das Problem ist Kontrolle

          Macht-Kontinuums wird Kontrolle brutal auf individueller Basis ausgeübt: durch Drohnenangriffe, SEK-Einheiten, Isolationshaft, rassistische Kontrollen und Hausdurchsuchungen. Auf der anderen Seite ist sie allgegenwärtig und unsichtbar in die Infrastruktur unserer Gesellschaft eingebaut: die Berechnung von Schufa-Auskünften, die Art und Weise, wie Statistiken erhoben und in Stadtplanung verwandelt werden, der Aufbau von Online-Dating-Seiten und social media Plattformen. Der NSA sieht was wir online machen, aber er übt nicht so viel Kontrolle über unsere Realität aus, wie die Algorithmen, die bestimmen, welche Inhalte uns angezeigt werden,

          wenn wir uns einloggen.

          Wenn die unendlichen Möglichkeiten des Lebens endgültig auf ein Feld von Optionen, ausgedrückt durch Einsen und Nullen, reduziert wurden, wird es keine Reibung mehr zwischen dem System, in dem wir leben und dem Leben, das wir uns vorstellen, geben – nicht weil wir die absolute Freiheit erreicht haben, sondern weil wir ihr Gegenteil perfektioniert haben werden. Freiheit bedeutet nicht, zwischen Optionen zu wählen, sondern die Fragen zu formulieren.
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: Das Problem ist Hierarchie
        right_text_html: |-
          Es gibt viele verschiedene Mechanismen um Ungleichheiten zu legitimieren und aufrechtzuerhalten. Manche davon brauchen einen zentralisierten Apparat, wie zum Beispiel das Gerichtswesen. Andere funktionieren subtiler, wie zum Beispiel

          Geschlechterrollen.

          Einige dieser Mechanismen sind mittlerweile komplett in Verruf geraten. Wer glaubt schon noch an Gottesgnadentum? Obwohl jahrhundertelang überhaupt gar keine andere Gesellschaftsform vorstellbar war. Andere, wie etwa das Eigentumsrecht, bleiben so tief verwurzelt, dass wir uns ein Leben ohne sie gar nicht vorstellen können. Und doch existieren sie alle nur auf Grund unseres kollektiven Glaubens: sie sind real, aber nicht unvermeidbar. Die Existenz von Slumlords und Führungskräften ist nicht natürlicher, notwendiger oder nützlicher als die Existenz von Kaiser_innen. All diese Mechanismen haben sich gemeinsam entwickelt und sich gegenseitig verstärkt. Die Geschichte des Rassismus ist zum Beispiel kaum entwirrbar von der Geschichte des Kapitalismus: weder das eine noch das andere ist vorstellbar ohne Kolonisation, Sklaverei oder die Trennung nach Hautfarben, die die Arbeiter_innen spaltete und immer noch festlegt, wer in den Gefängnisse und Armenviertel dieser Welt lebt. Ebenso könnte individueller Rassismus ohne die Infrastruktur des Staates und andere Hierarchien dieser Gesellschaft niemals zu strukturellem Rassismus führen. Das in den USA ein Schwarzer Präsident den Vorsitz über diese Strukturen inne haben konnte, bestärkt sie nur: es ist die Ausnahme, die die Regel legitimiert. Mit anderen Worten: so lange es die Polizei gibt, wen glaubst du wird sie schikanieren? So lange es Gefängnisse gibt, wer wird in ihnen sitzen? So lange es Armut gibt, wer wird deiner Meinung nach arm sein? Es ist naiv zu glauben, dass in einer Gesellschaft, die auf Hierarchien basiert, Gleichberechtigung geschaffen werden könnte. Du kannst die Karten neu mischen, das Spiel bleibt das gleiche.
        image_name: hierarchy
        image_alt: a mustachioed cop in riot gear wearing aviator sunglasses stands
          guard in front of several Ku Klux Klan members in full robes, one of whom
          carries a American flag
      borders:
        left_text_html: Das Problem sind Grenzen
        right_text_html: |-
          Wenn eine fremde Armee in ein Land einmarschiert, die Wälder rodet, die Flüsse vergiftet und den Heranwachsenden Treueschwüre abverlangt – wer würde sich nicht bewaffnet zur Wehr setzen? Wenn jedoch die lokale Regierung das gleiche macht, stellen Patriot_innen bereitwillig Gehorsam, Steuern und ihre Kinder zur Verfügung. Grenzen schützen uns nicht, sie spalten uns – sie erschaffen nutzlose Spannungen mit den Ausgeschlossen und verdunkeln die realen Unterschiede unter den Eingeschlossenen. Selbst die demokratischsten Regierungen basieren auf dieser Spaltung in Teilnehmer und Außenseiterinnen, legitimen und nicht-legitimen. Im antiken Athen, dem berühmten Geburtsort der Demokratie, war nur eine kleine Zahl der Männer in den politischen Prozess involviert, die Gründerväter der modernen Demokratie waren Sklavenhalter. Die Staatsangehörigkeit erzeugt immer noch eine Grenze zwischen Teilnehmenden und Ausgeschlossenen dieser Gesellschaft und entzieht so hunderttausenden oder gar Millionen Menschen ohne Papiere die

          Kontrolle über ihre Leben.

          Es gibt die linke Idee, die Grenzen der Inklusion so weit zu expandieren bis die gesamte Welt in ein umfassendes demokratisches Projekt integriert ist. Ungleichheit ist aber in die Strukturen an sich festgeschrieben. Auf jeder Ebene dieser Gesellschaft unterteilen uns tausende kleine Grenzen in mächtig und ohnmächtig: Sicherheitskontrollen, Schufa-Auskünfte, Zugang zu Daten, Preise. Wir brauchen Formen der Zusammengehörigkeit, die nicht von Ausschluss bestimmt sind, die nicht Macht und Legitimität zentralisieren, die Empathie nicht auf kleine geschlossene Communities beschränken.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: Das Problem ist Repräsentation
        right_text_html: |-
          Nur durch Handeln kannst du dich selbst ermächtigen; deine Interessen kannst du nur kennen lernen, wenn du dich nach ihnen richtest. Wenn alle Bemühungen, Einfluss auf die Welt auszuüben durch die Vermittlung durch Repräsentant_innen oder durch die Vorschriften der Institutionen kanalisiert werden müssen, entfremden wir uns voneinander und von unserem Potential. Jeder Aspekt unserer Handlungsfähigkeit, den wir abgeben, taucht uns gegenüber wieder als etwas uns unbekanntes und feindliches auf. Die uns immer wieder enttäuschenden Politiker_innen zeigen uns lediglich, wie viel Macht über unsere eigenen Leben wir aufgegeben haben; Polizeigewalt ist die düstere Konsequenz aus unserem Verlangen, die persönliche Verantwortung für das Geschehen in unseren Vierteln abzugeben. Im digitalen Zeitalter, in dem wir alle permanent unsere Außendarstellung verwalten und managen müssen, ist unsere Selbstwahrnehmung zu etwas kraft-saugendem Externen geworden. Wären wir nicht derart isoliert von einander, wären wir nicht im kontinuierlichen Wettbewerb uns auf allen möglichen professionellen und sozialen Märkten zu verkaufen – würden wir dann so viel Zeit und Energie in diese Profile stecken? In die goldenen Waben, geformt nach unserem eigenem Bild?

          Wir sind nicht reduzierbar. Weder Delegierte noch Ab­straktionen können für uns einstehen. Durch das Reduzieren menschlicher Wesen auf demographische Schichten und Erfahrungen auf bloße Daten verlieren wir den Blick für alles kostbare und einzigartige in dieser Welt. Wir brauchen Präsenz, Unmittelbarkeit, direkten Kontakt miteinander und Kontrolle über unser Leben – etwas, das uns kein_e Repräsentat_in und keine Repräsentation geben kann.
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: Das Problem sind Anführer_innen
        right_text_html: |-
          Herrschaft ist eine soziale Unordnung, in der der Großteil der Teilnehmenden darin versagt, Initiative zu ergreifen und über die eigenen Handlungen kritisch nachzudenken. Solange wir Handlungsfähigkeit als Eigentum spezifischer Individuen und nicht als soziale Beziehung betrachten, werden wir immer abhängig von Herrschenden sein – und von ihrer Gnade. Wirklich vorbildliche Führungspersönlichkeiten sind genauso gefährlich wie die offensichtlich korrupten: all ihre lobenswerten Eigenschaften stärken lediglich ihren Status und die Unterwürfigkeit anderer, ganz abgesehen davon, dass sie so Herrschaft insgesamt legitimieren.

          Immer wenn die Polizei zu einer Aktion oder Demo kommt, fragt sie zuerst nach „dem Verantwortlichen“ – nicht etwa, weil Herrschaft essentiell für kollektive Aktionen ist, sondern weil sie eine Schwachstelle präsentiert. Als die Konquistadoren in der so genannten Neuen Welt ankamen, stellten sie die selbe Frage; und wo immer sie eine Antwort bekamen, ersparte diese ihnen jahrhundertelange Probleme damit, die lokale Bevölkerung zu bändigen. So lange es einen Anführer gibt, kann dieser ernannt, ersetzt oder als Geisel genommen werden. Im besten Fall ist die Abhängigkeit von Herrschenden eine Achillesferse; im schlimmsten Fall reproduziert diese Abhängigkeit die Interessen und Machtstrukturen der Herrschenden innerhalb derjenigen, die ihnen eigentlich gegenüber stehen. Schöner wäre es, wenn alle einen Sinn für die eigene Handlungsfähigkeit und eigene Vorstellungen hätten.
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: Das Problem sind Regierungen
        right_text_html: |-
          Regierungen versprechen uns Rechte, sie können uns aber nur Freiheiten nehmen. Die Grundidee von „Rechten“ beinhaltet eine zentrale Macht, die diese Rechte zugesteht und garantiert. Wenn sie mächtig genug sind uns etwas zu garantieren, sind sie auf jeden Fall mächtig genug es uns wieder zu nehmen. Regierungen dazu ermächtigen ein Problem zu lösen, gibt ihnen lediglich die Möglichkeit noch mehr Probleme zu erschaffen. Außerdem gene­rieren Regierungen Macht nicht aus dem Nichts – es ist unsere Macht, die sie ausüben, die wir wesentlich effektiver ohne das Spektakel der Repräsentation

          einsetzen könnten.

          Selbst die liberalste Demokratie teilt mit den despotischsten Diktaturen gleiche Prinzipien: die Zentralisierung von Macht und Legitimität in einer auf dem Gewaltmonopol basierenden Struktur. Ob die Bürokrat_innen dieser Struktur einem König, einer Kanzlerin oder einer Wählerschaft Rechenschaft schuldig sind, ist irrelevant. Gesetze, Bürokratien und die Polizei bestehen länger als die Demokratie; sie funktionieren in einer Demokratie genau so wie in einer Diktatur. Der einzige Unterschied besteht darin, dass wir sie, weil wir ihre Befehlsgeber_innen wählen können, als unsere ansehen sollen – selbst wenn sie gegen uns genutzt werden. Diktaturen sind grundsätzlich nicht stabil: sie können ganze Generationen abschlachten, einsperren und manipulieren – die nächste Generation wird den Kampf für Befreiung wieder neu erfinden. Wird aber allen eine Chance versprochen, den eigenen Willen durch die Mehrheit allen Mitmenschen aufzudrücken, kann mensch sie alle in ein System integrieren, dass sie im Endeffekt nur gegeneinander ausspielt. Je mehr die

          Leute daran glauben, Einfluss auf die Zwangsinstitutionen des Staates zu haben, desto populärer werden diese. Vielleicht ist das auch eine Erklärung dafür warum mit der globalen Verbreitung der Demokratie unglaubliche Ungleichheiten bezüglich der Verteilung von Rohstoffen und Macht einhergehen: keine andere Regierungs­form könnte so eine prekäre Situation

          stabilisieren.

          Wenn Macht zentralisiert ist, müssen Menschen über andere herrschen um auf ihr eigenes Schicksal Einfluss ausüben zu können. Unabhängigkeitskämpfe werden in Wettbewerbe um die politische Macht kanalisiert: ein Zeugnis davon sind die Bürgerkriege in postkolonialen Ländern, zwischen Bevölkerungsgruppen, die vorher friedlich nebeneinander existierten. Die Herrschenden können ihre Macht nur durch andauernden Krieg – sowohl gegen ihre eigene als auch gegen fremde Bevölkerungen – aufrecht erhalten. Die Nationalgarde wurde aus dem Irak zurück geholt um dann in Oakland eingesetzt zu werden. Die Bundeswehr trainiert auf dem Gefechts-Übungs-Zentrum (GÜZ) den Einsatz gegen revoltierende Massen, dabei sind die Namen der dort aufgebauten

          Übungsdörfer austauschbar.

          Wo immer es Hierarchien gibt, begünstigen diese diejenigen, die an ihrer Spitze stehen und ermöglichen es ihnen Macht zu zentralisieren. Wenn wir dieses System durch mehr Kontrolle und Ausgleiche ausbessern wollen, bedeutet dies lediglich, dass wir uns Schutz von etwas erhoffen, vor dem wir eigentlich geschützt werden sollten. Die einzige Möglichkeit Druck auf die Herrschenden auszuüben, ohne in ihr Machtspiel hinein gezogen zu werden, ist der Aufbau horizontaler,
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: Das Problem sind Gewinne
        right_text_html: |-
          Geld ist der ideale Mechanismus um Ungleichheiten umzusetzen. Es ist abstrakt: es wirkt so als könnte mensch durch Geld alles repräsentieren. Es ist universell: Menschen, die ansonsten nichts gemeinsam haben, akzeptieren es als Tatsache des Lebens. Es ist unpersönlich: anders als erbliche Privilegien lässt es sich sofort von einer Person zur anderen übertragen. Es fließt: je einfacher sich eine Position innerhalb einer Hierarchie wechseln lässt, desto stabiler ist die Hierarchie an sich. Viele die gegen einen Diktator, revoltieren

          würden, akzeptieren bereitwillig die Autorität des Marktes. Wenn alles einen Preis hat, verlieren selbst die einzigartigen Momente unseres Lebens ihre Bedeutung und werden zu bloßen Wertmarken in einer abstrakten Kalkulation der Macht. Alles, was nicht finanziell messbar ist, lassen wir am Wegrand zurück. Das Leben wird zum Gerangel um finanzielle Vorteile: alle gegen alle, verkaufen oder verkauft werden. Gewinne machen bedeutet in Relation zu allen anderen mehr Kontrolle über die Ressourcen der Gesellschaft zu erlangen. Wir können nicht alle auf einmal profitieren; für jede Person, die profitiert müssen proportional gesehen andere Einfluss verlieren. Wenn Bosse Gewinne aus der Arbeit ihrer Angestellten machen, bedeutet es, dass der finanzielle Graben zwischen ihnen umso größer wird, je mehr die Angestellten arbeiten. Ein profit-geleitetes System produziert Armut in der selben Geschwindigkeit, in der es Reichtum konzentriert. Der Zwang zur Konkurrenz sorgt schneller als jedes vorige System für neue Innovationen, daneben produziert es jedoch auch ständig zunehmende Ungleichheiten: einst wurden Unberittene von Berittenen regiert, nun fliegen Stealth Bomber über Autofahrer und Obdachlose. Und weil alle dem Gewinn hinterher jagen müssen, statt etwas um seiner selbst willen zu machen, können die Resultate dieser Arbeit katastrophal sein. Der Klimawandel ist nur die Neuste in einer Serie von Katastrophen, bei der selbst die mächtigsten Kapitalist_innen machtlos sind. Tatsächlich belohnt der Kapitalismus Unternehmen nicht dafür, Krisen zu bewältigen, sondern dafür aus ihnen Gewinn

          zu schlagen.
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: Das Problem ist Eigentum
        right_text_html: |-
          Die Grundlage des Kapitalismus sind Eigentumsrechte – ein weiteres soziales Konstrukt, das wir von Monarchien und Aristokratien geerbt haben. Eigentum wechselt heutzutage schneller den Besitzer, das Konzept jedoch bleibt das selbe: die Idee von Inhaberschaft legitimiert den Einsatz von Gewalt, um von Menschen erschaffene Ungleichheiten in Bezug auf Zugang zu Land und Ressourcen zu erzwingen. Einige Leute glauben, dass Eigentum auch ohne den Staat existieren würde. Allerdings sind Eigentumsrechte ohne eine zentralisierte Autorität, die diese durchsetzen kann, bedeutungslos – und andersherum ist nichts wirklich deines, solange eine zentralisierte Autorität besteht. Das Geld, das du verdienst, ist geprägt vom Staat, es ist Steuern und Inflation

          unterworfen.

          Ob du dein Auto fahren darfst, hängt von der Zulassung des TÜV ab. Dein Haus gehört nicht dir, sondern der Bank, die dir den Kredit gegeben hat; selbst wenn du es abbezahlt hast, übertrumpft Enteignung immer noch jegliche

          Eigentumsurkunde.

          Was würde es bedeuten die Dinge, die uns wichtig sind, zu beschützen? Regierungen existieren nur auf Grundlage dessen, was sie uns genommen haben; sie werden immer mehr nehmen als geben. Der Markt belohnt uns nur dafür unsere Mitmenschen abzuziehen, und andere dafür uns abzuziehen. Die einzige wirk­liche Absicherung liegt in unseren sozialen Bindungen: wenn wir uns sicher fühlen wollen, brauchen wir Netzwerke gegenseitiger Hilfe, die in der Lage sind sich selbst

          zu verteidigen.

          Wenn unsere Beziehungen zu Dingen nicht durch Eigentums­­ rechte und Geld festgelegt werden, wären sie bestimmt durch die Beziehungen, die wir zueinander haben. Heutzutage ist es andersherum: unsere Beziehungen zueinander werden bestimmt durch unsere Beziehungen zu materiellen Dingen. Eigentumsrechte abzuschaffen würde nicht bedeuten, dass du deinen Besitz verlierst; es würde bedeuten, dass weder die Polizei noch ein Börsencrash dir die Sachen, die du brauchst, wegnehmen kann. Anstatt einer Bürokratie zu gehorchen, würden wir bei den menschlichen Bedürfnissen anfangen; anstatt einen Vorteil aus den anderen zu ziehen, würden wir Vorteile aus unseren gegenseitigen Wechselbeziehungen ziehen. Die schlimmste Angst der Gewinner_innen dieser Gesellschaft ist eine Gesellschaft ohne Eigentum – denn in einer solchen Gesellschaft bekommen sie nur den Respekt, den sie sich auch verdienen. Ohne Geld bekommen die Menschen Anerkennung für das, was sie für andere tun und nicht dafür, das sie andere Menschen zwingen können etwas zu tun. Ohne Profite muss jede Leistung schon an sich die Belohnung dafür sein – und so gäbe es keinen Ansporn mehr für bedeutungslose oder destruktive Aktivitäten. Die Dinge die im Leben wirklich zählen – Lust, Resonanz, Freundschaft, Verständnis, … – gibt es im Überfluss. Es bedarf Hundertschaften von Polizistinnen und Sachverständigen um die künstliche Knappheit zu schaffen, die uns in diesem Hamsterrad gefangen halt.
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: Das letzte Verbrechen
        right_text_html: |-
          Jede gesellschaftliche Ordnung basiert auf einem Verbrechen – das Verbrechen, das die vorige Ordnung abgeschafft hat. Danach wird die neue Ordnung als legitim wahrgenommen, sobald die Leute anfangen sie als gegeben hin zu nehmen. Das Gründungsverbrechen der USA war zum Beispiel die Rebellion gegen die britische Monarchie. Das Gründungsverbrechen der kommenden Gesellschaft – falls wir diese hier überleben sollten – wird die heutigen Gesetze und Institutionen abschaffen. Die Kategorie Verbrechen bezeichnet alles, was die Grenzen einer Gesellschaft übertritt – im guten wie im schlechten. Jedes System ist von dem, was es nicht einbeziehen oder kontrollieren kann, bedroht. Jede Ordnung beinhaltet schon die Samen

          ihrer eigenen Zerstörung.

          Nichts bleibt ewig bestehen, das gilt auch für Empire und Kulturen. Was könnte diese Gesellschaft ablösen? Können wir uns eine Ordnung vorstellen, die nicht auf der Einteilung des Lebens in legitim und nicht-legitim, legal und illegal, Herrschende und Beherrschte basiert? Was könnte das letzte

          Verbrechen sein?

          Durch die Feststellung dessen, was all die verschiedenen Institutionen und Mechanismen der Herrschaft gemeinsam haben, können wir erkennen, dass unsere individuellen Kämpfe auch Teil von etwas Größerem sind, von etwas das uns verbinden könnte. Wenn wir uns auf Grundlage dieser Verbindung zusammen finden, verändert sich alles: nicht nur unsere Kämpfe, auch unsere Handlungsfähigkeiten, unsere Begeisterungsfähigkeit – der Glaube daran, dass unsere Leben bedeutend sind. Alles was es braucht um uns zu finden ist es anzufangen entsprechend einer anderen Logik zu handeln.
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: |-
          Anarchie findet überall dort statt, wo eine Ordnung nicht

          durch Zwang auferlegt wurde. Sie bedeutet Freiheit: der Prozess uns selbst und unsere Beziehungen zueinander

          immer wieder neu zu erfinden.

          Alle ansatzweise freien Prozesse oder Phänomene – ein Regenwald, ein Freundeskreis, dein eigener Körper – sind anarchische Harmonien, die durch permanente Veränderung fortbestehen. Kontrolle von oben nach unten kann andererseits nur durch Restriktionen und Zwang aufrecht erhalten werden: Disziplin durch Strafarbeiten in der Schule; industrielle Landwirtschaft, in der Pestizide und Herbizide genetisch verändertes Getreide verteidigen; die fragile Hegemonie einer Supermacht.

          Anarchismus ist die Idee, dass alle zu kompletter

          Selbstbestimmung berechtigt sind. Kein Gesetz, keine Regierung und kein Entscheidungsverfahren sind wichtiger als die Bedürfnisse und Wünsche von menschlichen Wesen. Die Menschen sollten ihre Beziehungen frei nach gegenseitiger Zufriedenheit gestalten können, sie sollten wann immer sie es für angebracht halten für sich selbst

          aufstehen können.

          Anarchismus ist kein Dogma und keine Blaupause. Er ist kein System, das vermutlich funktionieren würde, wenn es nur richtig angewandt würde – wie die Demokratie – und kein Ziel, das in ferner Zukunft einmal realisiert werden könnte – wie der Kommunismus. Er ist eine Handlungsweise und eine Art unsere Beziehungen zu gestalten, die wir sofort in die Praxis umsetzen können. In Bezug auf alle Wertsysteme und Handlungsweisen können wir mit folgender Frage anfangen: Wie verteilen

          sie Macht?
        second_html: |-
          Anarchist_innen sind gegen alle Hierarchien – gegen

          jede Währung, die Macht in den Händen einiger weniger konzentriert; gegen jeden Mechanismus der uns davon abhält unser Potential zu nutzen. In Ablehnung aller geschlossenen Systeme befinden wir uns in gespannter Erwartung des kommenden Unbekannten; das Chaos in uns selbst, aufgrund dessen wir in der Lage sind, frei zu

          sein.

          Weil diese Ideen so gewöhnlich sind, können sie nur für ungewöhnliche Menschen nützlich sein. Anscheinend bist du eine_r davon. Wenn du das hier liest, bist du Teil des Widerstandes.
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: ''
        right_text_html: |-
          Dieses Projekt wurde von CrimethInc. – einem internationalen Netzwerk ehrgeiziger Revolutionär_innen – herausgegeben. Der Text entstand in Kooperation mit Gefährt_innen aus fünf Kontinenten. Digital könnt ihr den Text und das damit verbundene Video (und andere Materialien) auf tochangeeverything.com auf über einem Dutzend Sprachen finden. Gegen Portokosten könnt ihr bei black-mosquito.org weitere Kopien der gedruckten Version bestellen. Weitere Texte, Poster, Audio-Dateien und vieles mehr findet ihr auf crimethinc.com

          Um etwas zu verändern, fang irgendwo an.
