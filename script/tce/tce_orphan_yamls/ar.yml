      relationships:
        left_text_html: "المشكلة في \nالقادة"
        right_text_html: "العمال الذين يؤدون العمل، لديهم القوة. أما السلطة، فهي بأيدي
          رؤساءهم الذين يصدرون الأوامر. السكان الذين يقيمون في المبنى لديهم القوة،
          أما السلطة، فهي بيد صاحب العقار المدوّن اسمه في العقد. كذلك النهر لديه القوة،
          أما الإذن ببناء سد يمنح السلطة.\n\nالقوة ليست سيئة في حد ذاتها. ثمة أنواع
          عديدة من القوة تكمن الحرية بداخلها؛ كأن نقوى على: العناية بمن نحبهم، والدفاع
          عن أنفسنا، وحل النزاعات، والعلاج بالوخز بالإبر، والإبحار بمركب في عرض البحر،
          ودفع أرجوحة. ثمة طرق لتنمية قوانا، تُزيد من حرية الآخرين كذلك. كل من يتحرك
          من أجل تنمية قواه، وتحقيق نفسه؛ يعتبر هدية للجميع. وفي المقابل، كل من يمارس
          سلطة على الآخرين يغتصب قوّتهم، وما سيسلبه منهم، سيسلبه منه آخرون. \nالسلطة
          تأتي من أعلى دائمًا: الجندي يطيع الجنرال الذي يطيع الرئيس الذي يستمد سلطته
          من الدستور، والقس يطيع الأسقف الذي يطيع البابا الذي يطيع الكتاب المقدس الذي
          يستمد سلطته من الرب، والموظف يطيع صاحب العمل الذي يخدم العميل الذي يستمد
          سلطته من النقود، وضابط الشرطة ينفذ مذكرة أصدرها قاضي التحقيق الذي يستمد
          سلطته من القانون. الذكورية، العنصرية، المِلكية.. حتى فوق قمم هذه الأهرامات،
          لا نجد الحاكم المطلق، بل مجرد كيانات اجتماعية، \nأشباح تُخضِع الإنسانية
          للتنويم المغناطيسي. في مثل هذا المجتمع تتداخل السلطة بالقوة، إلى حد بالكاد
          يمكننا الفصل بينهما: قد نتمتع بالقوة فقط مقابل الطاعة، ومع ذلك فالقوة بدون
          الحرية لا قيمة لها."
        image_name: relationships
        image_alt: at night, lit by streetlights, young protestors in Turkey form
          a fire-brigade-line to transport cobblestones to the front lines of a confrontation
          with police
      reconciling:
        left_text_html: القيادة خلل في النظام الاجتماعي، حيثما تفشل الأغلبية في جماعة
          ما، في أخد المبادرة أو في التفكير جيدًا في تحركاتها. طالما ظللنا نفهم القوة
          بوصفها ملكية مجموعة محددة من الأفراد، أكثر من كونها علاقة بين الناس، سنظل
          نعتمد على القادة- ونعوّل على رحمتهم بنا. إن القادة الأخيار حقًا، يُعتَبرون
          خطِرين بنفس قدر خطر القادة الفاسدين؛ إذ لا تجدي حسناتهم نفعًا، إلا في تثبيت
          أوضاعهم، واستمرار إذعان الآخرين لهم، ناهيك عن ترسيخ فكرة شرعية القيادة في
          حد ذاتها.
        right_text_html: لنبدأ بتحقيقعلاقات مبنية على الثقة
        image_name: reconciling
        image_alt: kid hugging tree in forest, looking up into the canopy
      liberation:
        left_text_html: "المشكلة في \nالحكومة"
        right_text_html: |-
          خلاف السلطة، الثقة تضع القوة في يد من يمنحها، وليس من يتلقاها. الشخص الجدير بالثقة لا يحتاج للسلطة، وإن كان أحدهم غير جدير بالثقة، فهو بالطبع غير جدير بالسلطة. ومع ذلك، فمن عساه أن يكون غير جدير بالثقة أكثر من السياسيين والمدراء التنفيذيين؟

          بدون الاختلالات المفتعلة في ميزان القوى، يميل الناس إلى حل نزاعاتهم بما يرضي جميع الأطراف- لنزعة الثقة المتبادلة فيما بينهم. لكن الهرمية تقضي على هذه النزعة، حين تمكّن من يمتلك السلطة من قمع تلك النزاعات.
          الصداقة، في أحسن صورها، هي رابطة بين أنداد يؤازرون بعضهم البعض، ويتنافسون فيما بينهم، مع احترام متبادل لاستقلالية أحدهم الآخر. هذا المعيار جيد بما يكفي لنقيّم به جميع علاقاتنا. ومن ثم، فنجن بوسعنا إعادة تكوين علاقاتنا على أساس الترابط الحر، والمنفعة المتبادلة، وبدون تلك القيود المفروضة علينا اليوم: المواطنة، والوضع القانوني، والملكية، والدين، وتراتبية القيادات العسكرية والرأسمالية.
        image_name: liberation
        image_alt: two protestors, adorned with gas masks and balaclavas, dance the
          tango together in the street
      revolt:
        left_text_html: تقطع الحكومات وعودًا بالحقوق، لكنها لا تفعل شيئًا سوى الحد
          من الحريات. إن فكرة الحقوق تنطوي على وجود سلطة مركزية لتمنحها، وتكفلها.
          مع ذلك، فأي شيء يمكن للدولة أن تمنحه، يمكنها أيضًا أن تمنعه. وتمكين الحكومة
          من حل مشكلة ما، يفتح لها الباب واسعًا لخلق المزيد من المشاكل. والحكومة لا
          تخلق السلطة من فراغ، إنما هي سلطتنا نحن التي تمارسها هي، سلطتنا التي يمكننا
          إلى حد بعيد جدًا استغلالها على نحو أكثر فاعلية، بدون تلك الضجة الفارغة التي
          تصنعها النيابة عنا وتمثيلنا.
        right_text_html: لنبدأ بـتحقيق الصُلح بين الفرد والكل
        image_name: revolt
        image_alt: A anonymous man stands in front of a column of tanks on June 5,
          1989, the morning after the Chinese military had suppressed the Tiananmen
          Square protests of 1989 by force, who later became known as the Tank Man.
          The tanks maneuvered to pass by the man, and he moved to continue to obstruct
          them, in something like a dance.
      control:
        left_text_html: the problem is<br /><span class="bold">control</span>
        right_text_html: "<p>What are the signs that you are in an abusive relationship?
          The abuser may try to control your behavior or dictate your thoughts; block
          or regulate your access to resources; use threats or violence against you;
          or keep you in a position of dependence, under constant surveillance.</p><p>This
          describes the behavior of individual abusers, but it also goes for the IRS,
          the NSA, and most of the other institutions governing our society. Practically
          all of them are based on the idea that human beings need to be policed,
          to be managed, to be administered.</p><p>The greater the imbalances that
          are imposed on us, the more control it takes to preserve them. At one end
          of the power continuum, control is exercised brutally on an individual basis:
          drone strikes, SWAT teams, solitary confinement, racial profiling. At the
          other end, it is omnipresent and invisible, built into the infrastructure
          of society: the equations that determine credit ratings and insurance premiums,
          the ways statistics are collected and turned into urban planning, the architecture
          of dating sites and social media platforms. The NSA monitors what we do
          online, but it doesn’t wield as much control over our reality as the algorithms
          that determine what we see when we log in.</p><p>When the infinite possibilities
          of life have been reduced to an array of options coded in ones and zeros,
          there will be no more friction between the system we inhabit and the lives
          we can imagine—not because we will have achieved total freedom, but because
          we will have perfected its opposite. Freedom doesn’t mean choosing between
          options, but formulating the questions.</p>"
        image_name: control
        image_alt: a cop dressed in fancy riot gear leans out of his open patrol car
          door and uses a camcorder to record protestors who are not pictured
      hierarchy:
        left_text_html: |-
          ما الذي ستفعله لو كنت تتمتع بحق تقرير المصير؟ فكّر في أكبر إمكانيات حياتك: العلاقات التي يمكنك خوضها، والخبرات التي يمكنك عيشها، وغيرها من الأشياء الأخرى التي قد تمنح وجودك معنى. في مستهل حياتنا يبدو لنا المستقبل رحبًا بلا حدود، ونرى أن كل شيء ممكن التحقق بلا ريب.في العادة، نحن لا نتوقف عن تخيل هذا. فقط في أجمل لحظات حياتنا، حين نقع في الحب أو نحقق نصرا كبيرا، أو نسافر إلى أراضي بعيدة، نلمح صورة خاطفة وفاتنة لما كان يمكن أن تكون عليه حياتنا.ما الذي يحد من إمكانية تحسين حياتنا؟ ما مدى تأثيرنا على من حولنا؟ أو كيف نقضي حياتنا؟ البيروقراطية التي تقيّمنا حسب مدى طاعتنا لكتاب التوجيهات، والاقتصاد الذي يضحك في وجوهنا حسب نسبة الأرباح التي يحصلها منّا، وإصرار العسكر على أن أفضل طريقة

          “لتحقيق كل آمالك” هي طاعة السلطات طاعة عمياء. هل يمكننا، مع كل هذا وذاك، أن نستغل حياتنا على الوجه الأكمل؟ وبشروطنا الخاصة؟السر المُعلن هو أننا جميعًا نتمتع بحرية الإرادة؛ ليس لأن المؤسسات تكفلها لنا، بل لأن أعتى الديكتاتوريات تسلطًا واستبدادًا، لا يمكنها سلبها منا. ومع ذلك، فما أن نبدأ بممارستها، ينشب الصراع بيننا وبين المؤسسات المنوط بها حماية حريتنا!
        right_text_html: |-
          لكن الحرية ليست الفقاعة الصغيرة للحقوق الشخصية، إذ لا يمكننا الانفصال عن بعضنا بهذه السهولة. وكما أن التثاؤب والضحك مُعديان، فالحماسة واليأس كذلك أيضًا. أنا أتكوّن من: الصيغ المبتذلة التي تتساقط من لساني، الأغاني التي تتردد في ذهني، الحالات المزاجية التي يضعني فيها مَن حولي. السيارة التي تقودها ينبعث منها عادم؛ ليندمج في الهواء الذي تتنفسه، الأدوية التي تتناولها تندمج في الماء الذي يشربه الجميع. والنظام الذي يتقبله الجميع، هو نفسه النظام الذي تعيش أنت في كنفه، لكنه حين يتصدى له آخرون؛ تتاح لك فرصة إعادة صياغة واقعك من جديد. إذن حريتك تبدأ حين تبدأ حريتي، وتنتهي حين تنتهي حريتي. نحن لسنا منفصليْن، أجسادنا تتكوّن من آلاف الأجناس البشرية المختلفة، تعيش في تكافل: وليست قلاعًا نائية. ثمة عمليات مستمرة، من مرور المواد المغذية، والجرثومية، بلا انقطاع. كذلك نعيش في تكافل مع آلاف الأجناس الأخرى، حقول الذرة تتنفس ما يُخرجه تنفسنا. قطيع ذئاب يعوي، أو الضفادع التي تنقّ في الليل فرادي أو جماعات؛ تكوينها كتكوين أي جسد من أجسادنا. نحن لا نتحرك في الفراغ بقوة الدفع الذاتي، بل إن مد وجزر الكون بأسره، يندفع عبر أجسادنا.اللغة أداة تواصل؛ لأننا نتشاركها معًا، مثلها في ذلك مثل الأفكار والرغبات: يمكننا التواصل بها، لأنها أعظم منا.كل واحد منا مكوّن من فوضى القوى المتناقضة، التي

          تتجاوزنا جميعًا عبر الزمان والمكان. وعندما نختار أيًّا من تلك القوى لندعمها؛ نحدد بذلك ما نعزّزه في كل إنسان نقابله.
          الحرية ليست شيئا نمتلكه أو نناله، إنما هي علاقة. الحرية ليست أن تكون في أمان من العالم الخارجي، بل أن تتقاطع معه، على نحو يرفع احتمالات الأمان لأقصى درجة. هذا لا يعني أنه ينبغي علينا الوصول إلى وفاق من أجل الوفاق في حد ذاته، فالصراع والوفاق كفيلان بتطويرنا، طالما أنه لا توجد قوة مركزية تفرض علينا الوفاق، أو تشعل النزاع بيننا؛ لجعل الموقف أسوأ ما يكون للمنهزم، وأفضل ما يكون للمنتصر، بل يمكننا استغلال تواصلنا على الوجه الأكمل، بدلاً من سعينا إلى تقسيم العالم إلى إقطاعيات متناهية الصغر.

          لنبدأبتحرير الرغبة
