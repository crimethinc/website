      power:
        left_text_html: في عصر التكنولوجيا الرقمية، حيث يجب على الجميع العمل كسكرتارية
          لأنفسهم، لخدمة صورتهم العامة، صارت سمعتنا نفسها عاملاً خارجيًا عنّا؛ كمصاص
          دماء يتغذى علينا. إن لم نكن في عزلة عن بعضنا البعض، نتنافس على بيع أنفسنا
          في الأسواق المهنية والاجتماعية الكثيرة، فهل كنا سننفق كل هذا الوقت والجهد
          في تلك الصفحات الخاصة، تلك العجول الذهبية في صورنا الخاصة؟نحن لا يمكن اختصارنا.
          لا يمكن للبعثات الخاصة النيابة عنّا، ولا للأفكار المجردة تمثيلنا. باختصار
          الإنسان إلى خبرات معلوماتية رقمية وباردة، نفقد كل عزيز وفريد في العالم.
          نحن بحاجة إلى التواصل مع أحدنا الآخر مباشرةً وحاضرًا، نحن بحاجة لنتحكم تحكما
          مباشرًا في حياتنا؛ تلك أشياء لا نيابة عنّا فيها، ولا تمثيل يستطيع تحقيقها.
        right_text_html: |-
          يجيد المدراء ومحصلو الضرائب الحديثَ عن المسئولية الشخصية، وحتى حال تحمّلنا كامل المسئولية عن أفعالنا، هل سنكون بذلك متّبعين تعليماتهم في المقام الأول؟

