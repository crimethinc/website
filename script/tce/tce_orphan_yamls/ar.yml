      self:
        left_text_html: 'إن الحدود لا تحمينا، بل تقسّمنا، إنها تخلق خلافات لا داعي
          لها، مع من هم خارجها، فيما تُخفي الخلافات الحقيقية مع من هم بداخلها. حتى
          أكثر الحكومات ديمقراطية، تقوم على هذه التفرقة بين من هم بداخلها ومن هم خارجها،
          وبين ما هو شرعي وما هو غير شرعي. في «أثينا» القديمة، مهد الديمقراطية الشهير،
          كان يسمح لفئة قليلة من الرجال بممارسة السياسة. الآباء الروحيون للديمقراطية
          الحديثة، كانوا يمتلكون العبيد! وفي الولايات المتحدة، مازال قانون المواطنة
          يفرض حاجزًا بين من هم خارجها ومن هم بداخلها، ويحرم ملايين من المقيمين بداخلها،
          بلا وثائق، من عيش حياة كريمة.يدعو الفكر التحرري إلى إزاحة الحدود؛ ليصير
          العالم كله مشروعًا ديمقراطيًا واحدًا، شاسعًا. لكن اللامساواة متأصلة في الهيكل
          نفسه. داخل كل مستويات هذا المجتمع، ثمة آلاف من الحدود الصغيرة تقسمنا إلى
          من يمتلكون القوة، ومن لا حول لهم ولا قوة: نقاط التفتيش، بطاقات الائتمان،
          كلمات سر قواعد البيانات، بطاقات الأسعار. نحن بحاجة إلى أشكال من الانتماء
          لا تقوم على الإقصاء، ولا تجعل السلطة والشرعية مركزيتين، ولا تجعل التعاطف
          والتراحم حكرًا على مجتمعات مغلقة.'
        right_text_html: |-
          مازالت الحرية حُلمًا يراود ذلك العالَمَ المسجون داخل نفسه. لقد وُعدنا بالحق في تقرير المصير؛ فهو واجبٌ على كافة المؤسسات أن تكفله لنا.

          ما الذي ستفعله لو كنت تتمتع بحق تقرير المصير؟ فكّر في أكبر إمكانيات حياتك: العلاقات التي يمكنك خوضها، والخبرات التي يمكنك عيشها، وغيرها من الأشياء الأخرى التي قد تمنح وجودك معنى. في مستهل حياتنا يبدو لنا المستقبل رحبًا بلا حدود، ونرى أن كل شيء ممكن التحقق بلا ريب.في العادة، نحن لا نتوقف عن تخيل هذا. فقط في أجمل لحظات حياتنا، حين نقع في الحب أو نحقق نصرا كبيرا، أو نسافر إلى أراضي بعيدة، نلمح صورة خاطفة وفاتنة لما كان يمكن أن تكون عليه حياتنا.ما الذي يحد من إمكانية تحسين حياتنا؟ ما مدى تأثيرنا على من حولنا؟ أو كيف نقضي حياتنا؟ البيروقراطية التي تقيّمنا حسب مدى طاعتنا لكتاب التوجيهات، والاقتصاد الذي يضحك في وجوهنا حسب نسبة الأرباح التي يحصلها منّا، وإصرار العسكر على أن أفضل طريقة «لتحقيق كل آمالك» هي طاعة

          السلطات طاعة عمياء. هل يمكننا، مع كل هذا وذاك، أن نستغل حياتنا على الوجه الأكمل؟ وبشروطنا الخاصة؟السر المُعلن هو أننا جميعًا نتمتع بحرية الإرادة؛ ليس لأن المؤسسات تكفلها لنا، بل لأن أعتى الديكتاتوريات تسلطًا واستبدادًا، لا يمكنها سلبها منا. ومع ذلك، فما أن نبدأ بممارستها، ينشب الصراع بيننا وبين المؤسسات المنوط بها حماية حريتنا!
        image_name: self
        image_alt: shadow of a person climbing over a barbed-wire fence
