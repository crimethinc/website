      borders:
        left_text_html: "المشكلة في \nالأرباح"
        right_text_html: يُبعدنا العيش في هذا المجتمع عن كل ما يميزنا، حتى شغفنا.
          إذ نتأثر بالإعلانات، وغيرها من أشكال الدعاية الأخرى، التي تجعلنا نواصل ركضنا
          حول طواحين الأسواق. بفضل ذلك التلقين، يفرح الناس فرحًا شديدًا لأشياء من
          شأنها أن تجعلهم، على المدى الطويل، بؤساء. نحن سجناء معاناتنا، وسعادتنا هي
          القفل.
        image_name: borders
        image_alt: a grouple of people sits upon a tall boundary fence they have climbed
      representation:
        left_text_html: 'المال هو الآلية المثالية لتحقيق اللامساواة. إنه شيء مجرد:
          ويبدو أنه قادر على فعل أي شيء. عالمي: من ليس لديهم أي شيء مشترك سوى المال،
          يتقبلونه بصفته إحدى حقائق الحياة. لا شخصي: على النقيض من الامتيازات الموروثة،
          يمكن تحويل المال، أو نقله من شخص لآخر في التو واللحظة سائل: كلما سَهُل تغيير
          الموقع في الهرم، كلما زاد استقرار الهرم نفسه. غالبية معارضي الديكتاتورية
          يتقبلون سلطة السوق بسهولة.'
        right_text_html: |-
          لنكون سعداء حقًّا، يجب أن نزيح رغباتنا عن كاهلنا. إن التحرر لا يعني تحقيق رغباتنا التي تعترينا اليوم فحسب، بل توسيع شعورنا بما هو ممكن، لتتحول رغباتنا إلى وقائع تقودنا. ما يعني أن نتخلى عن متعة فرض السيطرة والتملُّك، وأن نتطلع إلى متع أخرى تنتزعنا، وتحررنا من ماكينة الطاعة والتنافسية. من سبق له وتحرر من إدمانٍ ما، يعرف ما يعنيه التحرر من الرغبة.

          لنبدأ بالتمرد
        image_name: representation
        image_alt: a woman of asian ethnicity works as a mannequin factory stocking
          a shelves that are full of caucasian mannequin heads
      leaders:
        left_text_html: "- في حقيقة الأمر- لا تكافئ رجال الأعمال على حل الأزمات، وإنما
          لإنفاقهم عليها."
        right_text_html: 'غالبًا ما يرى المتعصّبون أن فئة معينة من الناس، هي سبب مشكلة
          جذرية ما: أن اليهود هم سبب الرأسمالية الربحية، أو أن اللاجئين هم سبب الأزمة
          الاقتصادية. وبالمِثل، يرى الناس أن رجال السياسة هم سبب الفساد السياسي. لكن
          المشكلة تكمن في الأنظمة في حد ذاتها، بغض النظر عن الحكّام. فالأنظمة تُنتِج
          الاختلالات نفسها في ميزان القوى، والمعاملة المهينة نفسها. والمشكلة ليست
          في إسقاط الأنظمة، بل في قيامها من الأساس.'
        image_name: leaders
        image_alt: a portly politician talks into a bouquet of press microphones that
          surround him
      government:
        left_text_html: the problem is<br /><span class="bold">government</span>
        right_text_html: |-
          إن عدوّنا ليس شخصًا ما بعينه، بل المؤسسات والروتين الذي يغرِّبًنا عن بعضنا البعض، وعن أنفسنا. الصراعات بداخلنا أكثر مما هي بيننا. الأخطاء نفسها التي تعتري حضارتنا الإنسانية، تسري في صداقاتنا وفي قلوبنا. الأمر ليس اشتباكًا مع أشخاص، بل مع أنواع مختلفة من العلاقات، وطرق مختلفة من العيش. نحن حين نرفض القيام بأدوارنا في النظام السائد، نفضح بذلك تلك الأخطاء، وندعو الآخرين لمواجهتها كذلك.
          الأفضل إلغاء الهيمنة تمامًا، لا إدارة تفاصيلها بمزيد من الانضباط، ولا بتبديل الأدوار بين مَن يسدد الضربات ومَن يتحملها، ولا بتعديل الأنظمة الذي لا يؤدي إلا لترسيخها. إن الغرض من الاحتجاج ليس الدعوة من أجل قواعد أكثر انضباطًا، أو حكام أفضل، وإنما لنُبيّن أن بوسعنا التحرك بقوّتنا الخاصة، وحث الآخرين على أن يحذوا حذونا، ولنمنع السلطات من التدخل. تلك ليست دعوة للحرب- النزاع الثنائي بين جيشين متعاديين- لكنها دعوة لنشر عدوى العصيان.
          لا يكفي رفع الوعي وإثارة النقاش، وانتظار تغيير قلوب وعقول الآخرين. وسيبقى هذا الحديث في نطاق التجريد؛ إلى أن تتحول الأفكار إلى أفعال، ويجد الناس أنفسهم أمام اختيارات ملموسة. أغلب الناس يُعرِضون عن التنظير، لكنهم حين يحدث شيء ما، حين يرتفع مؤشر الخطر، ويكون بوسعهم تمييز خط فاصل وواضح، بين طرفين متناقضين، تجدهم يختارون صف أحدهما. نحن لا نريد الإجماع على رأي واحد، ولا نريد تفهُّمًا شاملاً يعم العالم بأسره، ولا خريطة طريق نحو وِجهة معينة، بل نريد شجاعة الانطلاق في طريق مختلف.
        image_name: government
        image_alt: large conference table at which world leaders are seated, surrounded
          by press and their minions, a summit meeting with greek columns of marble
          and a traditional fresco in the dome above
      profit:
        left_text_html: 'يعتقد البعض أن الملكية قد توجد بدون الدول، لكن حقوق الملكية
          لا معنى لها بدون سلطة مركزية تفرضها. وطالما وُجدت سلطة مركزية، فلا شيء ملكك
          حقًا. المال الذي نجنيه صنعته الدولة، ويخضع للضرائب وللتضخم. سند ملكية سيارتك
          تتحكم فيه إدارة المركبات، بيتك ليس ملكًا لك حقًا، بل للبنك الذي منحك قرضه،
          حتى وإن سددته بالكامل، الملكية الكاملة تجُبّ أية وثيقة.ما الذي يمكننا فعله
          لحماية ممتلكاتنا المهمة؟ تستند الحكومات على ما يمكنها أخذه منا، وستظل دائمًا
          تأخذ أكثر مما تعطي. تكافئنا الأسواق فقط لنجز أصواف رفاقنا، وتكافئ الآخرين
          ليجزوا أصوافنا. إن التأمين الحقيقي الوحيد في روابطنا الاجتماعية: إن أردنا
          التأمين حقًا، فنحن بحاجة لشبكات دعم متبادل، يمكنها الدفاع عن نفسها.بدون
          مال أو حقوق مِلكية، تتحدد علاقتنا بالأشياء على أساس علاقتنا بعضنا ببعض.
          أما اليوم، فالأمر على نقيض ذلك: علاقتنا بعضنا ببعض، تحددها علاقتنا بالأشياء.
          والاستغناء عن الملكية ليس معناه خسارة ممتلكاتنا، بل معناه أنه ما من عمدة
          مدينة، أو انهيارٍ للبورصة، يمكنه أن يفقدنا الأشياء التي نعتمد عليها. بدلاً
          من طاعة البيروقراطية، سنبدأ بسد الحاجات الإنسانية، وبدلاً من'
        right_text_html: |-
          المشكلة في السيطرة

          ما هي علامات كونك في علاقة مشوهة؟ هي أن يُملي عليك الطرف المعتدي كيف تتصرف، أو كيف تفكر، أو يحد من وصولك لمصادر ما، أو يقنن ذلك الوصول، أو يهددك باستخدام العنف ضدك، أو ينفذ ذلك فعلاً، أو أن يبقيك في موقف المحتاج له، أو تحت رقابته المستمرة.
        image_name: profit
        image_alt: a chauffeur holds open the door to a large Audi as a wealthy businessman
          exits a helicopter and proceeds across the helipad towards the car
      property:
        left_text_html: the problem is<br /><span class="bold">property</span>
        right_text_html: |-
          هذا ما قد يفعله الطرف المعتدي كفرد، لكنه ينطبق أيضًا على ما تفعله مصلحة الضرائب، أو جهاز الأمن الوطني، وغيرهما من مؤسسات كثيرة أخرى، تتحكم في مجتمعنا، وتستند جميعها عمليًا على فرضية أن الإنسان في حاجة لحمايته، وإدارة حياته، وتدبير أمره.كلما زادت الاختلالات المفروضة علينا، كلما احتاج الأمر إلى مزيد من السيطرة؛ لحفظ تلك الاختلالات. في أحد طرفي سلسلة القوة، تُمارس السيطرة على الفرد بوحشية: هجمات الطائرات بدون طيار، فرق القوات الخاصة، الحبس الانفرادي، التمييز العنصري. وفي الطرف الآخر منها، تجدها منتشرة في كل مكان، وغير مرئية، متغلغلة في البنية التحتية للمجتمع: التسويات التي تحدد الائتمانات، وأقساط التأمينات، وطُرق جمع المعلومات الإحصائية، وترجمتها إلى خطط تطوير مديني، وبناء مواقع التعارف والتواصل الاجتماعي. يراقب الأمن الوطني كل أنشطتنا على الإنترنت، لكنه لا يتمتع بالقدر نفسه من السيطرة على واقعنا، كخوارزميات الإنترنت التي تحدد ما نراه وما لا نراه.حين تقتصر إمكانات الحياة على مجرد اختيارات مرتبة، ومشفرة من آحاد وأصفار، لن يوجد فارق بين النظام الذي نخضع له، وبين الحياة التي نتخيلها، ذلك ليس لأننا حققنا الحرية المطلقة، بل لأننا حققنا نقيضها. فالحرية لا تعني الاختيار من بين خيارات، بل تعني صياغة الأسئلة.

          المشكلة في الهرمية
        image_name: property
        image_alt: an abandoned building, now occupied, with protest banners in the
          window, being used as community organizing location
      lastcrime:
        left_text_html: يجري هذا المشروع بفضل أعمال CrimethInc. وهي شبكة دولية من
          الثوار الطامحين.
        right_text_html: |-
          يقوم كل نظام جديد على جريمة القضاء على النظام السابق له. بعد ذلك، يأتي النظام الجديد كنظام شرعي، يقبله الناس كأمر مسلّم به. فالثورة على سلطة ملك إًنجلترا، هي الجريمة التي قام عليها نظام الولايات المتحدة الأمريكية. الجريمة التي سيقوم عليها المجتمع القادم، إن تدبَّرنا أمر البقاء فيه، ستكون إزالة تلك القوانين والمؤسسات التي تحكمنا اليوم.

          يجمع تعريف الجريمة كل ما يتجاوز حدود المجتمع؛ الأفضل والأسوأ. مخاوف أي نظام، هو ما لا يمكنه إدراجه، أو السيطرة عليه. يحمل كل نظام بذور خرابه بداخله.لا شيء يدوم إلى الأبد، هذه حقيقة تنطبق على الإمبراطوريات والحضارات أيضًا. لكن ماذا سيكون عليه النظام التالي للنظام الحالي؟ هل نستطيع تخيل نظام لا يقوم على تصنيف الحياة إلى شرعي وغير شرعي؟ قانوني وغير قانوني؟ حاكم ومحكوم؟ ماذا عساها تكون الجريمة الأخيرة؟
        image_name: lastcrime
        image_alt: a protestor with his face concealed in the act of throwing a lit
          molotov cocktail during a protest, in front of a huge concrete wall
      anarchy:
        first_html: 'ثمة عدة آليات لفرض اللامساواة، يعتمد بعضها على جهاز مركزي، مثل
          نظام المحاكم، وبعضها الآخر يعمل على نحو أقل رسمية، مثل الاتحادات والنقابات،
          أو مثل التمييز بين الجنسين. بعض تلك الآليات فقد مصداقيته بالكامل تقريبًا،
          فقليلون هم الذين مازالوا يؤمنون بألوهية الملوك، بالرغم من عدم التفكير في
          أسس أخرى للمجتمع منذ قرون. وبعضها لايزال متأصلاً بعمق، لحد أننا لا نستطيع
          تخيل الحياة بدونه، فمن مثلاً يمكنه التفكير في عالم بدون حقوق الملكية؟ مع
          هذا، فكل تلك الطرق ليست سوى كيانات اجتماعية: حقيقية، لكنها ليست حتمية. إن
          وجود الإقطاعيين والمدراء التنفيذيين، لم يعد طبيعيًا أو ضروريًا أو مفيدًا
          أكثر من وجود الأباطرة.'
        second_html: |-
          لقد تطورت كل هذه الآليات معًا، وفُرضت إحداها الأخرى. فتاريخ العنصرية على سبيل المثال، ليس منفصلاً تمامًا عن تاريخ الرأسمالية: لا يمكن تصور أحدهما بدون الاستعمار والعبودية، أو خطوط اللون التي قسّمت العمال. ومازالت هذه الآليات تحدد من الذين تمتلئ بهم سجون العالم ويسكنون العشوائيات. وبالمثل، بدون البنية التحتية للدولة، وغيرها من الهرميات الأخرى في مجتمعاتنا، لم يكن ممكنًا للتعصب الفردي أن يفرض تفوّق حكم البيض النظامي أبدًا. وما رئاسة رجل أسود لتلك الكيانات، إلاّ أمر يساعد في استقرارها فقط؛ إذ يصبح الاستثناء الذي يؤكد القاعدة.بكلمات أخرى: طالما وُجدت الشرطة، فبمن تظنهم سيتحرشون؟ وطالما وجدت السجون، فبمن تظنهم سيملأونها؟ وطالما وجد الفقر، فمن تظنهم سيكونون الفقراء؟ من السذاجة تصديق أننا بوسعنا تحقيق المساواة في مجتمع قائم على الهرمية. قد تتعدد الطرق، لكن الموت واحد.

          المشكلة في
          الحدود
        third_html: <p><span class="blue black">Anarchists</span> oppose all forms
          of hierarchy—every currency that concentrates power into the hands of a
          few, every mechanism that puts us at a distance from our potential. Against
          closed systems, we relish the unknown before us, the chaos within us by
          virtue of which we are able to be free.</p>
      outro:
        left_text_html: الأناركيون ضد جميع أشكال الهرمية، ضد كل تيار يضع السلطة كلها
          في يد قلة قليلة، ضد كل آلية تبعدنا عن تحقيق قوانا الكامنة فينا. ضد الأنظمة
          المغلقة. نحن نستمتع بالمجهول القادم أمامنا، وبالفوضى الكامنة بداخلنا التي
          يمكننا بمقتضاها أن نكون أحرارًا.
        right_text_html: To&#8200;<br />change&#8200;<br />everything,<br />start&#8200;<br
          />anywhere.
